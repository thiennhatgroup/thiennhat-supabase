    function ppToggleAll(el) { document.querySelectorAll('.pp-chk').forEach(c => c.checked = el.checked); }
    function exportPP(btn) {
      const idxs = [...document.querySelectorAll('.pp-chk:checked')].map(c => Number(c.dataset.i));
      if (!idxs.length) { toast('Chọn ít nhất một phiếu.', 'err'); return; }
      const aoa = []; const merges = []; let R = 0;
      const push = row => { aoa.push(row); R++; };
      idxs.forEach((idx, bi) => {
        const p = state.printable[idx];
        const start = R;
        push([COMPANY]); merges.push({ s: { r: R-1, c: 0 }, e: { r: R-1, c: 5 } });
        push(['ĐỀ XUẤT MUA HÀNG']); merges.push({ s: { r: R-1, c: 0 }, e: { r: R-1, c: 5 } });
        push([`Ngày đề xuất: ${p.NgayDeXuat||''}`]);
        push([`Nội dung: ${p.NoiDung||''}`]);
        push([`Giải trình: ${p.GiaiTrinh||''}`]);
        push([`Đơn vị cung cấp: ${p.TenDoiTuong||''}`]);
        const headR = R;
        push(['TT','Tên vật tư hàng hoá','Số lượng','Thành tiền sau VAT (vnđ)','Điều khoản thanh toán','Đơn vị cung cấp']);
        let tong = 0;
        (p.lines||[]).forEach((l, i) => {
          const tt = Number(l.ThanhTienSauVAT||0); tong += tt;
          push([i+1, l.MatHang||'', Number(l.SLThucNhan ?? l.SLDat ?? 0), tt, p.DieuKhoanTT||'', p.TenDoiTuong||'']);
        });
        push(['', 'Tổng', '', tong, '', '']);
        push(['Tổng giám đốc','','Trưởng BP','','Người đề xuất', p.NguoiDeNghi||'']);
        push([]); push([]);
        // remember block table range for styling
        merges._blocks = merges._blocks || [];
        merges._blocks.push({ headR, endR: R-3 });
      });
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws['!cols'] = [{wch:6},{wch:44},{wch:12},{wch:20},{wch:22},{wch:26}];
      ws['!merges'] = merges;
      (merges._blocks||[]).forEach(b => {
        styleRange(ws, b.headR, 0, b.headR, 5, { font: { bold: true }, fill: { fgColor: { rgb: 'ECE5D8' } }, border: BORDER, alignment: { wrapText: true, vertical: 'center' } });
        styleRange(ws, b.headR, 0, b.endR, 5, { border: BORDER });
      });
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Đề xuất mua hàng');
      xlsxDownload(wb, `De_xuat_mua_hang_${todayStr()}.xlsx`);
      toast(`Đã xuất ${idxs.length} phiếu.`, 'ok');
    }

    // ---- In phiếu yêu cầu thanh toán (YCTT / BM-03TH) — 1 phiếu ----
    function renderPrintYCTT() {
      document.getElementById('content').innerHTML = `
        <section class="card">
          <h2>In / xuất phiếu yêu cầu thanh toán (BM-03TH)</h2>
          <div class="notice ok">Chọn một phiếu đã nghiệm thu. Số tài khoản &amp; ngân hàng NCC hệ thống tự lấy. Số hóa đơn/chứng từ bạn nhập tay bên dưới rồi bấm Generate.</div>
          <div class="field"><label>Chọn phiếu (đã nghiệm thu)</label><select id="ycttSel" onchange="ycttPick()"><option value="">— Chọn —</option></select></div>
          <div id="ycttForm"></div>
        </section>`;
      loadPrintable(rows => {
        state.printable = rows;
        const sel = document.getElementById('ycttSel');
        sel.innerHTML = '<option value="">— Chọn —</option>' + rows.map((r,i)=>`<option value="${i}">${esc(r.MaDeXuat)} · ${esc(r.TenDoiTuong||'')}</option>`).join('');
      });
    }
    function ycttPick() {
      const i = document.getElementById('ycttSel').value;
      const box = document.getElementById('ycttForm');
      if (i === '') { box.innerHTML = ''; return; }
      const p = state.printable[Number(i)];
      box.innerHTML = `
        <div class="grid">
          <div class="field"><label>Đơn vị thụ hưởng</label><input value="${esc(p.TenDoiTuong||'')}" disabled></div>
          <div class="field"><label>Người đề nghị</label><input id="yNguoi" value="${esc(p.NguoiDeNghi||'')}"></div>
        </div>
        <div class="grid">
          <div class="field"><label>Số tài khoản (tự lấy)</label><input value="${esc(p.SoTk||'(chưa có — bổ sung ở Danh mục)')}" disabled></div>
          <div class="field"><label>Ngân hàng / chi nhánh (tự lấy)</label><input value="${esc(p.ChiNhanh||'')}" disabled></div>
        </div>
        <h3>Chứng từ — nhập số hóa đơn tay</h3>
        <div class="table-wrap"><table class="line-table"><thead><tr><th>STT</th><th>Số chứng từ / hóa đơn</th><th>Diễn giải</th><th>SL</th><th>Thành tiền</th></tr></thead><tbody>
          ${(p.lines||[]).map((l,li)=>`<tr>
            <td>${li+1}</td>
            <td><input class="yctt-inv" data-li="${li}" placeholder="VD: 00000411"></td>
            <td>${esc(l.MatHang||'')}</td>
            <td class="num-cell">${fmtMaybeMoney(l.SLThucNhan ?? l.SLDat)}</td>
            <td class="num-cell">${fmtMoney(l.ThanhTienSauVAT)}</td>
          </tr>`).join('')}
        </tbody></table></div>
        <div class="grid">
          <div class="field"><label>Trừ tạm ứng / trả trước</label><input id="yTruTamUng" class="js-money" inputmode="decimal" value="0"></div>
          <div class="field"><label>Diễn giải chung (tùy chọn)</label><input id="yDienGiai" value="${esc(p.NoiDung||'')}"></div>
        </div>
        <button onclick="exportYCTT(${Number(i)}, this)">⬇ Generate &amp; tải phiếu YCTT</button>`;
    }
    function exportYCTT(idx, btn) {
      const p = state.printable[idx];
      const invs = {};
      document.querySelectorAll('.yctt-inv').forEach(el => invs[el.dataset.li] = el.value);
      const truTU = moneyNum('yTruTamUng');
      const aoa = [];
      aoa.push([COMPANY]);                                   // 0
      aoa.push([COMPANY_ADDR]);                              // 1
      aoa.push(['PHIẾU ĐỀ NGHỊ THANH TOÁN', '', '', '', '', '', '', '', '', 'BM-03TH']); // 2
      aoa.push([]);                                          // 3
      aoa.push(['Người đề nghị:', val('yNguoi')||p.NguoiDeNghi||'']);
      aoa.push(['Bộ phận:', 'Kế hoạch-Vật tư', '', 'Nội dung:', 'Thanh toán']);
      aoa.push(['Loại tiền:', 'VND', '', 'Phương thức:', 'Chuyển khoản']);
      aoa.push(['Đơn vị thụ hưởng:', p.TenDoiTuong||'']);
      aoa.push(['Số tài khoản:', p.SoTk||'']);
      aoa.push(['Ngân hàng:', p.ChiNhanh||'']);
      aoa.push([]);
      const headR = aoa.length;
      aoa.push(['STT','Số chứng từ','Ngày chứng từ','Diễn giải','SL','Đơn Giá','Thành Tiền']);
      let tong = 0;
      (p.lines||[]).forEach((l, li) => {
        const tt = Number(l.ThanhTienSauVAT||0); tong += tt;
        const sl = Number(l.SLThucNhan ?? l.SLDat ?? 0);
        aoa.push([li+1, invs[li]||'', p.NgayDeXuat||'', l.MatHang||'', sl, sl? Math.round(tt/sl):'', tt]);
      });
      const endR = aoa.length - 1;
      aoa.push(['', '', '', 'TỔNG CỘNG', '', '', tong]);
      aoa.push(['', '', '', 'Trừ tạm ứng / trả trước', '', '', truTU]);
      aoa.push(['', '', '', 'Nhận từ công ty', '', '', tong - truTU]);
      aoa.push([]);
      aoa.push(['', '', '', '', '', `Liên Sơn, ngày ${new Date().toLocaleDateString('vi-VN')}`]);
      aoa.push(['Tổng Giám Đốc', '', 'Kế toán trưởng', '', 'Cán bộ theo dõi', 'Người đề nghị']);
      aoa.push(['', '', '', '', '', val('yNguoi')||p.NguoiDeNghi||'']);
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws['!cols'] = [{wch:6},{wch:14},{wch:14},{wch:40},{wch:8},{wch:14},{wch:16}];
      ws['!merges'] = [
        {s:{r:0,c:0},e:{r:0,c:6}}, {s:{r:1,c:0},e:{r:1,c:6}}, {s:{r:2,c:0},e:{r:2,c:6}}
      ];
      styleCell(ws, 'A1', { font: { bold: true } });
      styleCell(ws, 'A3', { font: { bold: true, sz: 14 }, alignment: { horizontal: 'center' } });
      styleRange(ws, headR, 0, headR, 6, { font: { bold: true }, fill: { fgColor: { rgb: 'ECE5D8' } }, border: BORDER, alignment: { horizontal: 'center' } });
      styleRange(ws, headR, 0, endR, 6, { border: BORDER });
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'YCTT');
      xlsxDownload(wb, `YCTT_${p.MaDeXuat}.xlsx`);
      toast('Đã tạo phiếu YCTT.', 'ok');
    }

    // ===== Thông báo (bell) ================================================
    async function refreshNotif() {
      try {
        const res = await call('rpc_get_notifications', { p_limit: 30 });
        state.notif = res.rows || [];
        const badge = document.getElementById('notifBadge');
        if (badge) {
          badge.textContent = res.unread || 0;
          badge.classList.toggle('hidden', !res.unread);
        }
        if (!document.getElementById('notifPanel')?.classList.contains('hidden')) drawNotif();
      } catch (e) { /* im lặng: không chặn app nếu thông báo lỗi */ }
    }
    function toggleNotif() {
      const panel = document.getElementById('notifPanel');
      if (!panel) return;
      panel.classList.toggle('hidden');
      if (!panel.classList.contains('hidden')) { drawNotif(); }
    }
    function drawNotif() {
      const panel = document.getElementById('notifPanel');
      const rows = state.notif || [];
      panel.innerHTML = `
        <div class="notif-head"><b>Thông báo</b>${rows.some(n=>!n.daDoc) ? '<button class="secondary" style="width:auto;min-height:32px;padding:4px 10px" onclick="markAllNotif()">Đánh dấu đã đọc</button>' : ''}</div>
        ${rows.length ? rows.map(n => `<div class="notif-item ${n.daDoc?'':'unread'}" onclick="openNotif('${esc(n.id)}','${esc(n.manHinh||'')}')">
          <div class="nt-title">${esc(n.tieuDe)}</div>
          <div class="nt-body">${esc(n.noiDung||'')}</div>
          <div class="nt-time">${esc(n.thoiGian)}</div>
        </div>`).join('') : '<p class="status" style="padding:10px">Chưa có thông báo.</p>'}`;
    }
    async function openNotif(id, screen) {
      try { await call('rpc_mark_notification_read', { p_id: id }); } catch (e) {}
      document.getElementById('notifPanel')?.classList.add('hidden');
      refreshNotif();
      if (screen && visibleScreens().some(s => s[0] === screen)) renderScreen(screen);
    }
    async function markAllNotif() {
      try { await call('rpc_mark_all_notifications_read'); } catch (e) {}
      refreshNotif();
    }
    document.addEventListener('click', e => {
      const panel = document.getElementById('notifPanel');
      if (panel && !panel.classList.contains('hidden') && !e.target.closest('.bell-wrap')) panel.classList.add('hidden');
    });

    // ===== Tài khoản (Admin) — tạo & phân quyền ngay trên webapp ============
    function roleOptions(selected) {
      return Object.keys(ROLE_LABELS).map(r => `<option value="${r}" ${r===selected?'selected':''}>${ROLE_LABELS[r]}</option>`).join('');
    }
    function renderUsers() {
      document.getElementById('content').innerHTML = `
        <section class="card">
          <h2>Tài khoản &amp; phân quyền</h2>
          <div class="notice ok">Tạo tài khoản và gán vai trò cho từng người ngay tại đây — không cần vào Supabase. Người dùng đăng nhập bằng email + mã PIN.</div>
          <div class="actions"><button onclick="openUserForm()">＋ Thêm tài khoản</button><button class="secondary" onclick="loadUsers(this)">↻ Tải lại</button></div>
          <div id="usersBox" style="margin-top:12px">${loadingText('Đang tải...')}</div>
          <div class="notice" style="margin-top:12px">Vai trò &amp; quyền: <b>Nhân viên mua hàng</b> tạo đề xuất/nghiệm thu · <b>Lãnh đạo</b> duyệt đề xuất &amp; thanh toán · <b>Kế toán công nợ</b> đề xuất/đi tiền, dashboard · <b>Trưởng phòng</b> xem báo giá · <b>Admin</b> toàn quyền.</div>
        </section>`;
      loadUsers();
    }
    async function loadUsers(btn) {
      const box = document.getElementById('usersBox');
      if (box) box.innerHTML = loadingText('Đang tải...');
      try {
        const res = await withBusy(btn, 'Đang tải...', () => call('rpc_admin_list_users'));
        const rows = res.rows || [];
        box.innerHTML = `<div class="table-wrap"><table><thead><tr>
          <th>Email</th><th>Tên</th><th>Vai trò</th><th>Trạng thái</th><th>Thao tác</th></tr></thead><tbody>
          ${rows.map(u => `<tr>
            <td>${esc(u.email)}</td><td>${esc(u.name||'')}</td>
            <td>${esc(ROLE_LABELS[u.role]||u.role)}</td>
            <td>${u.status==='Ngừng'?'<span class="pill err">Ngừng</span>':'<span class="pill ok">Hoạt động</span>'}</td>
            <td><button class="secondary" onclick='openUserEdit(${JSON.stringify(u).replace(/'/g,"&#39;")})'>Sửa</button>
                <button class="secondary" onclick="resetPin('${esc(u.id)}','${esc(u.email)}', this)">Đặt lại PIN</button></td>
          </tr>`).join('')}</tbody></table></div>`;
      } catch (err) { box.innerHTML = `<p class="status">${esc(err.message || err)}</p>`; }
    }
    function openUserForm() {
      openModal('Thêm tài khoản', `
        <div class="field"><label>Email *</label><input id="uEmail" placeholder="nguoidung@congty.com"></div>
        <div class="field"><label>Họ tên *</label><input id="uName"></div>
        <div class="grid">
          <div class="field"><label>Vai trò</label><select id="uRole">${roleOptions('NhanVienMuaHang')}</select></div>
          <div class="field"><label>Mã PIN (≥4 số)</label><input id="uPin" placeholder="VD: 1234"></div>
        </div>
        <small>Người dùng đăng nhập bằng email + PIN này. Có thể đổi PIN sau bằng “Đặt lại PIN”.</small>`,
        saveNewUser, 'Tạo tài khoản');
    }
    async function saveNewUser(btn) {
      const email = val('uEmail').trim(), name = val('uName').trim(), role = val('uRole'), pin = val('uPin').trim();
      if (!email || !name) { modalErr('Cần nhập email và họ tên.'); return; }
      if (pin.length < 4) { modalErr('PIN cần ít nhất 4 ký tự.'); return; }
      try {
        await withBusy(btn, 'Đang tạo...', () => call('rpc_admin_create_user', { p_email: email, p_name: name, p_role: role, p_pin: pin }));
        closeModal(); toast('Đã tạo tài khoản.', 'ok'); loadUsers();
      } catch (err) { modalErr(err.message || String(err)); }
    }
    function openUserEdit(u) {
      openModal('Sửa tài khoản', `
        <div class="field"><label>Email</label><input value="${esc(u.email)}" disabled></div>
        <div class="field"><label>Họ tên</label><input id="ueName" value="${esc(u.name||'')}"></div>
        <div class="grid">
          <div class="field"><label>Vai trò</label><select id="ueRole">${roleOptions(u.role)}</select></div>
          <div class="field"><label>Trạng thái</label><select id="ueStatus">
            <option ${u.status==='Ngừng'?'':'selected'}>Hoạt động</option>
            <option ${u.status==='Ngừng'?'selected':''}>Ngừng</option>
          </select></div>
        </div>`, () => saveUserEdit(u.id), 'Lưu thay đổi');
    }
    async function saveUserEdit(id, btn) {
      try {
        await call('rpc_admin_update_user', { p_id: id, p_role: val('ueRole'), p_status: val('ueStatus'), p_name: val('ueName') });
        closeModal(); toast('Đã cập nhật.', 'ok'); loadUsers();
      } catch (err) { modalErr(err.message || String(err)); }
    }
    async function resetPin(id, email, btn) {
      const pin = (prompt(`Đặt lại PIN mới cho ${email} (≥4 số):`, '') || '').trim();
      if (!pin) return;
      if (pin.length < 4) { toast('PIN cần ít nhất 4 ký tự.', 'err'); return; }
      try {
        await withBusy(btn, 'Đang đặt lại...', () => call('rpc_admin_reset_pin', { p_id: id, p_pin: pin }));
        toast('Đã đặt lại PIN.', 'ok');
      } catch (err) { toast(err.message || String(err), 'err'); }
    }

    // Resume an existing Supabase session on page load/refresh, mirroring
    // the old localStorage-token bootstrap.
    (async function init() {
      const { data } = await sb.auth.getSession();
      if (data && data.session) {
        state.session = data.session;
        bootstrap();
      }
    })();
    sb.auth.onAuthStateChange((event) => {
      if (event === 'SIGNED_OUT') location.reload();
    });
  </script>
</body>
