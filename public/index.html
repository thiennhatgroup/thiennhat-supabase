    async function exportYCTT(idx, btn) {
      const p = state.printable[idx];
      const invs = {};
      document.querySelectorAll('.yctt-inv').forEach(el => invs[el.dataset.li] = el.value);
      const truTU = moneyNum('yTruTamUng');
      const lines = p.lines || [];
      try {
        await withBusy(btn, 'Đang tạo phiếu...', async () => {
          const wb = await loadTemplateWb('./templates/yctt_template.xlsx');
          const ws = wb.worksheets[0];
          // Điền các ô cố định (giữ nguyên bố cục mẫu)
          ws.getCell('D5').value = val('yNguoi') || p.NguoiDeNghi || '';
          ws.getCell('D11').value = p.TenDoiTuong || '';
          ws.getCell('D13').value = p.SoTk || '';
          ws.getCell('D15').value = p.ChiNhanh || '';
          // Giữ nguyên độ rộng cột của mẫu gốc (SL hiện, Đơn Giá ẩn như bản gốc).
          // Lấy style mẫu (clone) của vùng bảng + tổng + chữ ký TRƯỚC khi xóa
          const st = {
            a: clone(ws.getCell('A18').style), b: clone(ws.getCell('B18').style), d: clone(ws.getCell('D18').style),
            e: clone(ws.getCell('E18').style), h: clone(ws.getCell('H18').style), i: clone(ws.getCell('I18').style), j: clone(ws.getCell('J18').style),
            totL: clone(ws.getCell('E20').style), totV: clone(ws.getCell('J20').style),
            date: clone(ws.getCell('G26').style), signT: clone(ws.getCell('A27').style), signN: clone(ws.getCell('A32').style)
          };
          ['B18:C18','E18:G18','E19:G19','E20:G20','A27:C27','D27:E27','G26:J26','G27:J27','G32:J32','G33:J33']
            .forEach(m => { try { ws.unMergeCells(m); } catch (e) {} });
          // Xóa GIÁ TRỊ + FILL + VIỀN của vùng 18–45 để không còn ô vàng/viền thừa của mẫu
          for (let r = 18; r <= 45; r++) { const row = ws.getRow(r); for (let c = 1; c <= 10; c++) { const cell = row.getCell(c); cell.value = null; cell.fill = { type: 'pattern', pattern: 'none' }; cell.border = {}; cell.font = {}; cell.alignment = {}; } }

          let r = 18, tong = 0;
          lines.forEach((l, li) => {
            const sl = Number(l.SLThucNhan ?? l.SLDat ?? 0);
            const tt = lineAcceptedAmount(l); tong += tt;
            ws.mergeCells(`B${r}:C${r}`); ws.mergeCells(`E${r}:G${r}`);
            applySt(ws.getCell(`A${r}`), st.a); ws.getCell(`A${r}`).value = li + 1;
            applySt(ws.getCell(`B${r}`), st.b); ws.getCell(`B${r}`).value = invs[li] || '';
            applySt(ws.getCell(`D${r}`), st.d); ws.getCell(`D${r}`).value = p.NgayDeXuat || '';
            applySt(ws.getCell(`E${r}`), st.e); ws.getCell(`E${r}`).value = l.MatHang || '';
            applySt(ws.getCell(`H${r}`), st.h); ws.getCell(`H${r}`).value = sl;
            applySt(ws.getCell(`I${r}`), st.i); ws.getCell(`I${r}`).value = Number(l.DonGia || 0);
            applySt(ws.getCell(`J${r}`), st.j); ws.getCell(`J${r}`).value = tt;
            r++;
          });
          const totR = r, truR = r + 2, nhanR = r + 4, dateR = r + 6, stR = r + 7, snR = r + 12;
          const setTot = (rr, label, val) => {
            ws.mergeCells(`E${rr}:G${rr}`); applySt(ws.getCell(`E${rr}`), st.totL); ws.getCell(`E${rr}`).value = label;
            applySt(ws.getCell(`J${rr}`), st.totV); ws.getCell(`J${rr}`).value = val;
          };
          setTot(totR, 'TỔNG CỘNG', tong);
          setTot(truR, 'Trừ tạm ứng hoặc trả trước', truTU);
          setTot(nhanR, 'Nhận từ công ty', tong - truTU);
          ws.mergeCells(`G${dateR}:J${dateR}`); applySt(ws.getCell(`G${dateR}`), st.date);
          ws.getCell(`G${dateR}`).value = `Liên Sơn, ngày ${new Date().toLocaleDateString('vi-VN')}`;
          ws.mergeCells(`A${stR}:C${stR}`); ws.mergeCells(`D${stR}:E${stR}`); ws.mergeCells(`G${stR}:J${stR}`);
          applySt(ws.getCell(`A${stR}`), st.signT); ws.getCell(`A${stR}`).value = 'Tổng Giám Đốc';
          applySt(ws.getCell(`D${stR}`), st.signT); ws.getCell(`D${stR}`).value = 'Kế toán trưởng';
          applySt(ws.getCell(`F${stR}`), st.signT); ws.getCell(`F${stR}`).value = 'Cán bộ theo dõi';
          applySt(ws.getCell(`G${stR}`), st.signT); ws.getCell(`G${stR}`).value = 'Người đề nghị';
          ws.mergeCells(`G${snR}:J${snR}`); applySt(ws.getCell(`G${snR}`), st.signN);
          ws.getCell(`G${snR}`).value = val('yNguoi') || p.NguoiDeNghi || '';
          await saveWb(wb, `YCTT_${p.MaDeXuat}.xlsx`);
        });
        toast('Đã tạo phiếu YCTT.', 'ok');
        closeModal();
      } catch (err) { toast(err.message || String(err), 'err'); }
    }

    async function doExport(kind, btn) {
      const c = EXPORT_CFG[kind];
      try {
        await withBusy(btn, 'Đang tải...', async () => {
          const res = await call(c.rpc, { p_from: val('expFrom') || null, p_to: val('expTo') || null });
          const rows = res.rows || [];
          if (!rows.length) { toast('Không có dữ liệu trong khoảng đã chọn.', 'err'); return; }
          const wb = new ExcelJS.Workbook();
          const ws = wb.addWorksheet(c.sheet);
          const headers = Object.keys(rows[0]);
          ws.addRow(headers);
          ws.getRow(1).font = { bold: true };
          ws.getRow(1).fill = { type: 'pattern', pattern: 'solid', fgColor: { rgb: 'E7F0FA' } };
          rows.forEach(r => ws.addRow(headers.map(h => r[h])));
          ws.columns.forEach(col => { col.width = 20; });
          ws.views = [{ state: 'frozen', ySplit: 1 }];
          await saveWb(wb, `${c.file}_${todayStr()}.xlsx`);
          toast(`Đã tải ${rows.length} dòng.`, 'ok');
        });
      } catch (err) { toast(err.message || String(err), 'err'); }
    }

        state.contacts = res.rows || [];
        box.innerHTML = state.contacts.map(c => `<div class="chat-contact ${state.chatWith===c.id?'active':''}" onclick="openChat('${c.id}','${esc(c.ten)}')">
          <div><b>${esc(c.ten)}</b> ${c.unread ? `<span class="chat-badge">${c.unread}</span>` : ''}</div>
          <div class="status" style="font-size:12px">${esc(ROLE_LABELS[c.vaiTro]||c.vaiTro||'')}${c.lastBody ? ' · ' + esc(String(c.lastBody).slice(0,26)) : ''}</div>
        </div>`).join('') || '<p class="status" style="padding:10px">Chưa có tài khoản nào khác.</p>';
      } catch (err) { box.innerHTML = `<p class="status">${esc(err.message||err)}</p>`; }
    }
    function openChat(id, name) {
      state.chatWith = id; state.chatWithName = name;
      document.getElementById('chatHead').innerHTML = `<b>${esc(name||'')}</b>`;
      document.getElementById('chatComposer').classList.remove('hidden');
      state.chatFiles = []; clearChatRef();
      loadContacts(); loadThread();
    }
    async function loadThread() {
      const box = document.getElementById('chatThread'); if (!box || !state.chatWith) return;
      try {
        const res = await call('rpc_get_conversation', { p_with: state.chatWith, p_limit: 200 });
        const rows = res.rows || [];
        box.innerHTML = rows.map(m => `<div class="chat-bubble ${m.fromMe?'me':'them'}">
          ${m.refMa ? `<div class="chat-ref-chip">📄 ${esc(m.refMa)}</div>` : ''}
          ${m.body ? esc(m.body) : ''}
          ${(m.attachments||[]).map(a=>`<div>${attachLinks([a])}</div>`).join('')}
          <div class="chat-time">${esc(m.time)}</div>
        </div>`).join('');
        box.scrollTop = box.scrollHeight;
      } catch (err) { box.innerHTML = `<p class="status">${esc(err.message||err)}</p>`; }
    }
    function chatFilePicked() {
      const f = document.getElementById('chatFile').files;
      const over = [...f].find(x => x.size > CHAT_MAX);
      const hint = document.getElementById('chatFileHint');
      if (over) { hint.textContent = `Tệp "${over.name}" vượt 5MB — vui lòng chọn tệp nhỏ hơn.`; document.getElementById('chatFile').value = ''; return; }
      hint.textContent = f.length ? `Đã chọn ${f.length} tệp.` : '';
    }
    async function openRefPicker() {
      try {
        const res = await call('rpc_get_my_proposals', { p_limit: 30 });
        const rows = res.rows || [];
        openModal('Đính kèm phiếu đề xuất', rows.length ? rows.map(r=>`<div class="approve-card" style="margin-bottom:8px" onclick="pickRef('${esc(r.MaDeXuat)}')">
          <div class="ac-top"><strong>${esc(r.MaDeXuat)}</strong>${proposalStatusPill(r.TrangThai)}</div>
          <div class="ac-obj">${esc(r.TenDoiTuong||'')} · ${fmtMoney(r.TongTien)}đ</div></div>`).join('') : '<p class="status">Chưa có phiếu nào.</p>', null, null);
      } catch (err) { toast(err.message||String(err),'err'); }
    }
    function pickRef(ma) { state.chatRef = ma; closeModal();
      const bar = document.getElementById('chatRefBar'); bar.classList.remove('hidden'); bar.innerHTML = `📄 Kèm phiếu <b>${esc(ma)}</b> <button class="secondary" style="min-height:26px;padding:2px 8px" onclick="clearChatRef()">✕</button>`; }
    function clearChatRef() { state.chatRef = null; const b = document.getElementById('chatRefBar'); if (b) { b.classList.add('hidden'); b.innerHTML=''; } }
    async function sendChat(btn) {
      if (!state.chatWith) return;
      const body = val('chatBody').trim();
      const fileEl = document.getElementById('chatFile');
      const nFiles = fileEl?.files.length || 0;
      if (!body && !nFiles && !state.chatRef) { return; }
      try {
        const atts = await withBusy(btn, '...', () => uploadAttachments('chatFile', 'chat'));
        await call('rpc_send_message', { p_to: state.chatWith, p_body: body, p_attachments: atts, p_ref_ma: state.chatRef || null });
        document.getElementById('chatBody').value = ''; if (fileEl) fileEl.value = '';
        document.getElementById('chatFileHint').textContent = ''; clearChatRef();
        loadThread(); loadContacts();
      } catch (err) { toast(err.message || String(err), 'err'); }
    }

    // ===== Thông báo (bell) ================================================
    async function refreshNotif() {
      try {
        const res = await call('rpc_get_notifications', { p_limit: 30 });
        state.notif = res.rows || [];
        const badge = document.getElementById('notifBadge');
        if (badge) {
          badge.textContent = res.unread || 0;
          badge.classList.toggle('hidden', !res.unread);
        }
        if (!document.getElementById('notifPanel')?.classList.contains('hidden')) drawNotif();
      } catch (e) { /* im lặng: không chặn app nếu thông báo lỗi */ }
    }
    function toggleNotif() {
      const panel = document.getElementById('notifPanel');
      if (!panel) return;
      panel.classList.toggle('hidden');
      if (!panel.classList.contains('hidden')) { drawNotif(); }
    }
    function drawNotif() {
      const panel = document.getElementById('notifPanel');
      const rows = state.notif || [];
      panel.innerHTML = `
        <div class="notif-head"><b>Thông báo</b>${rows.some(n=>!n.daDoc) ? '<button class="secondary" style="width:auto;min-height:32px;padding:4px 10px" onclick="markAllNotif()">Đánh dấu đã đọc</button>' : ''}</div>
        ${rows.length ? rows.map(n => `<div class="notif-item ${n.daDoc?'':'unread'}" onclick="openNotif('${esc(n.id)}','${esc(n.manHinh||'')}','${esc(n.refId||'')}','${esc(n.loai||'')}')">
          <div class="nt-title">${esc(n.tieuDe)}</div>
          <div class="nt-body">${esc(n.noiDung||'')}</div>
          <div class="nt-time">${esc(n.thoiGian)}</div>
        </div>`).join('') : '<p class="status" style="padding:10px">Chưa có thông báo.</p>'}`;
    }
    const NAV_ALL = ['quotes','proposal','approve','receipt','congnoconfirm','payreq','payapprove','dashboard','settlement','catalog','users','printpp','printyctt','account','chat','improve','exp_pp','exp_tt','exp_bg','oversight','debtpay'];
    async function openNotif(id, screen, refId, loai) {
      try { await call('rpc_mark_notification_read', { p_id: id }); } catch (e) {}
      document.getElementById('notifPanel')?.classList.add('hidden');
      refreshNotif();
      if (loai === 'proposal_bounced' && refId) { navTo('proposal'); editProposal(refId); return; }
      if (!screen || !NAV_ALL.includes(screen)) return;
      if (loai === 'chat' && refId) { state.chatWith = refId; state.chatWithName = ''; }
      navTo(screen);
    }
    async function markAllNotif() {
      try { await call('rpc_mark_all_notifications_read'); } catch (e) {}
      refreshNotif();
    }
    document.addEventListener('click', e => {
      const panel = document.getElementById('notifPanel');
      if (panel && !panel.classList.contains('hidden') && !e.target.closest('.bell-wrap')) panel.classList.add('hidden');
    });

    // ===== Tài khoản (Admin) — tạo & phân quyền ngay trên webapp ============
    function roleOptions(selected) {
      return Object.keys(ROLE_LABELS).map(r => `<option value="${r}" ${r===selected?'selected':''}>${ROLE_LABELS[r]}</option>`).join('');
    }
    function renderUsers() {
      document.getElementById('content').innerHTML = `
        <section class="card">
          <h2>Tài khoản &amp; phân quyền</h2>
          <div class="notice ok">Gán vai trò cho từng người ngay tại đây. Người dùng đăng nhập bằng email + mã PIN.</div>
          <div class="actions"><button onclick="openUserForm()">＋ Thêm tài khoản</button><button class="secondary" onclick="addDeptPrompt()">＋ Bộ phận</button><button class="secondary" onclick="loadUsers(this)">↻ Tải lại</button></div>
          <div id="usersBox" style="margin-top:12px">${loadingText('Đang tải...')}</div>
          <div class="notice" style="margin-top:12px">Vai trò &amp; quyền: <b>Nhân viên mua hàng</b> tạo đề xuất/nghiệm thu · <b>Lãnh đạo</b> duyệt đề xuất &amp; thanh toán · <b>Kế toán công nợ</b> đề xuất/đi tiền, theo dõi công nợ · <b>Trưởng phòng</b> xem báo giá · <b>Admin</b> toàn quyền.</div>
        </section>`;
      loadUsers();
    }
    async function loadUsers(btn) {
      const box = document.getElementById('usersBox');
      if (box) box.innerHTML = loadingText('Đang tải...');
      try {
        const res = await withBusy(btn, 'Đang tải...', () => call('rpc_admin_list_users'));
        const rows = res.rows || [];
        box.innerHTML = `<div class="table-wrap"><table><thead><tr>
          <th>Email</th><th>Tên</th><th>Vai trò</th><th>Trạng thái</th><th>Thao tác</th></tr></thead><tbody>
          ${rows.map(u => `<tr>
            <td>${esc(u.email)}</td><td>${esc(u.name||'')}</td>
            <td>${esc(ROLE_LABELS[u.role]||u.role)}</td>
            <td>${u.status==='Ngừng'?'<span class="pill err">Ngừng</span>':'<span class="pill ok">Hoạt động</span>'}</td>
            <td><button class="secondary" onclick='openUserEdit(${JSON.stringify(u).replace(/'/g,"&#39;")})'>Sửa</button>
                <button class="secondary" onclick="resetPin('${esc(u.id)}','${esc(u.email)}', this)">Đặt lại PIN</button></td>
          </tr>`).join('')}</tbody></table></div>`;
      } catch (err) { box.innerHTML = `<p class="status">${esc(err.message || err)}</p>`; }
    }
    function openUserForm() {
      openModal('Thêm tài khoản', `
        <div class="field"><label>Email *</label><input id="uEmail" placeholder="nguoidung@congty.com"></div>
        <div class="field"><label>Họ tên *</label><input id="uName"></div>
        <div class="grid">
          <div class="field"><label>Vai trò</label><select id="uRole">${roleOptions('NhanVienMuaHang')}</select></div>
          <div class="field"><label>Mã PIN (≥4 số)</label><input id="uPin" placeholder="VD: 1234"></div>
        </div>
        <small>Người dùng đăng nhập bằng email + PIN này. Có thể đổi PIN sau bằng “Đặt lại PIN”.</small>`,
        saveNewUser, 'Tạo tài khoản');
    }
    async function saveNewUser(btn) {
      const email = val('uEmail').trim(), name = val('uName').trim(), role = val('uRole'), pin = val('uPin').trim();
      if (!email || !name) { modalErr('Cần nhập email và họ tên.'); return; }
      if (pin.length < 4) { modalErr('PIN cần ít nhất 4 ký tự.'); return; }
      try {
        await withBusy(btn, 'Đang tạo...', () => call('rpc_admin_create_user', { p_email: email, p_name: name, p_role: role, p_pin: pin }));
        closeModal(); toast('Đã tạo tài khoản.', 'ok'); loadUsers();
      } catch (err) { modalErr(err.message || String(err)); }
    }
    function openUserEdit(u) {
      openModal('Sửa tài khoản', `
        <div class="field"><label>Email</label><input value="${esc(u.email)}" disabled></div>
        <div class="field"><label>Họ tên</label><input id="ueName" value="${esc(u.name||'')}"></div>
        <div class="grid">
          <div class="field"><label>Vai trò</label><select id="ueRole">${roleOptions(u.role)}</select></div>
          <div class="field"><label>Trạng thái</label><select id="ueStatus">
            <option ${u.status==='Ngừng'?'':'selected'}>Hoạt động</option>
            <option ${u.status==='Ngừng'?'selected':''}>Ngừng</option>
          </select></div>
        </div>
        <div class="field"><label>Bộ phận (dùng cho Trưởng bộ phận rà soát)</label><input id="ueBoPhan" value="${esc(u.boPhan||'')}" placeholder="VD: Vật tư, Kỹ thuật..."></div>`, () => saveUserEdit(u.id), 'Lưu thay đổi');
    }
    async function saveUserEdit(id, btn) {
      try {
        await call('rpc_admin_update_user', { p_id: id, p_role: val('ueRole'), p_status: val('ueStatus'), p_name: val('ueName'), p_bo_phan: val('ueBoPhan') });
        closeModal(); toast('Đã cập nhật.', 'ok'); loadUsers();
      } catch (err) { modalErr(err.message || String(err)); }
    }
    async function resetPin(id, email, btn) {
      const pin = (prompt(`Đặt lại PIN mới cho ${email} (≥4 số):`, '') || '').trim();
      if (!pin) return;
      if (pin.length < 4) { toast('PIN cần ít nhất 4 ký tự.', 'err'); return; }
      try {
        await withBusy(btn, 'Đang đặt lại...', () => call('rpc_admin_reset_pin', { p_id: id, p_pin: pin }));
        toast('Đã đặt lại PIN.', 'ok');
      } catch (err) { toast(err.message || String(err), 'err'); }
    }

    // Resume an existing Supabase session on page load/refresh, mirroring
    // the old localStorage-token bootstrap.
    (async function init() {
      const { data } = await sb.auth.getSession();
      if (data && data.session) {
        state.session = data.session;
        bootstrap();
      }
    })();
    sb.auth.onAuthStateChange((event) => {
      if (event === 'SIGNED_OUT') location.reload();
    });
  </script>
</body>
</html>
