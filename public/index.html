          </aside>
        </div>`;
      addLine();
      togglePlanJustify();
      loadMyProposals();
      fillProposalLists();
    }
    async function fillProposalLists() {
      const pn = document.getElementById('pNguoi'); const bp = document.getElementById('pBoPhan');
      let proposers = [], depts = [];
      try { const res = await call('rpc_list_catalog'); proposers = res.proposers || []; depts = res.departments || []; } catch (e) {}
      const cur = state.user?.name || '';
      const names = Array.from(new Set([cur, ...proposers.map(x => x.ten)].filter(Boolean)));
      if (pn) { pn.innerHTML = names.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join(''); pn.value = cur; }
      if (bp) bp.innerHTML = '<option value="">— Chọn bộ phận —</option>' + depts.map(d => `<option value="${esc(d)}">${esc(d)}</option>`).join('');
      if (pn && bp) pn.onchange = () => { const m = proposers.find(x => x.ten === pn.value); if (m && m.boPhan) bp.value = m.boPhan; };
      // Áp dữ liệu khi đang sửa nháp
      const ed = state.editingProposal;
      if (ed) {
        setVal('pLoai', ed.LoaiDeXuat === 'TamUng' ? 'TamUng' : 'MuaHang');
        if (ed.NgayDeXuat) setVal('pNgay', ed.NgayDeXuat);
        if (pn && ed.NguoiDeNghi) { if (!names.includes(ed.NguoiDeNghi)) pn.insertAdjacentHTML('afterbegin', `<option value="${esc(ed.NguoiDeNghi)}">${esc(ed.NguoiDeNghi)}</option>`); pn.value = ed.NguoiDeNghi; }
        if (bp && ed.BoPhan) bp.value = ed.BoPhan;
        setVal('ptenDoiTuong', ed.TenDoiTuong || '');
        setVal('pDieuKhoanTT', ed.DieuKhoanTT || '');
        if (ed.HanThanhToan) setVal('pHan', ed.HanThanhToan);
        if (ed.TonKho != null) setVal('pTonKho', ed.TonKho);
        const tb = document.getElementById('pTruongBp'); if (tb) tb.checked = !!ed.TruongBpDuyet;
        const pp = document.getElementById('pPrepay'); if (pp) pp.checked = !!ed.Prepay;
        if (ed.PrepayPercent != null) setVal('pPrepayPct', ed.PrepayPercent);
        togglePrepay();
        const ip = document.getElementById('pInPlan'); if (ip) ip.checked = !!ed.TrongKeHoachTuan;
        setVal('pGiaiTrinh', ed.GiaiTrinhNgoaiKeHoach || ''); togglePlanJustify();
        const tb2 = document.querySelector('#lineTable tbody'); if (tb2) tb2.innerHTML = '';
        (ed.lines || []).forEach(l => addLine({ matHang: l.matHang, slDat: l.slDat, donGia: l.donGia, vat: l.vat, ghiChu: l.ghiChu }));
        if (!(ed.lines || []).length) addLine();
      }
    }
    function setVal(id, v) { const e = document.getElementById(id); if (e) e.value = v; }
    async function addDeptPrompt() {
      const t = (prompt('Tên bộ phận mới:', '') || '').trim();
      if (!t) return;
      try { await call('rpc_add_department', { p_ten: t }); toast('Đã thêm bộ phận.', 'ok'); }
      catch (err) { toast(err.message || String(err), 'err'); }
    }
    async function addProposerPrompt() {
      const t = (prompt('Tên người đề nghị mới:', '') || '').trim();
      if (!t) return;
      const bp = (prompt('Bộ phận của người này (có thể để trống):', '') || '').trim();
      try { await call('rpc_add_proposer', { p_ten: t, p_bo_phan: bp || null }); toast('Đã thêm người đề nghị.', 'ok'); }
      catch (err) { toast(err.message || String(err), 'err'); }
    }
    async function editProposal(ma) {
      try { const res = await call('rpc_get_proposal', { p_ma_de_xuat: ma }); state.editingProposal = res.proposal; renderProposal(); toast('Đang sửa ' + ma, 'ok'); }
      catch (err) { toast(err.message || String(err), 'err'); }
    }
    function togglePrepay() {
      const on = document.getElementById('pPrepay')?.checked;
      const wrap = document.getElementById('pPrepayWrap');
      if (wrap) wrap.style.display = on ? 'block' : 'none';
      prepayHint();
    }
    function prepayHint() {
      const pct = Number(val('pPrepayPct')) || 0;
      const totalTxt = document.getElementById('proposalTotal')?.textContent || '';
      const total = Number(String(totalTxt).replace(/[^\d]/g, '')) || 0;
      const el = document.getElementById('pPrepayHint');
      if (el) el.textContent = pct ? `≈ ${fmtMoney(Math.round(total * pct / 100))} đ trả trước` : '';
    }
    function togglePlanJustify() {
      const inPlan = document.getElementById('pInPlan')?.checked;
      const wrap = document.getElementById('pJustifyWrap');
      if (wrap) wrap.style.display = inPlan ? 'none' : 'block';
    }
    function collectProposal(status) {
      const inPlan = document.getElementById('pInPlan')?.checked || false;
      return {
        status,
        loaiDeXuat: val('pLoai'),
        trongKeHoachTuan: inPlan,
        giaiTrinhNgoaiKeHoach: inPlan ? '' : val('pGiaiTrinh'),
        ngayDeXuat: val('pNgay'),
        nguoiDeNghi: val('pNguoi'),
        boPhan: val('pBoPhan'),
        hanThanhToan: val('pHan') || null,
        tonKho: val('pTonKho') || null,
        truongBpDuyet: document.getElementById('pTruongBp')?.checked || false,
        prepay: document.getElementById('pPrepay')?.checked || false,
        prepayPercent: (document.getElementById('pPrepay')?.checked ? (Number(val('pPrepayPct')) || null) : null),
        doiTuong: { ma: comboValue('pmaDoiTuong', 'pmaDoiTuongMoi'), ten: val('ptenDoiTuong'), dieuKhoanTT: val('pDieuKhoanTT') },
        dieuKhoanTT: val('pDieuKhoanTT'),
        lines: getProposalLines().filter(l => l.matHang && l.slDat && l.donGia)
      };
    }
    async function saveDraft(btn) {
      const ed = state.editingProposal;
      const p = collectProposal('Nháp');
      if (!p.nguoiDeNghi.trim()) { toast('Cần chọn người đề nghị.', 'err'); return; }
      if (!p.doiTuong.ten.trim()) { toast('Cần nhập tên đối tượng / NCC.', 'err'); return; }
      if (!p.lines.length) { toast('Cần ít nhất một dòng vật tư đầy đủ (mặt hàng, SL, đơn giá).', 'err'); return; }
      if (!p.hanThanhToan) { toast('Cần nhập hạn thanh toán.', 'err'); return; }
      if (!p.trongKeHoachTuan && !p.giaiTrinhNgoaiKeHoach.trim()) { toast('Khoản ngoài kế hoạch tuần — cần nhập giải trình.', 'err'); return; }
      const nFiles = document.getElementById('pFiles')?.files.length || 0;
      const hasOld = ed && (ed.Attachments || []).length > 0;
      if (p.loaiDeXuat === 'MuaHang' && !nFiles && !hasOld) { toast('Đề xuất mua hàng cần đính kèm báo giá.', 'err'); return; }
      try {
        p.attachments = await withBusy(btn, 'Đang tải tệp...', () => uploadAttachments('pFiles', 'proposals'));
        if (ed) {
          await call('rpc_update_proposal', { p_ma_de_xuat: ed.MaDeXuat, p_payload: p });
          toast(`Đã cập nhật nháp ${ed.MaDeXuat}.`, 'ok');
          state.editingProposal = null;
        } else {
          const res = await call('rpc_create_proposal', { p_payload: p });
          toast(`Đã lưu nháp ${res.maDeXuat}. Kiểm tra bên phải rồi bấm Gửi duyệt.`, 'ok');
        }
        renderProposal();
      } catch (err) { toast(err.message || String(err), 'err'); }
    }
    async function loadMyProposals() {
      const box = document.getElementById('myProposalsBox');
      if (!box) return;
      try {
        const res = await call('rpc_get_my_proposals', { p_limit: 30 });
        const rows = res.rows || [];
        box.innerHTML = rows.length ? rows.map(r => `<div class="approve-card" style="margin-bottom:10px">
            <div class="ac-top"><strong>${esc(r.MaDeXuat)}</strong>${proposalStatusPill(r.TrangThai)}</div>
            <div class="ac-obj">NCC: ${esc(r.TenDoiTuong||'')}${r.BoPhan?' · '+esc(r.BoPhan):''}</div>
            <div class="ac-meta">${esc(r.LoaiDeXuat==='TamUng'?'Tạm ứng':'Mua hàng')} · ${r.SoDong||0} dòng vật tư · Hạn TT: ${esc(r.HanThanhToan||'—')}</div>
            ${r.DieuKhoanTT?`<div class="ac-meta">Điều khoản TT: ${esc(r.DieuKhoanTT)}</div>`:''}
            <div class="ac-money">${fmtMoney(r.TongTien)} <small>đ (sau VAT)</small></div>
            ${r.TrangThai==='Nháp' && r.LyDoTraLai ? `<div class="notice err" style="margin-top:6px">↩ Bị trả lại: ${esc(r.LyDoTraLai)} — vui lòng chỉnh sửa/giải trình rồi gửi lại.</div>` : ''}
            ${r.TrangThai==='Từ chối' && r.GhiChu ? `<div class="status" style="margin-top:6px">Lý do: ${esc(r.GhiChu)}</div>` : ''}
            <div class="actions" style="margin-top:8px">
              <button class="secondary" onclick="openProposalDetailRO('${esc(r.MaDeXuat)}')">Xem chi tiết</button>
              ${r.TrangThai==='Nháp' ? `<button class="secondary" onclick="editProposal('${esc(r.MaDeXuat)}')">Sửa</button><button onclick="submitProposal('${esc(r.MaDeXuat)}', this)">Gửi duyệt →</button>` : ''}
            </div>
          </div>`).join('') : '<p class="status">Bạn chưa có đề xuất nào.</p>';
      } catch (err) { box.innerHTML = `<p class="status">${esc(err.message || err)}</p>`; }
    }
    async function submitProposal(ma, btn) {
      try {
        await withBusy(btn, 'Đang gửi...', () => call('rpc_submit_proposal', { p_ma_de_xuat: ma }));
        toast(`Đã gửi duyệt ${ma}.`, 'ok');
        loadMyProposals();
      } catch (err) { toast(err.message || String(err), 'err'); }
    }
    function proposalStatusPill(s) {
      if (s === 'Đã duyệt') return '<span class="pill ok">Đã duyệt</span>';
      if (s === 'Từ chối') return '<span class="pill err">Từ chối / hủy duyệt</span>';
      if (s === 'Nháp') return '<span class="pill warn">Nháp</span>';
      return '<span class="pill warn">Chờ duyệt</span>';
    }

    function lineRow(line={}) {
      return `<tr>
        <td><div class="combo-stack"><select class="js-mat-select" onchange="onLineMaterialChange(this)">${materialOptions(line.matHang)}</select><input class="js-mat-new" placeholder="Nhập mặt hàng mới" onchange="onLineMaterialChange(this)"></div><small class="js-price-hint status"></small></td>
        <td><input class="js-sl" inputmode="decimal" value="${esc(line.slDat || '')}" oninput="recalcLine(this)"></td>
        <td><input class="js-dongia js-money" inputmode="decimal" value="${line.donGia ? esc(moneyFormat(line.donGia)) : ''}" oninput="recalcLine(this)"></td>
        <td><div class="combo-stack"><select class="js-vat-select" onchange="recalcLine(this)"><option ${String(line.vat || '8%')==='0%'?'selected':''}>0%</option><option ${String(line.vat || '8%')==='8%'?'selected':''}>8%</option><option ${String(line.vat || '8%')==='10%'?'selected':''}>10%</option></select><input class="js-vat-new" placeholder="VAT khác, ví dụ 5%" oninput="recalcLine(this)"></div></td>
        <td class="js-thanhtien num-cell">0</td>
        <td><input class="js-ghichu" value="${esc(line.ghiChu || '')}"></td>
        <td><button class="secondary" onclick="this.closest('tr').remove(); recalcProposalTotal();">Xóa</button></td>
      </tr>`;
    }
    function addLine(line) {
      document.querySelector('#lineTable tbody').insertAdjacentHTML('beforeend', lineRow(line));
      const tr = document.querySelector('#lineTable tbody tr:last-child');
      if (tr) recalcLine(tr.querySelector('.js-sl'));
    }
    function copyLastLine() {
      const rows = getProposalLines();
      addLine(rows[rows.length - 1] || {});
    }
    function vatFromCombo(tr) {
      const raw = comboValue(tr.querySelector('.js-vat-select'), tr.querySelector('.js-vat-new'));
      const n = parseFloat(String(raw).replace('%', '').replace(',', '.'));
      if (!Number.isFinite(n)) return 0;
      return n >= 1 ? n / 100 : n;
    }
    function lineTotal(tr) {
      const sl = Number(String(tr.querySelector('.js-sl')?.value || '').replace(/\./g, '').replace(',', '.')) || 0;
      const gia = moneyNum(tr.querySelector('.js-dongia'));
      return Math.round(sl * gia * (1 + vatFromCombo(tr)) * 100) / 100;
    }
    function recalcLine(el) {
      const tr = el.closest('tr');
      if (!tr) return;
      const cell = tr.querySelector('.js-thanhtien');
      if (cell) cell.textContent = fmtMoney(lineTotal(tr));
      // Warn if this line's unit price (after VAT) is above the best known quote.
      const best = Number(tr.dataset.bestAfter || '');
      const hint = tr.querySelector('.js-price-hint');
      if (hint && Number.isFinite(best) && best > 0) {
        const unitAfter = moneyNum(tr.querySelector('.js-dongia')) * (1 + vatFromCombo(tr));
        hint.classList.toggle('over', unitAfter > best * 1.001);
      }
      recalcProposalTotal();
    }
    function recalcProposalTotal() {
      const trs = [...document.querySelectorAll('#lineTable tbody tr')];
      let pre = 0, after = 0;
      trs.forEach(tr => {
        const sl = Number(String(tr.querySelector('.js-sl')?.value || '').replace(/\./g, '').replace(',', '.')) || 0;
        const gia = moneyNum(tr.querySelector('.js-dongia'));
        pre += sl * gia;
        after += lineTotal(tr);
      });
      const setT = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = fmtMoney(v); };
      setT('totalPre', pre);
      setT('totalVat', Math.round((after - pre) * 100) / 100);
      const box = document.getElementById('proposalTotal');
      if (box) box.textContent = fmtMoney(after) + ' đ';
      prepayHint();
    }
    // When a material is chosen on a proposal line, pull the best known quote
    // and auto-fill the unit price (only if empty) + show a price hint.
    async function onLineMaterialChange(el) {
      const tr = el.closest('tr');
      if (!tr) return;
      const mat = comboValue(tr.querySelector('.js-mat-select'), tr.querySelector('.js-mat-new'));
      const hint = tr.querySelector('.js-price-hint');
      tr.dataset.bestAfter = '';
      if (hint) hint.classList.remove('over');
      if (!mat) { if (hint) hint.textContent = ''; return; }
      const dvt = dvtOf(mat);
      const dvtTag = dvt ? `ĐVT: <b>${esc(dvt)}</b> · ` : '';
      if (hint) hint.innerHTML = dvtTag + 'Đang lấy giá tốt nhất…';
      try {
        const res = await call('rpc_get_quote_dashboard', { p_item: mat, p_limit: 5 });
        const rows = res.rows || [];
        if (!rows.length) { if (hint) hint.innerHTML = dvtTag + 'Chưa có báo giá NCC cho mặt hàng này.'; return; }
        const b = rows[0]; // rank 1 = giá tốt nhất (sau VAT)
        tr.dataset.bestAfter = b.priceAfterVat;
        const gia = tr.querySelector('.js-dongia');
        if (gia && !moneyRaw(gia) && b.priceBeforeVat != null) {
          gia.value = moneyFormat(b.priceBeforeVat);
          recalcLine(gia);
        }
        if (hint) hint.innerHTML = dvtTag + `Giá tốt nhất: <b>${fmtMoney(b.priceAfterVat)} đ</b> sau VAT · ${esc(b.supplier)} (${esc(b.date)})`;
      } catch (e) { if (hint) hint.textContent = ''; }
    }
    function getProposalLines() {
      return [...document.querySelectorAll('#lineTable tbody tr')].map(tr => ({
        matHang: comboValue(tr.querySelector('.js-mat-select'), tr.querySelector('.js-mat-new')),
        slDat: (tr.querySelector('.js-sl')?.value || '').trim(),
        donGia: moneyRaw(tr.querySelector('.js-dongia')),
        vat: comboValue(tr.querySelector('.js-vat-select'), tr.querySelector('.js-vat-new')),
        ghiChu: tr.querySelector('.js-ghichu')?.value || ''
      }));
    }
    async function saveProposal(status, btn) {
      setMsg('Đang lưu đề xuất...');
      try {
        const inPlan = document.getElementById('pInPlan')?.checked || false;
        const payload = {
          status,
          loaiDeXuat: val('pLoai'),
          trongKeHoachTuan: inPlan,
          giaiTrinhNgoaiKeHoach: inPlan ? '' : val('pGiaiTrinh'),
          ngayDeXuat: val('pNgay'),
          nguoiDeNghi: val('pNguoi'),
          doiTuong: { ma: comboValue('pmaDoiTuong', 'pmaDoiTuongMoi'), ten: val('ptenDoiTuong'), dieuKhoanTT: val('pDieuKhoanTT') },
          noiDung: val('pNoiDung'),
          dieuKhoanTT: val('pDieuKhoanTT'),
          lines: getProposalLines()
        };
        if (status === 'Chờ duyệt' && !inPlan && !val('pGiaiTrinh').trim()) {
          setMsg('Khoản chưa có trong kế hoạch chi tuần — cần nhập giải trình trước khi gửi duyệt.');
          toast('Cần giải trình khoản ngoài kế hoạch tuần.', 'err');
          return;
        }
        const res = await withBusy(btn, 'Đang lưu...', () => call('rpc_create_proposal', { p_payload: payload }));
        setMsg(`Đã lưu ${res.maDeXuat} ở trạng thái ${res.status}.`);
        toast(`Đã lưu ${res.maDeXuat}.`, 'ok');
        renderProposal();
      } catch (err) { setMsg(err.message || err); toast(err.message || String(err), 'err'); }
    }

    function renderApprove() {
      document.getElementById('content').innerHTML = `
        <section class="card">
          <h2>Duyệt đề xuất mua hàng / tạm ứng</h2>
          <div class="notice ok">Danh sách chỉ hiện phiếu đúng thẩm quyền của bạn: <b>≥ 10 triệu → Chủ tịch</b>, <b>&lt; 10 triệu → Tổng giám đốc</b>. Nhấp vào một phiếu để xem chi tiết, so sánh giá NCC, và cờ kế hoạch chi tuần trước khi quyết định.</div>
          <div class="actions"><button class="secondary" onclick="loadPending(this)">↻ Tải lại danh sách chờ duyệt</button></div>
          <div id="pendingBox" style="margin-top:14px">${loadingText('Đang tải danh sách chờ duyệt...')}</div>
        </section>
        <section class="card" style="margin-top:16px">
          <h2>Phiếu đã duyệt theo ngày</h2>
          <div class="notice ok">Chọn ngày để xem lại toàn bộ phiếu đã duyệt. Có thể <b>hủy duyệt</b> (kèm lý do) nếu chưa phát sinh thanh toán.</div>
          <div class="actions" style="align-items:flex-end">
            <div class="field" style="margin:0"><label>Ngày duyệt</label><input id="approvedDate" type="date" value="${todayStr()}"></div>
            <button class="secondary" onclick="loadApproved(this)">Xem phiếu đã duyệt</button>
          </div>
          <div id="approvedBox" style="margin-top:14px"></div>
        </section>`;
      loadPending();
      loadApproved();
    }
    async function loadApproved(btn) {
      const box = document.getElementById('approvedBox');
      if (box) box.innerHTML = loadingText('Đang tải phiếu đã duyệt...');
      try {
        const res = await withBusy(btn, 'Đang tải...', () => call('rpc_get_approved_proposals', { p_date: val('approvedDate') || null }));
        state.approved = res.rows || [];
        drawApproved();
      } catch (err) { if (box) box.innerHTML = `<p class="status">${esc(err.message || err)}</p>`; }
    }
    function drawApproved() {
      const box = document.getElementById('approvedBox');
      const rows = state.approved || [];
      if (!rows.length) { box.innerHTML = '<p class="status">Không có phiếu nào được duyệt trong ngày đã chọn.</p>'; return; }
      box.innerHTML = `<div class="approve-grid">${rows.map(cardApproved).join('')}</div>`;
    }
    function cardApproved(p) {
      const loai = p.LoaiDeXuat === 'TamUng' ? 'Tạm ứng' : 'Mua hàng';
      const canUndo = !p.DaPhatSinhTT;
      return `<div class="approve-card">
        <div class="ac-top"><strong>${esc(p.MaDeXuat)}</strong><span class="pill ok">${esc(loai)}</span></div>
        <div class="ac-obj">${esc(p.TenDoiTuong || '')}</div>
        <div class="ac-money">${fmtMoney(p.TongTien)} <small>đ</small></div>
        <div class="ac-meta">Duyệt: ${esc(p.NgayDuyet || '')} · ${esc(p.NguoiDuyet || '')}</div>
        <div class="ac-meta">${p.DaNghiemThu ? '<span class="pill ok">Đã nghiệm thu</span>' : '<span class="pill warn">Chưa nghiệm thu</span>'} ${p.DaPhatSinhTT ? '<span class="pill ok">Đã thanh toán</span>' : ''}</div>
        <div class="actions" style="margin-top:10px">
          <button class="secondary" onclick="openApprovedDetail('${esc(p.MaDeXuat)}')">Xem chi tiết</button>
          ${canUndo
            ? `<button class="danger" onclick="unapproveProposal('${esc(p.MaDeXuat)}', this)">Hủy duyệt</button>`
            : `<span class="pill warn">Đã phát sinh TT — khóa</span>`}
        </div>
      </div>`;
    }
    async function unapproveProposal(ma, btn) {
      let reason = document.getElementById('undoNote')?.value || '';
      if (!reason.trim()) reason = prompt('Lý do hủy duyệt (bắt buộc, gửi bộ phận mua hàng):', '') || '';
      if (!reason.trim()) { toast('Cần nhập lý do hủy duyệt.', 'err'); return; }
      try {
        await withBusy(btn, 'Đang hủy duyệt...', () => call('rpc_unapprove_proposal', { p_ma_de_xuat: ma, p_reason: reason }));
        toast(`Đã hủy duyệt ${ma}.`, 'ok');
        closeModal();
        loadApproved();
        loadPending();
      } catch (err) { toast(err.message || String(err), 'err'); }
    }
    async function loadPending(btn) {
      const box = document.getElementById('pendingBox');
      if (box) box.innerHTML = loadingText('Đang tải danh sách chờ duyệt...');
      try {
        const res = await withBusy(btn, 'Đang tải...', () => call('rpc_get_pending_proposals', { p_limit: 100 }));
        state.pending = res.rows || [];
        drawPending();
      } catch (err) { if (box) box.innerHTML = `<p class="status">${esc(err.message || err)}</p>`; toast(err.message || String(err), 'err'); }
    }
    function drawPending() {
      const box = document.getElementById('pendingBox');
      if (!box) return;
      const rows = state.pending || [];
      if (!rows.length) { box.innerHTML = '<p class="status">Không có đề xuất nào chờ duyệt.</p>'; return; }
      const inPlan = rows.filter(r => r.TrongKeHoachTuan);
      const offPlan = rows.filter(r => !r.TrongKeHoachTuan);
      const sum = list => list.reduce((s, r) => s + Number(r.TongTien || 0), 0);
      const sec = (title, tone, list) => `
        <div class="approve-sec ${tone}">
          <div class="approve-sec-h">
            <span>${title}</span>
            <span class="approve-sec-sum">${list.length} phiếu · ${fmtMoney(sum(list))} đ</span>
          </div>
          ${list.length ? `<div class="approve-grid">${list.map(r => cardPending(r, tone)).join('')}</div>` : '<p class="status" style="padding:4px 2px">Không có phiếu.</p>'}
        </div>`;
      box.innerHTML =
        sec('✔ Đã nằm trong kế hoạch chi tuần', 'ok', inPlan) +
        sec('⚠ Chưa nằm trong kế hoạch — khoản phát sinh (xem giải trình)', 'warn', offPlan);
    }
    function cardPending(p, tone) {
      const loai = p.LoaiDeXuat === 'TamUng' ? 'Tạm ứng' : 'Mua hàng';
      const nLines = (p.lines || []).length;
      const nFiles = (p.Attachments || []).length;
      return `<div class="approve-card ${tone==='warn'?'card-warn':''}" onclick="openProposalDetail('${esc(p.MaDeXuat)}')">
        <div class="ac-top"><strong>${esc(p.MaDeXuat)}</strong><span class="pill">${esc(loai)}</span></div>
        <div class="ac-obj">${esc(p.TenDoiTuong || '')}</div>
        <div class="ac-money">${fmtMoney(p.TongTien)} <small>đ (sau VAT)</small></div>
        <div class="ac-meta">${esc(p.NgayDeXuat || '')} · ${nLines} dòng · ${esc(p.NguoiDeNghi || '')}${p.BoPhan ? ' (' + esc(p.BoPhan) + ')' : ''}</div>
        <div class="ac-meta">${nFiles ? '📎 ' + nFiles + ' báo giá' : '⚠ chưa có báo giá'} · Hạn TT: ${esc(p.HanThanhToan || '—')} · ${p.TruongBpDuyet ? 'Trưởng BP ✔' : 'Trưởng BP —'}</div>
        <div class="ac-hint">Nhấp để xem chi tiết, file đính kèm &amp; duyệt →</div>
      </div>`;
    }

    function linesDetailTable(lines, opt = {}) {
      lines = lines || [];
      let tong = 0;
      const body = lines.map((l, i) => {
        tong += Number(l.ThanhTienSauVAT || 0);
        const dvt = dvtOf(l.MatHang) || '—';
        const cmp = opt.clickable ? ' <span class="mini-link">so sánh giá ↗</span>' : '';
        const attrs = opt.clickable ? ` class="line-clickable" onclick="showLineCompare('${esc(opt.ma)}', ${i})" title="Xem so sánh giá NCC"` : '';
        const gc = l.GhiChu ? `<div class="status" style="font-size:12px">Ghi chú: ${esc(l.GhiChu)}</div>` : '';
        return `<tr${attrs}>
          <td>${esc(l.MatHang)}${cmp}${gc}</td>
          <td>${esc(dvt)}</td>
          <td>${fmtMaybeMoney(l.SLDat)}</td>
          <td>${fmtMoney(l.DonGiaChuaVAT)}</td>
          <td>${fmtPct(l.VATRate)}</td>
          <td>${fmtMoney(l.ThanhTienSauVAT)}</td>
        </tr>`;
      }).join('');
      return `<div class="table-wrap" style="max-height:none"><table>

    async function showLineCompare(ma, idx) {
      const p = (state.pending || []).find(x => x.MaDeXuat === ma);
      if (!p) return;
      const line = (p.lines || [])[idx];
      const box = document.getElementById('lineCompareBox');
      if (!line || !box) return;
      box.innerHTML = `<div class="compare-panel">${loadingText('Đang lấy báo giá NCC cho "' + esc(line.MatHang) + '"...')}</div>`;
      try {
        const res = await call('rpc_get_quote_dashboard', { p_item: line.MatHang, p_limit: 15 });
        const rows = res.rows || [];
        const best = res.best;
        const cmp = rows.length ? `
          <table><thead><tr><th>#</th><th>NCC</th><th>Ngày</th><th>Giá sau VAT</th><th>Xu hướng</th></tr></thead>
          <tbody>${rows.map(r => `<tr class="${r.rank===1?'best-row':''}">
            <td>${esc(r.rank)}</td><td>${esc(r.supplier)}</td><td>${esc(r.date)}</td>
            <td>${fmtMaybeMoney(r.priceAfterVat)}</td><td>${esc(r.trend||'')}</td></tr>`).join('')}</tbody></table>`
          : '<p class="status">Chưa có báo giá NCC nào cho mặt hàng này trong dữ liệu Báo giá.</p>';
        const donGiaSauVat = Number(line.DonGiaChuaVAT) * (1 + Number(line.VATRate || 0));
        box.innerHTML = `<div class="compare-panel">
          <div class="compare-head">
            <strong>So sánh giá NCC — ${esc(line.MatHang)}</strong>
            <button class="secondary" onclick="document.getElementById('lineCompareBox').innerHTML=''">Đóng</button>
          </div>
          <div class="notice ${best && donGiaSauVat > Number(best.priceAfterVat) ? 'err' : 'ok'}">
            Đơn giá trong phiếu (sau VAT): <b>${fmtMoney(Math.round(donGiaSauVat))} đ</b>${best ? ` · Giá tốt nhất đang có: <b>${fmtMoney(best.priceAfterVat)} đ</b> (${esc(best.supplier)})` : ''}
          </div>
          <div class="table-wrap" style="max-height:280px">${cmp}</div>
        </div>`;
      } catch (err) {
        box.innerHTML = `<div class="compare-panel"><p class="status">Không lấy được báo giá: ${esc(err.message || err)}</p></div>`;
      }
    }

    async function approveProposal(ma, btn) {
      const note = document.getElementById('approveNote')?.value || '';
      if (!confirm(`Duyệt đề xuất ${ma}?`)) return;
      try {
        const res = await withBusy(btn, 'Đang duyệt...', () => call('rpc_approve_proposal', { p_ma_de_xuat: ma, p_note: note }));
        toast(`Đã duyệt ${ma}, chuyển ${res.congNoRows} dòng sang công nợ.`, 'ok');
        closeModal();
        loadPending();
      } catch (err) { toast(err.message || String(err), 'err'); }
    }
    async function rejectProposal(ma, btn) {
      const reason = (document.getElementById('approveNote')?.value || '').trim();
      if (!reason) { toast('Cần nhập lý do từ chối để bộ phận mua hàng phản hồi.', 'err'); return; }
      try {
        await withBusy(btn, 'Đang từ chối...', () => call('rpc_reject_proposal', { p_ma_de_xuat: ma, p_reason: reason }));
        toast(`Đã từ chối ${ma}.`, 'ok');
        closeModal();
        loadPending();
      } catch (err) { toast(err.message || String(err), 'err'); }
    }

    async function loadReceiptHistory() {
      const box = document.getElementById('receiptHistoryBox'); if (!box) return;
      try {
        const res = await call('rpc_get_receipt_history', { p_limit: 40 });
        const rows = res.rows || [];
        box.innerHTML = rows.length ? `<div class="table-wrap"><table><thead><tr><th>Mã CN</th><th>NCC</th><th>Mặt hàng</th><th>SL thực nhận</th><th>Ngày nhận</th><th>Hồ sơ</th><th>Hạn TT</th></tr></thead><tbody>
          ${rows.map(r => `<tr><td><code>${esc(r.MaCN)}</code></td><td>${esc(r.TenDoiTuong||'')}</td><td>${esc(r.MatHang||'')}</td>
            <td class="num-cell">${fmtMaybeMoney(r.SLThucNhan)}</td><td>${esc(r.NgayNhan||'')}</td>
            <td>${r.HoSoDayDu?'<span class="pill ok">Đủ</span>':'<span class="pill warn">Thiếu</span>'}</td><td>${esc(r.HanThanhToan||'—')}</td></tr>`).join('')}

    async function loadReceiptItems(btn) {
      const box = document.getElementById('receiptItems');
      if (box) box.innerHTML = loadingText('Đang tải...');
      try {
        const res = await withBusy(btn, 'Đang tải...', () => call('rpc_get_open_receipt_items', { p_limit: 200 }));
        state.receiptItems = res.rows || [];
        drawReceiptItems();
      } catch (err) { if (box) box.innerHTML = `<p class="status">${esc(err.message || err)}</p>`; }
    }
    function drawReceiptItems() {
      const box = document.getElementById('receiptItems');
      const rows = state.receiptItems || [];
      if (!rows.length) { box.innerHTML = '<p class="status">Không có khoản nào chờ nghiệm thu.</p>'; return; }
      box.innerHTML = rows.map((r, i) => `<div class="approve-card" style="margin-bottom:10px${r.ChoBoSung?';border-color:var(--danger)':''}" onclick="pickReceipt(${i})">
        <div class="ac-top"><strong>${esc(r.MaCN)}</strong>${r.ChoBoSung?'<span class="pill err">Cần bổ sung</span>':'<span class="pill">'+esc(r.MaDeXuat||'')+'</span>'}</div>
        <div class="ac-obj">NCC: ${esc(r.TenDoiTuong||'')}</div>
        <div class="ac-meta">Mặt hàng: <b>${esc(r.MatHang||'')}</b> · ĐVT: ${esc(r.dvt || dvtOf(r.MatHang) || '—')} · SL đặt: ${fmtMaybeMoney(r.SLDat)}</div>
        <div class="ac-meta">Đơn giá (chưa VAT): ${fmtMoney(r.DonGia)} · VAT ${fmtPct(r.VATRate)} · Giá sau VAT: <b>${fmtMoney(r.ThanhTienDat)}đ</b></div>

        <div class="ac-meta">Người đề nghị: ${esc(r.NguoiDeNghi||'')} · duyệt ${esc(r.NgayDuyet||'')} · 📎 ${(r.Attachments||[]).length} báo giá</div>
        <div class="ac-hint">Nhấp để nạp vào form nghiệm thu →</div>
      </div>`).join('');

    function pickReceipt(i) {
      const r = (state.receiptItems || [])[i];
      if (!r) return;
      state.currentReceipt = r;
      document.getElementById('rMaCN').value = r.MaCN;
      const rb = document.getElementById('rReturnBanner');
      if (rb) rb.innerHTML = r.ChoBoSung ? `<div class="notice err">↩ Kế toán trả lại — cần bổ sung: ${esc(r.LyDoBoSung || '')}. Bổ sung chứng từ rồi Lưu lại.</div>` : '';
      document.getElementById('rInfo').innerHTML = `<div><b>${esc(r.MatHang||'')}</b> — ${esc(r.TenDoiTuong||'')}</div><div>ĐVT: ${esc(r.dvt||dvtOf(r.MatHang)||'—')} · SL đặt: ${fmtMaybeMoney(r.SLDat)} · Đơn giá: ${fmtMoney(r.DonGia)} · VAT ${fmtPct(r.VATRate)}</div><div style="margin-top:4px">Báo giá gốc: ${attachLinks(r.Attachments)}</div>`;
      const han = document.getElementById('rHan'); if (han && r.HanThanhToan) han.value = r.HanThanhToan;
      const types = (r.ChungTuTypes || []);
      document.querySelectorAll('.ct-type').forEach(c => c.checked = types.includes(c.value));
      const sl = document.getElementById('rSL');
      sl.value = moneyFormat(r.SLThucNhan != null ? r.SLThucNhan : r.SLDat);
      recalcReceipt();
      toast(`Đã nạp ${r.MaCN}. Sửa khối lượng thực nhận nếu khác.`, 'ok');
    }
    function recalcReceipt() {
      const r = state.currentReceipt;
      const box = document.getElementById('rThanhTien');
      if (!r || !box) { if (box) box.textContent = '0 đ'; return; }
      const sl = moneyNum('rSL');
      const tt = sl * Number(r.DonGia || 0) * (1 + Number(r.VATRate || 0));
      box.textContent = fmtMoney(Math.round(tt)) + ' đ';
    }
    async function saveReceipt(btn) {
      const maCN = val('rMaCN');
      if (!maCN) { setMsg('Chọn một khoản ở danh sách bên phải trước.'); toast('Chưa chọn khoản nghiệm thu.', 'err'); return; }
      if (!moneyRaw('rSL')) { toast('Cần nhập SL thực nhận.', 'err'); return; }
      const chungTuTypes = [...document.querySelectorAll('.ct-type:checked')].map(c => c.value);
      try {
        const files = await withBusy(btn, 'Đang tải tệp...', () => uploadAttachments('rFiles', 'receipts'));
        const hoaDon = await withBusy(btn, 'Đang tải tệp...', () => uploadAttachments('rHoaDon', 'invoices'));
        await withBusy(btn, 'Đang lưu...', () => call('rpc_update_receipt', { p_payload: {
          maCN, slThucNhan: moneyRaw('rSL'), ngayNhan: val('rNgay'),
          chungTu: val('rChungTu'), hanThanhToan: val('rHan') || null,
          chungTuTypes, files: files.concat(hoaDon || []), hoaDonFiles: hoaDon, ghiChu: val('rGhiChu')
        } }));
        toast(`Đã nghiệm thu ${maCN} — gửi kế toán duyệt chứng từ.`, 'ok');
        state.currentReceipt = null;
        renderReceipt();
      } catch (err) { setMsg(err.message || err); toast(err.message || String(err), 'err'); }
    }

    const COL_VI = {
      maDoiTuong:'Mã đối tượng', tenDoiTuong:'Tên đối tượng', actual:'Giá trị thực nhận', paid:'Đã thanh toán',
      ap:'Còn phải trả', ar:'Trả trước/tạm ứng', net:'Chênh lệch', count:'Số khoản', status:'Trạng thái',
      MaCN:'Mã công nợ', MaDoiTuong:'Mã ĐT', TenDoiTuong:'Tên đối tượng', MatHang:'Mặt hàng', SLDat:'SL đặt',
      SLThucNhan:'SL thực nhận', ThanhTienThucNhan:'Thành tiền thực nhận', DaThanhToan:'Đã thanh toán', TrangThai:'Trạng thái',
      MaThanhToan:'Mã thanh toán', NgayThanhToan:'Ngày thanh toán', SoTien:'Số tiền', PhanBoMode:'Cách phân bổ', ChungTu:'Chứng từ',
      MaDeXuat:'Mã đề xuất', NgayDeXuat:'Ngày đề xuất', NoiDung:'Nội dung', DieuKhoanTT:'Điều khoản TT', NguoiTao:'Người tạo',
      action:'Thao tác', maCN:'Mã công nợ', doiTuong:'Đối tượng', allocated:'Phân bổ', conLai:'Còn lại'
    };
    function colLabel(c){ return COL_VI[c] || c; }
    function table(rows, cols, actionFn) {
      rows = rows || [];
      if (!rows.length) return '<p class="status">Không có dữ liệu.</p>';
      return `<table><thead><tr>${cols.map(c => `<th>${esc(colLabel(c))}</th>`).join('')}${actionFn ? '<th>Thao tác</th>' : ''}</tr></thead><tbody>` +
        rows.map(r => `<tr>${cols.map(c => `<td>${esc(formatCell(r[c]))}</td>`).join('')}${actionFn ? `<td>${actionFn(r)}</td>` : ''}</tr>`).join('') +
        '</tbody></table>';
    }
    function formatCell(v) {
      if (typeof v === 'number') return fmtMoney(v);
      return v ?? '';
    }
    // Gắn nhãn cột vào từng ô (để mobile hiển thị "Nhãn: giá trị" khi bảng xếp dọc).
    function jumpTo(id) { const el = document.getElementById(id); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
    // Thanh "mục con" tự động (kiểu Gmail): với màn có ≥2 phần, chèn dải chip để
    // nhấn nhảy thẳng tới phần đó — chỉ hiện trên mobile. Bỏ qua nếu màn đã có .mjump.
    function buildSectionNav() {
      const c = document.getElementById('content');
      if (!c || c.querySelector(':scope > .secnav') || c.querySelector('.mjump')) return;
      const heads = [...c.querySelectorAll('h2, h3')].filter(h => (h.textContent || '').trim());
      if (heads.length < 2) return;
      heads.forEach((h, i) => { if (!h.id) h.id = 'sec_' + i; });
      const bar = document.createElement('div');
      bar.className = 'secnav';
      bar.innerHTML = heads.map(h => `<button type="button" onclick="jumpTo('${h.id}')">${esc((h.textContent || '').trim())}</button>`).join('');
      c.insertBefore(bar, c.firstChild);
    }
    function labelTableCells(root) {
      (root || document).querySelectorAll('table').forEach(tb => {
        const ths = [...tb.querySelectorAll('thead th')].map(th => th.textContent.trim());
        if (!ths.length) return;
        tb.querySelectorAll('tbody tr').forEach(tr => {
          [...tr.children].forEach((td, i) => { if (ths[i] != null && !td.hasAttribute('data-label')) td.setAttribute('data-label', ths[i]); });
        });
      });
    }
    (function watchTables() {
      const c = document.getElementById('content');
      if (!c) return;
      let queued = false;
      const obs = new MutationObserver(() => {
        if (queued) return; queued = true;
        requestAnimationFrame(() => { queued = false; labelTableCells(c); buildSectionNav(); });
      });
      obs.observe(c, { childList: true, subtree: true });
    })();
    (function initToTop() {
      const back = document.createElement('button');
      back.className = 'back-fab'; back.id = 'backFab'; back.innerHTML = '← Quay lại'; back.title = 'Về màn trước';
      back.onclick = () => goBack();
      document.body.appendChild(back);
      const b = document.createElement('button');
      b.className = 'to-top'; b.id = 'toTop'; b.textContent = '↑'; b.title = 'Lên đầu trang';
      b.onclick = () => { window.scrollTo({ top: 0, behavior: 'smooth' }); const m = document.querySelector('main'); if (m) m.scrollTo({ top: 0, behavior: 'smooth' }); };
      document.body.appendChild(b);
      const onScroll = () => { const y = window.scrollY || document.documentElement.scrollTop || (document.querySelector('main')?.scrollTop || 0); b.classList.toggle('show', y > 400); };
      window.addEventListener('scroll', onScroll, { passive: true });
      const m = document.querySelector('main'); if (m) m.addEventListener('scroll', onScroll, { passive: true });
    })();

    // ---- Danh mục (master data) -------------------------------------------
    // In-app management of materials (mã hoá vật tư + nhóm hàng) and suppliers.
    // Reads via rpc_list_catalog; writes via rpc_upsert_material /
    // rpc_upsert_doi_tuong. Add/edit buttons only show for catalog:manage.
    function renderCatalog() {
      document.getElementById('content').innerHTML = `
        <section class="card">
          <h2>Danh mục — Mã hoá vật tư &amp; nhà cung cấp</h2>
          <div class="notice ok">Mã cố định giúp thống kê chính xác kể cả khi tên gõ khác nhau. Mỗi mặt hàng nên có 1 nhóm hàng để lãnh đạo tổng hợp đúng.</div>
          <div class="cat-tabs">
            <button id="catTabMat" class="active" onclick="switchCatTab('mat')">Mặt hàng (NVL)</button>
            <button id="catTabNcc" class="secondary" onclick="switchCatTab('ncc')">Nhà cung cấp</button>
          </div>
          <div id="catBody" style="margin-top:14px">${loadingText('Đang tải danh mục...')}</div>
        </section>`;
      state.catTab = state.catTab || 'mat';
      loadCatalog();
    }

    async function loadCatalog() {
      try {
        const res = await call('rpc_list_catalog');
        state.catalog = { materials: res.materials || [], suppliers: res.suppliers || [], groups: res.groups || [], canCreate: !!res.canCreate, canManage: !!res.canManage };
        drawCatalog();
      } catch (err) {
        document.getElementById('catBody').innerHTML = `<p class="status">Không tải được danh mục: ${esc(err.message || err)}</p>`;
        toast(err.message || String(err), 'err');
      }
    }
    function switchCatTab(tab) {
      state.catTab = tab;
      document.getElementById('catTabMat').className = tab === 'mat' ? 'active' : 'secondary';
      document.getElementById('catTabNcc').className = tab === 'ncc' ? 'active' : 'secondary';
      drawCatalog();
    }
    function statusPill(s) {
      return s === 'Ngừng' ? '<span class="pill err">Ngừng</span>' : '<span class="pill ok">Hoạt động</span>';
    }
    function drawCatalog() {
      const box = document.getElementById('catBody');
      if (!box) return;
      const manage = !!(state.catalog && state.catalog.canManage) || can('catalog:manage');
      const canCreate = !!(state.catalog && state.catalog.canCreate) || manage;
      if (state.catTab === 'mat') {
        const rows = state.catalog.materials;
        const noDvt = rows.filter(m => !String(m.dvt || '').trim()).length;
        const noNhom = rows.filter(m => !String(m.nhom || '').trim()).length;
        const addBtn = (manage ? `<button class="secondary" onclick="openGroupManager()">Nhóm hàng</button><button class="secondary" onclick="addProposerPrompt()">Người đề nghị</button><button onclick="openMaterialForm()">＋ Thêm mặt hàng</button>` : (canCreate ? `<button onclick="createMaterialPopup(()=>loadCatalog())">＋ Thêm mặt hàng</button>` : ''));
        const warn = (noDvt || noNhom) ? `<div class="notice err" style="margin-bottom:10px">⚠ Cần chuẩn hoá danh mục: ${noDvt ? `<b>${noDvt}</b> mặt hàng chưa có ĐVT` : ''}${noDvt && noNhom ? ' · ' : ''}${noNhom ? `<b>${noNhom}</b> mặt hàng chưa gán nhóm` : ''}. <a href="#" onclick="filterMissingDvt(event)">Lọc mặt hàng thiếu ĐVT</a></div>` : `<div class="notice ok" style="margin-bottom:10px">✔ Mọi mặt hàng đều có ĐVT và nhóm hàng.</div>`;
        box.innerHTML = `
          ${warn}
          <div class="cat-toolbar">
            <input id="catMatSearch" placeholder="Tìm theo mã / tên / nhóm..." oninput="drawCatalog._filter()">
            ${addBtn}
          </div>
          <div class="table-wrap" style="margin-top:12px">
            <table><thead><tr>
              <th>Mã VT</th><th>Tên mặt hàng</th><th>Nhóm hàng</th><th>ĐVT</th><th>Bộ phận</th><th>Trạng thái</th>${manage ? '<th>Thao tác</th>' : ''}
            </tr></thead><tbody id="catMatRows">
              ${rows.map(m => matRow(m, manage)).join('')}
            </tbody></table>
          </div>
          <small>${rows.length} mặt hàng.</small>`;
      } else {
        const rows = state.catalog.suppliers;
        const addBtn = (manage ? `<button onclick="openSupplierForm()">＋ Thêm nhà cung cấp</button>` : (canCreate ? `<button onclick="createSupplierPopup(()=>loadCatalog())">＋ Thêm nhà cung cấp</button>` : ''));
        box.innerHTML = `
          <div class="cat-toolbar">
            <input id="catNccSearch" placeholder="Tìm theo mã / tên / MST..." oninput="drawCatalog._filter()">
            ${addBtn}
          </div>
          <div class="table-wrap" style="margin-top:12px">
            <table><thead><tr>
              <th>Mã ĐT</th><th>Tên đối tượng</th><th>Loại</th><th>Liên hệ</th><th>Điều khoản TT</th><th>Bộ phận</th><th>Trạng thái</th>${manage ? '<th>Thao tác</th>' : ''}
            </tr></thead><tbody id="catNccRows">
              ${rows.map(s => nccRow(s, manage)).join('')}
            </tbody></table>
          </div>
          <small>${rows.length} đối tượng.</small>`;
      }
    }
    function matRow(m, manage) {
      return `<tr>
        <td><code>${esc(m.ma || '')}</code></td>
        <td>${esc(m.ten || '')}</td>
        <td>${m.nhom ? esc(m.nhom) : '<span class="pill warn">Chưa gán</span>'}</td>
        <td>${m.dvt ? esc(m.dvt) : '<span class="pill err">Thiếu ĐVT</span>'}</td>
        <td>${m.boPhan ? esc(m.boPhan) : '<span class="status">chung</span>'}</td>
        <td>${statusPill(m.trangThai)}</td>
        ${manage ? `<td><button class="secondary" onclick="openMaterialForm('${m.id}')">Sửa</button></td>` : ''}
      </tr>`;
    }
    function nccRow(s, manage) {
      return `<tr>
        <td><code>${esc(s.ma || '')}</code></td>
        <td>${esc(s.ten || '')}</td>
        <td>${esc(s.loai || '')}</td>
        <td>${esc(s.contact || s.sdt || '')}</td>
        <td>${esc(s.dieuKhoan || '')}</td>
        <td>${s.boPhan ? esc(s.boPhan) : '<span class="status">chung</span>'}</td>
        <td>${statusPill(s.trangThai)}</td>
        ${manage ? `<td><button class="secondary" onclick="openSupplierForm('${s.id}')">Sửa</button></td>` : ''}
      </tr>`;
    }
    drawCatalog._filter = function () {
      if (state.catTab === 'mat') {
        const q = normLower(val('catMatSearch'));
        const body = document.getElementById('catMatRows');
        body.innerHTML = state.catalog.materials
          .filter(m => !q || normLower(`${m.ma} ${m.ten} ${m.nhom} ${m.dvt}`).includes(q))
          .map(m => matRow(m, can('catalog:manage'))).join('');
      } else {
        const q = normLower(val('catNccSearch'));
        const body = document.getElementById('catNccRows');
        body.innerHTML = state.catalog.suppliers
          .filter(s => !q || normLower(`${s.ma} ${s.ten} ${s.mst} ${s.contact}`).includes(q))
          .map(s => nccRow(s, can('catalog:manage'))).join('');
      }
    };
    function normLower(s) { return String(s ?? '').toLowerCase(); }
    function filterMissingDvt(e) {
      if (e) e.preventDefault();
      const body = document.getElementById('catMatRows');
      if (!body) return;
      const miss = state.catalog.materials.filter(m => !String(m.dvt || '').trim());
      body.innerHTML = miss.length ? miss.map(m => matRow(m, can('catalog:manage'))).join('')
        : '<tr><td colspan="6">Không còn mặt hàng nào thiếu ĐVT.</td></tr>';
      const s = document.getElementById('catMatSearch'); if (s) s.value = '';
    }

    // ---- modal + forms -----------------------------------------------------
    function openModal(title, bodyHtml, onSave, saveLabel) {
      closeModal();
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.id = 'catModal';
      const footer = onSave ? `
          <div class="actions">
            <button id="catSaveBtn">${esc(saveLabel || 'Lưu')}</button>
            <button class="secondary" onclick="closeModal()">Huỷ</button>
          </div>` : `
          <div class="actions"><button class="secondary" onclick="closeModal()">Đóng</button></div>`;
      overlay.innerHTML = `
        <div class="modal-card card">
          <h2>${esc(title)}</h2>
          <div class="notice err js-modal-msg hidden"></div>
          ${bodyHtml}
          ${footer}
        </div>`;
      document.body.appendChild(overlay);
      try { labelTableCells(overlay); } catch (e) {}
      overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
      if (onSave) document.getElementById('catSaveBtn').onclick = function () { onSave(this); };
    }
    function closeModal() { const m = document.getElementById('catModal'); if (m) m.remove(); }
    function modalErr(text) {
      const el = document.querySelector('#catModal .js-modal-msg');
      if (el) { el.textContent = text || ''; el.classList.toggle('hidden', !text); }
    }
    // Hộp nhập lý do (thay prompt() — thân thiện trên điện thoại).
    function promptReason(title, placeholder, onConfirm, confirmLabel) {
      openModal(title, `<div class="field"><label>Lý do</label><textarea id="reasonInput" rows="3" placeholder="${esc(placeholder || '')}"></textarea></div>`,
        function () {
          const v = (document.getElementById('reasonInput')?.value || '').trim();
          if (!v) { modalErr('Vui lòng nhập lý do.'); return; }
          closeModal();
          Promise.resolve(onConfirm(v)).catch(err => toast(err.message || String(err), 'err'));
        }, confirmLabel || 'Xác nhận');
      setTimeout(() => document.getElementById('reasonInput')?.focus(), 60);
    }
    // ---- Popup tạo nhanh vật tư / NCC (mã tự sinh, gắn bộ phận người tạo) ----
    function createMaterialPopup(onDone) {
      openModal('Tạo mặt hàng mới', `
        <div class="notice">Mã vật tư do <b>hệ thống tự tạo</b>. Chỉ cần điền các ô <b>tô vàng</b>.</div>
        <div class="field"><label>Tên mặt hàng *</label><input id="cmTen" class="hl-input"></div>
        <div class="grid">
          <div class="field"><label>Đơn vị tính (ĐVT) *</label><input id="cmDvt" class="hl-input" placeholder="lít, kg, phuy…"></div>
          <div class="field"><label>Nhóm hàng</label><input id="cmNhom" class="hl-input" placeholder="(tùy chọn)"></div>
        </div>`, async function () {
          const ten = (val('cmTen') || '').trim(); if (!ten) { modalErr('Nhập tên mặt hàng.'); return; }
          try {
            const r = await call('rpc_create_material_quick', { p_ten: ten, p_dvt: val('cmDvt') || null, p_nhom: val('cmNhom') || null });
            if (r.ten && !(state.vatTu || []).includes(r.ten)) state.vatTu.push(r.ten);
            if (r.ten && !(state.vatTuInfo || []).some(x => x.ten === r.ten)) state.vatTuInfo.push({ ten: r.ten, dvt: r.dvt });
            closeModal(); toast(r.existed ? 'Mặt hàng đã có — đã chọn.' : 'Đã tạo mặt hàng.', 'ok'); if (onDone) onDone(r);
          } catch (e) { modalErr(e.message || String(e)); }
        }, 'Tạo');
      setTimeout(() => document.getElementById('cmTen')?.focus(), 60);
    }
    function createSupplierPopup(onDone) {
      openModal('Tạo nhà cung cấp mới', `
        <div class="notice">Mã NCC do <b>hệ thống tự tạo</b>. Điền các ô <b>tô vàng</b> (Tên bắt buộc).</div>
        <div class="field"><label>Tên nhà cung cấp *</label><input id="csTen" class="hl-input"></div>
        <div class="grid">
          <div class="field"><label>MST</label><input id="csMst" class="hl-input"></div>
          <div class="field"><label>Điều khoản thanh toán</label><input id="csDk" class="hl-input" placeholder="VD: NET30"></div>
        </div>
        <div class="grid">
          <div class="field"><label>Số TK ngân hàng</label><input id="csStk" class="hl-input"></div>
          <div class="field"><label>Ngân hàng / chi nhánh</label><input id="csCn" class="hl-input"></div>
        </div>
        <div class="grid">
          <div class="field"><label>Người liên hệ</label><input id="csContact" class="hl-input"></div>
          <div class="field"><label>SĐT</label><input id="csSdt" class="hl-input"></div>
        </div>`, async function () {
          const ten = (val('csTen') || '').trim(); if (!ten) { modalErr('Nhập tên NCC.'); return; }
          try {
            const r = await call('rpc_create_supplier_quick', { p_payload: { ten, mst: val('csMst'), dieuKhoan: val('csDk'), soTk: val('csStk'), chiNhanh: val('csCn'), contact: val('csContact'), sdt: val('csSdt') } });
            if (!(state.doiTuong || []).some(d => d.MaDoiTuong === r.MaDoiTuong)) state.doiTuong.push({ MaDoiTuong: r.MaDoiTuong, TenDoiTuong: r.TenDoiTuong, DieuKhoanTT_MacDinh: r.DieuKhoanTT_MacDinh });
            closeModal(); toast(r.existed ? 'NCC đã có — đã chọn.' : 'Đã tạo NCC.', 'ok'); if (onDone) onDone(r);
          } catch (e) { modalErr(e.message || String(e)); }
        }, 'Tạo');
      setTimeout(() => document.getElementById('csTen')?.focus(), 60);
    }
    function groupOptions(selected) {
      return ['<option value="">— Chưa gán —</option>']
        .concat((state.catalog.groups || []).map(g => `<option value="${esc(g)}" ${g === selected ? 'selected' : ''}>${esc(g)}</option>`))
        .join('');
    }

    function openMaterialForm(id) {
      const m = id ? state.catalog.materials.find(x => x.id === id) : null;
      openModal(m ? 'Sửa mặt hàng' : 'Thêm mặt hàng', `
        <input type="hidden" id="mfId" value="${m ? esc(m.id) : ''}">
        <div class="grid">
          <div class="field"><label>Mã vật tư</label><input id="mfMa" value="${m ? esc(m.ma) : ''}" placeholder="Để trống = tự sinh VT-000x"></div>
          <div class="field"><label>ĐVT</label><input id="mfDvt" value="${m ? esc(m.dvt || '') : ''}" placeholder="vnđ/kg, vnđ/lít..."></div>
        </div>
        <div class="field"><label>Tên mặt hàng *</label><input id="mfTen" value="${m ? esc(m.ten) : ''}"></div>
        <div class="grid">
          <div class="field"><label>Nhóm hàng</label>
            <div style="display:flex;gap:8px"><select id="mfNhom" style="flex:1">${groupOptions(m ? m.nhom : '')}</select>
            <button type="button" class="secondary" style="width:auto;white-space:nowrap" onclick="addGroupPrompt('mfNhom')">＋ Nhóm</button></div>
          </div>
          <div class="field"><label>Trạng thái</label><select id="mfStatus">
            <option ${m && m.trangThai === 'Ngừng' ? '' : 'selected'}>Hoạt động</option>
            <option ${m && m.trangThai === 'Ngừng' ? 'selected' : ''}>Ngừng</option>
          </select></div>
        </div>`, saveMaterial, m ? 'Lưu thay đổi' : 'Thêm mặt hàng');
    }
    async function addGroupPrompt(selectId) {
      const name = (prompt('Tên nhóm hàng mới:', '') || '').trim();
      if (!name) return;
      try {
        const res = await call('rpc_add_material_group', { p_ten: name });
        state.catalog.groups = res.groups || state.catalog.groups;
        const sel = document.getElementById(selectId);
        if (sel) sel.innerHTML = groupOptions(name);
        toast('Đã thêm nhóm hàng.', 'ok');
      } catch (err) { toast(err.message || String(err), 'err'); }
    }
    function openGroupManager() {
      const groups = state.catalog.groups || [];
      openModal('Quản lý nhóm hàng', `
        <p class="status">Đổi tên sẽ cập nhật cho tất cả mặt hàng đang thuộc nhóm đó.</p>
        <div id="groupMgrList">
          ${groups.map(g => `<div class="grid" style="margin-bottom:8px">
            <input class="gm-old" type="hidden" value="${esc(g)}">
            <input class="gm-new" value="${esc(g)}">
            <button type="button" class="secondary" style="width:auto" onclick="renameGroup(this)">Lưu tên</button>
          </div>`).join('')}
        </div>
        <div class="field" style="margin-top:12px"><label>Thêm nhóm mới</label>
          <div style="display:flex;gap:8px"><input id="gmAddNew" style="flex:1" placeholder="Tên nhóm mới">
          <button type="button" style="width:auto" onclick="addGroupFromMgr(this)">Thêm</button></div>
        </div>`, null, null);
    }
    async function renameGroup(btn) {
      const row = btn.closest('.grid');
      const oldName = row.querySelector('.gm-old').value;
      const newName = row.querySelector('.gm-new').value.trim();
      if (!newName || newName === oldName) return;
      try {
        const res = await call('rpc_rename_material_group', { p_old: oldName, p_new: newName });
        state.catalog.groups = res.groups || state.catalog.groups;
        toast('Đã đổi tên nhóm.', 'ok');
        closeModal(); await loadCatalog();
      } catch (err) { toast(err.message || String(err), 'err'); }
    }
    async function addGroupFromMgr(btn) {
      const name = (document.getElementById('gmAddNew')?.value || '').trim();
      if (!name) return;
      try {
        const res = await call('rpc_add_material_group', { p_ten: name });
        state.catalog.groups = res.groups || state.catalog.groups;
        toast('Đã thêm nhóm.', 'ok');
        openGroupManager();
      } catch (err) { toast(err.message || String(err), 'err'); }
    }
    async function saveMaterial(btn) {
      const payload = {
        id: val('mfId') || null,
        maVatTu: val('mfMa'),
        ten: val('mfTen'),
        dvt: val('mfDvt'),
        nhom: val('mfNhom'),
        trangThai: val('mfStatus')
      };
      if (!payload.ten.trim()) { modalErr('Cần nhập tên mặt hàng.'); return; }
      try {
        await withBusy(btn, 'Đang lưu...', () => call('rpc_upsert_material', { p_payload: payload }));
        closeModal();
        toast('Đã lưu mặt hàng.', 'ok');
        await loadCatalog();
      } catch (err) { modalErr(err.message || String(err)); }
    }

    function openSupplierForm(id) {
      const s = id ? state.catalog.suppliers.find(x => x.id === id) : null;
      openModal(s ? 'Sửa nhà cung cấp' : 'Thêm nhà cung cấp', `
        <input type="hidden" id="sfId" value="${s ? esc(s.id) : ''}">
        <div class="grid">
          <div class="field"><label>Mã đối tượng</label><input id="sfMa" value="${s ? esc(s.ma) : ''}" placeholder="Để trống = tự sinh DT-xxxx"></div>
          <div class="field"><label>Loại</label><select id="sfLoai">
            <option ${s && s.loai === 'KH' ? '' : 'selected'} value="NCC">NCC (nhà cung cấp)</option>
            <option ${s && s.loai === 'KH' ? 'selected' : ''} value="KH">KH (khách hàng)</option>
          </select></div>
        </div>
        <div class="field"><label>Tên đối tượng *</label><input id="sfTen" value="${s ? esc(s.ten) : ''}"></div>
        <div class="grid">
          <div class="field"><label>MST</label><input id="sfMst" value="${s ? esc(s.mst || '') : ''}"></div>
          <div class="field"><label>SĐT</label><input id="sfSdt" value="${s ? esc(s.sdt || '') : ''}"></div>
        </div>
        <div class="field"><label>Người liên hệ / contact</label><input id="sfContact" value="${s ? esc(s.contact || '') : ''}"></div>
        <div class="field"><label>Địa chỉ / khu vực</label><input id="sfDiaChi" value="${s ? esc(s.diaChi || '') : ''}"></div>
        <div class="grid">
          <div class="field"><label>Điều khoản TT mặc định</label><input id="sfDieuKhoan" value="${s ? esc(s.dieuKhoan || '') : ''}"></div>
          <div class="field"><label>MOQ (đặt tối thiểu)</label><input id="sfMoq" value="${s ? esc(s.moq || '') : ''}"></div>
        </div>
        <div class="grid">
          <div class="field"><label>Số tài khoản ngân hàng</label><input id="sfSoTk" value="${s ? esc(s.soTk || '') : ''}"></div>
          <div class="field"><label>Chi nhánh ngân hàng</label><input id="sfChiNhanh" value="${s ? esc(s.chiNhanh || '') : ''}"></div>
        </div>
        <div class="field"><label>Trạng thái</label><select id="sfStatus">
          <option ${s && s.trangThai === 'Ngừng' ? '' : 'selected'}>Hoạt động</option>
          <option ${s && s.trangThai === 'Ngừng' ? 'selected' : ''}>Ngừng</option>
        </select></div>`, saveSupplier, s ? 'Lưu thay đổi' : 'Thêm NCC');
    }
    async function saveSupplier(btn) {
      const payload = {
        id: val('sfId') || null,
        maDoiTuong: val('sfMa'),
        ten: val('sfTen'),
        loai: val('sfLoai'),
        mst: val('sfMst'),
        sdt: val('sfSdt'),
        contact: val('sfContact'),
        diaChi: val('sfDiaChi'),
        dieuKhoan: val('sfDieuKhoan'),
        moq: val('sfMoq'),
        soTk: val('sfSoTk'),
        chiNhanh: val('sfChiNhanh'),
        trangThai: val('sfStatus')
      };
      if (!payload.ten.trim()) { modalErr('Cần nhập tên nhà cung cấp.'); return; }
      try {
        await withBusy(btn, 'Đang lưu...', () => call('rpc_upsert_doi_tuong', { p_payload: payload }));
        closeModal();
        toast('Đã lưu nhà cung cấp.', 'ok');
        await loadCatalog();
      } catch (err) { modalErr(err.message || String(err)); }
    }

    // ===== Đợt B: Đề xuất thanh toán (kế toán) =============================
    function renderPayReq() {
      const ed = state.editingPayReq;
      document.getElementById('content').innerHTML = `
        <section class="card">
          <h2>${ed ? 'Sửa đề xuất thanh toán ' + esc(ed.MaDeXuatTT) : 'Đề xuất thanh toán'}</h2>
          <div class="notice ok">Gom các khoản đến hạn thành một đề xuất trình lãnh đạo. Nạp từ công nợ đã kế toán lưu, hoặc tự thêm dòng (điện, vận hành…) kèm giải trình. Chỉ đi tiền được sau khi lãnh đạo duyệt.</div>
          ${ed && ed.LyDoTraLai ? `<div class="notice err">↩ Bị trả lại: ${esc(ed.LyDoTraLai)} — chỉnh lại rồi Gửi lại duyệt.</div>` : ''}
          <div class="grid">
            <div class="field"><label>Ngày đề xuất</label><input id="prNgay" type="date" value="${ed ? esc(ed.Ngay) : todayStr()}"></div>
            <div class="field"><label>Ghi chú</label><input id="prGhiChu" value="${ed ? esc(ed.GhiChu || '') : ''}" placeholder="VD: Đề xuất chi ngày ${todayStr()}"></div>
          </div>
          <div class="actions">
            <button class="secondary" onclick="openPayablePicker(this)">＋ Nạp phiếu đã lưu công nợ (đến hạn)</button>
            <button class="secondary" onclick="addPayLine()">＋ Thêm dòng tự nhập</button>
          </div>
          <div class="table-wrap"><table id="prTable" class="line-table"><thead><tr>
            <th>Nhà cung cấp</th><th style="width:130px">Kế hoạch</th><th style="width:140px">Đề xuất TT</th>
            <th>Nội dung</th><th style="width:110px">Hình thức</th><th style="width:150px">Tình trạng hồ sơ</th>
            <th>Giải trình (nếu ngoài PO)</th><th style="width:56px"></th>
          </tr></thead><tbody></tbody></table></div>
          <div class="total-bar">Tổng đề xuất thanh toán: <strong id="prTotal">0 đ</strong></div>
          <div class="actions">
            <button class="secondary" onclick="savePayReq('Nháp', this)">${ed ? 'Lưu thay đổi' : 'Lưu nháp'}</button>
            <button onclick="savePayReq('Chờ duyệt', this)">${ed ? 'Gửi lại duyệt →' : 'Gửi duyệt'}</button>
            ${ed ? `<button class="secondary" onclick="state.editingPayReq=null; renderPayReq()">Huỷ sửa</button>` : ''}
          </div>
        </section>
        <section class="card" style="margin-top:16px">
          <h2>Đề xuất của tôi</h2>
          <div id="myPayReqBox">${loadingText('Đang tải...')}</div>
        </section>`;
      const tb = document.querySelector('#prTable tbody');
      if (ed && (ed.lines || []).length) { tb.innerHTML = ''; ed.lines.forEach(l => addPayLine(l)); }
      else addPayLine();
      loadMyPayReq();
    }
    async function editPayReq(ma) {
      try { const res = await call('rpc_get_payment_request', { p_ma: ma }); state.editingPayReq = res.pr; renderPayReq(); toast('Đang sửa ' + ma, 'ok'); }
      catch (err) { toast(err.message || String(err), 'err'); }
    }
    function payLineRow(d={}) {
      return `<tr data-debt-id="${esc(d.debtId || '')}">
        <td><input class="pr-ncc" value="${esc(d.ncc || '')}" placeholder="Tên NCC">${d.maCN ? `<small class="status">CN: ${esc(d.maCN)}</small>` : '<small class="status">tự nhập</small>'}</td>
        <td><input class="pr-kehoach js-money" inputmode="decimal" value="${d.keHoach ? esc(moneyFormat(d.keHoach)) : ''}"></td>
        <td><input class="pr-sotien js-money" inputmode="decimal" value="${d.soTien ? esc(moneyFormat(d.soTien)) : ''}" oninput="recalcPayReqTotal()"></td>
        <td><input class="pr-noidung" value="${esc(d.noiDung || '')}"></td>
        <td><select class="pr-hinhthuc"><option ${d.hinhThucTT==='Tiền mặt'?'':'selected'}>CK</option><option ${d.hinhThucTT==='Tiền mặt'?'selected':''}>Tiền mặt</option></select></td>
        <td><input class="pr-hoso" value="${esc(d.tinhTrangHoSo || '')}" placeholder="Đã có hồ sơ / Đang trình…"></td>
        <td><input class="pr-giaitrinh" value="${esc(d.giaiTrinh || '')}" ${d.debtId ? 'placeholder="(đã nối công nợ)"' : 'placeholder="Bắt buộc nếu ngoài PO"'}></td>
        <td><button class="secondary" onclick="this.closest('tr').remove(); recalcPayReqTotal();">Xóa</button></td>
      </tr>`;
    }
    function addPayLine(d) {
      document.querySelector('#prTable tbody').insertAdjacentHTML('beforeend', payLineRow(d || {}));
      recalcPayReqTotal();
    }
    function recalcPayReqTotal() {
      const trs = [...document.querySelectorAll('#prTable tbody tr')];
      const total = trs.reduce((s, tr) => s + moneyNum(tr.querySelector('.pr-sotien')), 0);
      const box = document.getElementById('prTotal');
      if (box) box.textContent = fmtMoney(total) + ' đ';
    }
    function getPayLines() {
      return [...document.querySelectorAll('#prTable tbody tr')].map(tr => ({
        debtId: tr.dataset.debtId || null,
        ncc: tr.querySelector('.pr-ncc')?.value || '',
        keHoach: moneyRaw(tr.querySelector('.pr-kehoach')),
        soTien: moneyRaw(tr.querySelector('.pr-sotien')),
        noiDung: tr.querySelector('.pr-noidung')?.value || '',
        hinhThucTT: tr.querySelector('.pr-hinhthuc')?.value || 'CK',
        tinhTrangHoSo: tr.querySelector('.pr-hoso')?.value || '',
        giaiTrinh: tr.querySelector('.pr-giaitrinh')?.value || ''
      }));
    }
    async function openPayablePicker(btn) {
      try {
        const res = await withBusy(btn, 'Đang tải...', () => call('rpc_get_payable_debts', {}));
        const rows = res.rows || [];
        const body = rows.length ? `<div class="table-wrap" style="max-height:440px"><table><thead><tr>
            <th>Mã CN</th><th>NCC</th><th>Mặt hàng</th><th>Hạn TT</th><th>Hồ sơ</th><th>Chứng từ</th><th>Số dư còn lại</th><th></th></tr></thead><tbody>
          ${rows.map((r,i) => `<tr>
            <td><code>${esc(r.maCN)}</code></td><td>${esc(r.tenDoiTuong)}</td><td>${esc(r.matHang||'')}</td>
            <td>${esc(r.hanThanhToan||'—')}</td>
            <td>${r.hoSoDayDu ? '<span class="pill ok">Đủ</span>' : '<span class="pill warn">Thiếu</span>'}</td>
            <td style="font-size:11px">BG: ${attachLinks(r.baoGia)}<br>NT: ${attachLinks(r.nghiemThuFiles)}</td>
            <td class="num-cell">${fmtMoney(r.soDuConLai)}</td>
            <td><button class="secondary" onclick='addPayableRow(${JSON.stringify(r).replace(/'/g,"&#39;")}); toast("Đã thêm ${esc(r.maCN)}","ok");'>+ Thêm</button></td>
          </tr>`).join('')}</tbody></table></div>`
          : '<p class="status">Không có khoản công nợ nào còn số dư. Với khoản trả trước chưa nhận hàng, hãy dùng "Thêm dòng tự nhập" kèm giải trình.</p>';
        openModal('Khoản đã lưu công nợ / đến hạn', body, null, null);
      } catch (err) { toast(err.message || String(err), 'err'); }
    }
    function addPayableRow(r) {
      addPayLine({ debtId: r.debtId, maCN: r.maCN, ncc: r.tenDoiTuong, keHoach: r.soDuConLai, soTien: r.soDuConLai, noiDung: r.matHang, tinhTrangHoSo: 'Đã có hồ sơ' });
    }
    async function savePayReq(status, btn) {
      const lines = getPayLines().filter(l => moneyNum({value:l.soTien}) > 0 || Number(l.soTien) > 0);
      if (!lines.length) { toast('Cần ít nhất một dòng có số tiền.', 'err'); return; }
      const bad = lines.find(l => !l.debtId && !l.giaiTrinh.trim());
      if (status === 'Chờ duyệt' && bad) { toast(`Dòng "${bad.ncc||'?'}" ngoài công nợ — cần giải trình.`, 'err'); return; }
      try {
        const ed = state.editingPayReq;
        const payload = { status, ngay: val('prNgay'), ghiChu: val('prGhiChu'), lines };
        const res = ed
          ? await withBusy(btn, 'Đang lưu...', () => call('rpc_update_payment_request', { p_ma: ed.MaDeXuatTT, p_payload: payload }))
          : await withBusy(btn, 'Đang lưu...', () => call('rpc_create_payment_request', { p_payload: payload }));
        toast(`Đã lưu ${res.maDeXuatTT} (${res.status}).`, 'ok');
        state.editingPayReq = null;
        renderPayReq();
      } catch (err) { toast(err.message || String(err), 'err'); }
    }
    async function loadMyPayReq() {
      const box = document.getElementById('myPayReqBox');
      try {
        const res = await call('rpc_get_my_payment_requests', { p_limit: 30 });
        const rows = res.rows || [];
        box.innerHTML = rows.length ? `<div class="table-wrap"><table><thead><tr>
          <th>Mã</th><th>Ngày</th><th>Tổng tiền</th><th>Trạng thái</th><th>Thao tác</th></tr></thead><tbody>
          ${rows.map(r => `<tr>
            <td><code>${esc(r.MaDeXuatTT)}</code></td><td>${esc(r.Ngay)}</td>
            <td class="num-cell">${fmtMoney(r.TongTien)}</td>
            <td>${payReqPill(r.TrangThai)}</td>
            <td>${r.TrangThai==='Đã duyệt' ? `<button onclick="executePayReq('${esc(r.MaDeXuatTT)}', this)">Đã chi tiền</button>` : (r.TrangThai==='Nháp' ? `<button class="secondary" onclick="editPayReq('${esc(r.MaDeXuatTT)}')">Sửa &amp; gửi lại</button>` : (r.TrangThai==='Từ chối' && r.LyDoTuChoi ? `<span class="status">Lý do: ${esc(r.LyDoTuChoi)}</span>` : '—'))}</td>
          </tr>`).join('')}</tbody></table></div>` : '<p class="status">Chưa có đề xuất nào.</p>';
      } catch (err) { box.innerHTML = `<p class="status">${esc(err.message || err)}</p>`; }
    }
    function payReqPill(s) {
      if (s === 'Đã duyệt') return '<span class="pill ok">Đã duyệt</span>';
      if (s === 'Từ chối') return '<span class="pill err">Từ chối</span>';
      if (s === 'Đã chi') return '<span class="pill">Đã chi</span>';
      if (s === 'Nháp') return '<span class="pill warn">Nháp</span>';
      return '<span class="pill warn">Chờ duyệt</span>';
    }
    async function executePayReq(ma, btn) {
      if (!confirm(`Xác nhận đã đi tiền theo đề xuất ${ma}? Thao tác này ghi nhận thanh toán vào công nợ.`)) return;
      try {
        await withBusy(btn, 'Đang xử lý...', () => call('rpc_execute_payment_request', { p_ma: ma }));
        toast(`Đã đánh dấu ${ma} là ĐÃ CHI. Vào "Cập nhật thanh toán" để ghi số thực trả từng khoản.`, 'ok');
        loadMyPayReq();
      } catch (err) { toast(err.message || String(err), 'err'); }
    }

    // ===== Đợt B: Duyệt đề xuất thanh toán (lãnh đạo) =======================
    function renderPayApprove() {
      document.getElementById('content').innerHTML = `
        <section class="card">
          <h2>Duyệt đề xuất thanh toán</h2>
          <div class="notice ok">Kế toán trình các khoản đến hạn. Nhấp một đề xuất để xem chi tiết từng dòng (NCC, kế hoạch, số đề xuất, hình thức, hồ sơ) rồi Duyệt / Từ chối.</div>
          <div class="actions"><button class="secondary" onclick="loadPendingPayReq(this)">↻ Tải lại</button></div>
          <div id="payPendingBox" style="margin-top:14px">${loadingText('Đang tải...')}</div>
        </section>
        <section class="card" style="margin-top:16px">
          <h2>Lịch sử đề xuất thanh toán đã xử lý</h2>
          <div id="payReqHistoryBox">${loadingText('Đang tải...')}</div>
        </section>`;
      loadPendingPayReq();
      loadPayReqHistory();
    }
    async function loadPayReqHistory() {
      const box = document.getElementById('payReqHistoryBox'); if (!box) return;
      try {
        const res = await call('rpc_get_payment_request_history', { p_limit: 40 });
        const rows = res.rows || [];
        box.innerHTML = rows.length ? `<div class="table-wrap"><table><thead><tr><th>Mã</th><th>Ngày</th><th>Người lập</th><th>Tổng tiền</th><th>Trạng thái</th><th></th></tr></thead><tbody>
          ${rows.map(r => `<tr><td><a href="#" onclick="openPayReqDetail('${esc(r.MaDeXuatTT)}');return false;"><code>${esc(r.MaDeXuatTT)}</code></a></td><td>${esc(r.Ngay)}</td><td>${esc(r.NguoiLap||'')}</td>
            <td class="num-cell">${fmtMoney(r.TongTien)}</td><td>${payReqPill(r.TrangThai)}${r.LyDoTuChoi?' <small class="status">'+esc(r.LyDoTuChoi)+'</small>':''}</td>
            <td><button class="secondary" onclick="openPayReqDetail('${esc(r.MaDeXuatTT)}')">Xem</button></td></tr>`).join('')}
          </tbody></table></div>` : '<p class="status">Chưa có đề xuất thanh toán nào được xử lý.</p>';
      } catch (err) { box.innerHTML = `<p class="status">${esc(err.message||err)}</p>`; }
    }
    async function loadPendingPayReq(btn) {
      const box = document.getElementById('payPendingBox');
      if (box) box.innerHTML = loadingText('Đang tải...');
      try {
        const res = await withBusy(btn, 'Đang tải...', () => call('rpc_get_pending_payreq_grouped'));
        drawPendingPayDays(res.days || []);
      } catch (err) { if (box) box.innerHTML = `<p class="status">${esc(err.message || err)}</p>`; }
    }
    function drawPendingPayDays(days) {
      const box = document.getElementById('payPendingBox');
      if (!days.length) { box.innerHTML = '<p class="status">Không có đề xuất thanh toán chờ duyệt.</p>'; return; }
      box.innerHTML = days.map(d => {
        const bp = (d.boPhan || []).map(b => `${esc(b.boPhan)}: <b>${fmtMoney(b.tong)}đ</b>`).join(' · ');
        const phieu = (d.phieu || []).map(p => {
          const lines = (p.lines || []).map(l => `<tr>
              <td>${esc(l.ncc || '')}${l.maCN ? ` <small class="status">CN:${esc(l.maCN)}</small>` : ' <span class="pill warn">ngoài PO</span>'}</td>
              <td>${esc(l.boPhan || '—')}</td><td>${esc(l.matHang || l.noiDung || '')}</td>
              <td>${esc(l.tinhTrangHoSo || '—')}</td><td class="num-cell">${fmtMoney(l.soTien)}</td></tr>`).join('');
          return `<div class="card" style="padding:12px;margin:8px 0;box-shadow:none;border:1px solid var(--line)">
              <div class="ac-top" style="justify-content:space-between"><strong>${esc(p.maDeXuatTT)}</strong><span>${esc(p.nguoiLap || '')} · <b>${fmtMoney(p.tong)}đ</b></span></div>
              <div class="table-wrap" style="max-height:none"><table><thead><tr><th>NCC</th><th>Bộ phận</th><th>Nội dung</th><th>Hồ sơ</th><th class="num-cell">Số tiền</th></tr></thead><tbody>${lines}</tbody></table></div>
              <div class="actions" style="margin-top:6px"><button class="secondary" onclick="openPayReqDetail('${esc(p.maDeXuatTT)}')">Xem chi tiết đầy đủ</button><button class="danger" onclick="bouncePayReq('${esc(p.maDeXuatTT)}')">↩ Trả lại</button></div>
            </div>`;
        }).join('');
        return `<section class="card" style="margin-bottom:14px">
            <div class="ac-top" style="justify-content:space-between;align-items:baseline">
              <h3 style="margin:0">Ngày ${esc(d.ngay)} — ${d.soPhieu} phiếu</h3>
              <div class="ac-money" style="margin:0">Tổng ngày: <b>${fmtMoney(d.tong)}</b> <small>đ</small></div>
            </div>
            ${bp ? `<div class="ac-meta">Theo bộ phận: ${bp}</div>` : ''}
            ${phieu}
            <div class="actions" style="margin-top:8px"><button onclick="approvePayDay('${esc(d.ngay)}', this)">✔ Duyệt tất cả ${d.soPhieu} phiếu ngày ${esc(d.ngay)}</button></div>
          </section>`;
      }).join('');
    }
    async function approvePayDay(ngay, btn) {
      if (!confirm(`Duyệt TẤT CẢ phiếu thanh toán ngày ${ngay}?`)) return;
      try { const r = await withBusy(btn, 'Đang duyệt...', () => call('rpc_approve_payreq_day', { p_ngay: ngay, p_note: '' })); toast(`Đã duyệt ${r.approved} phiếu ngày ${ngay}.`, 'ok'); loadPendingPayReq(); loadPayReqHistory && loadPayReqHistory(); }
      catch (err) { toast(err.message || String(err), 'err'); }
    }
    function bouncePayReq(ma) {
      promptReason('Trả lại đề xuất thanh toán ' + ma, 'Nêu lý do để kế toán chỉnh & gửi lại...', async (r) => {
        await call('rpc_bounce_payment_request', { p_ma: ma, p_reason: r }); toast(`Đã trả lại ${ma} cho kế toán.`, 'ok'); closeModal(); loadPendingPayReq();
      }, 'Trả lại');
    }
    function payLineBlock(l, i) {
      const head = `<div class="ac-top" style="justify-content:space-between">
          <strong>${i + 1}. ${esc(l.ncc || '')}</strong>
          ${l.linked ? `<span class="pill ok">CN: ${esc(l.maCN || '')}</span>` : '<span class="pill warn">Ngoài PO (tự nhập)</span>'}
        </div>
        <div class="ac-money" style="margin:2px 0">${fmtMoney(l.soTien)} <small>đ đề xuất chi</small></div>
        <div class="ac-meta">Kế hoạch: ${fmtMoney(l.keHoach)} đ · Hình thức: ${esc(l.hinhThucTT || '')} · Hồ sơ: ${esc(l.tinhTrangHoSo || '—')}</div>
        ${l.noiDung ? `<div class="ac-meta">Nội dung: ${esc(l.noiDung)}</div>` : ''}`;
      let body;
      if (l.linked) {
        const dvt = l.dvt || dvtOf(l.matHang) || '—';
        body = `<div class="detail-head" style="margin-top:8px">
            <div><label>Phiếu ĐX gốc</label><div>${esc(l.maDeXuat || '—')}${l.boPhan ? ' · ' + esc(l.boPhan) : ''}</div></div>
            <div><label>Người đề nghị</label><div>${esc(l.nguoiDeNghi || '—')}</div></div>
            <div><label>Mặt hàng</label><div>${esc(l.matHang || '—')}</div></div>
            <div><label>ĐVT</label><div>${esc(dvt)}</div></div>
            <div><label>SL đặt</label><div>${fmtMaybeMoney(l.slDat)}</div></div>
            <div><label>SL thực nhận (nghiệm thu)</label><div>${l.slThucNhan != null ? fmtMaybeMoney(l.slThucNhan) : '<span class="pill warn">Chưa nghiệm thu</span>'}</div></div>
            <div><label>Đơn giá (chưa VAT)</label><div>${fmtMoney(l.donGia)}</div></div>
            <div><label>%VAT</label><div>${fmtPct(l.vatRate)}</div></div>
            <div><label>Thành tiền thực nhận (sau VAT)</label><div><b>${fmtMoney(l.thanhTienThucNhan)} đ</b></div></div>
            <div><label>Đã trả</label><div>${fmtMoney(l.daThanhToan)} đ</div></div>
            <div><label>Còn phải trả</label><div><b>${fmtMoney(l.soDuConLai)} đ</b></div></div>
            <div><label>Hạn thanh toán</label><div>${esc(l.hanThanhToan || '—')}</div></div>
            <div><label>Ngày nhận hàng</label><div>${esc(l.ngayNhan || '—')}</div></div>
            <div><label>Điều khoản TT</label><div>${esc(l.dieuKhoanTT || '—')}</div></div>
            <div><label>Hồ sơ đầy đủ</label><div>${l.hoSoDayDu ? '<span class="pill ok">Đủ</span>' : '<span class="pill warn">Chưa đủ</span>'}</div></div>
          </div>
          <div class="field" style="margin-top:6px"><label>Biên bản nghiệm thu</label><div>${attachLinks(l.nghiemThuFiles)}</div></div>
          <div class="field"><label>Báo giá gốc (bản chào NCC)</label><div>${attachLinks(l.baoGia)}</div></div>`;
      } else {
        body = `<div class="notice" style="margin-top:8px">⚠ Dòng tự nhập, không nối phiếu mua hàng. Giải trình:<br><b>${esc(l.giaiTrinh || '(chưa nhập)')}</b></div>`;
      }
      return `<div class="card" style="padding:14px;margin:10px 0;box-shadow:none;border:1px solid var(--line)">${head}${body}</div>`;
    }
    async function openPayReqDetail(ma) {
      try {
        const res = await call('rpc_payment_request_detail', { p_ma: ma });
        const r = res.pr; if (!r) return;
        const blocks = (r.lines || []).map((l, i) => payLineBlock(l, i)).join('');
        const anyUnaccepted = (r.lines || []).some(l => l.linked && l.slThucNhan == null);
        openModal(`Đề xuất thanh toán ${esc(ma)}`, `
          <div class="detail-head">
            <div><label>Ngày</label><div>${esc(r.Ngay)}</div></div>

    // ===== In / xuất Excel (điền vào FILE MẪU gốc bằng ExcelJS) ============
    const COMPANY_FULL = 'CÔNG TY CP ĐẦU TƯ XÂY DỰNG VÀ THƯƠNG MẠI THIÊN NHẬT';
    const clone = s => JSON.parse(JSON.stringify(s || {}));
    function applySt(cell, st) { if (st) cell.style = clone(st); }
    async function loadTemplateWb(path) {
      const buf = await fetch(path).then(r => { if (!r.ok) throw new Error('Không tải được file mẫu ' + path); return r.arrayBuffer(); });
      const wb = new ExcelJS.Workbook();
      await wb.xlsx.load(buf);
      return wb;
    }
    async function saveWb(wb, filename) {
      const buf = await wb.xlsx.writeBuffer();
      const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = filename;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 5000);
    }
    function lineAcceptedAmount(l) { // thành tiền theo SL nghiệm thu + VAT
      const sl = Number(l.SLThucNhan ?? l.SLDat ?? 0);
      return Math.round(sl * Number(l.DonGia || 0) * (1 + Number(l.VATRate || 0)));
    }
    // ---- Tệp đính kèm (Supabase Storage, bucket 'attachments' công khai) ----
    async function uploadAttachments(inputId, prefix) {
      const el = document.getElementById(inputId);
      const files = el && el.files ? [...el.files] : [];
      const out = [];
      for (const f of files) {
        const safe = f.name.replace(/[^\w.\-]+/g, '_');
        const path = `${prefix}/${Date.now()}_${Math.random().toString(36).slice(2, 7)}_${safe}`;
        const { error } = await sb.storage.from('attachments').upload(path, f, { upsert: false });
        if (error) throw new Error('Tải tệp lỗi: ' + (error.message || error));
        const { data } = sb.storage.from('attachments').getPublicUrl(path);
        out.push({ name: f.name, url: data.publicUrl });
      }
      return out;
    }
    function attachLinks(arr) {
      arr = arr || [];
      if (!arr.length) return '<span class="status">(không có)</span>';
      return arr.map(a => `<a href="${esc(a.url)}" target="_blank" rel="noopener">📎 ${esc(a.name)}</a>`).join('<br>');
    }

                           t.getColumn(4).width||25, t.getColumn(5).width||20, t.getColumn(6).width||22 ];
