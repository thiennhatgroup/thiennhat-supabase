<!doctype html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thiên Nhật - Mua hàng &amp; Công nợ</title>
  <link rel="icon" type="image/png" href="./logo.png">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#0E5AA7">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TN Mua hàng">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
  </script>
  <style>
    :root {
      --bg: #F4F6FA;
      --panel: #FFFFFF;
      --ink: #1E2A38;
      --muted: #64707E;
      --line: #E4EAF1;
      --accent: #0E5AA7;
      --accent-dark: #093F73;
      --accent-soft: #E7F0FA;
      --orange: #EE5A1C;
      --input: #F5F8FC;
      --ok: #1E8E5A;
      --danger: #D14343;
      --shadow: 0 1px 2px rgba(16,40,70,.06), 0 4px 16px rgba(16,40,70,.05);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 14.5px;
      -webkit-font-smoothing: antialiased;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.85);
      backdrop-filter: saturate(180%) blur(12px);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand img { height: 38px; display: block; }
    h1 { margin: 0; font-size: 17px; font-weight: 700; letter-spacing: -.2px; }
    h2 { margin: 0 0 14px; font-size: 18px; font-weight: 700; letter-spacing: -.2px; }
    h3 { margin: 18px 0 8px; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; font-weight: 700; }
    button, input, select, textarea {
      font: inherit;
      border-radius: 10px;
      border: 1px solid var(--line);
      min-height: 44px;
      transition: border-color .15s, box-shadow .15s, background .15s, transform .05s;
    }
    button, input, select, textarea { min-height: 40px; }
    input, select, textarea {
      width: 100%;
      background: var(--input);
      padding: 9px 12px;
      font-size: 14px;
      color: var(--ink);
    }
    input::placeholder, textarea::placeholder { color: #9AA6B2; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); background: #fff; }
    textarea { min-height: 62px; resize: vertical; }
    .field { margin-bottom: 10px; }
    button {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 1px 2px rgba(14,90,167,.25);
    }
    button:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
    button:active { transform: translateY(1px); }
    button.secondary { background: #fff; color: var(--ink); border-color: var(--line); box-shadow: none; }
    button.secondary:hover { background: #F1F5FA; border-color: #D3DCE6; }
    button.danger { background: var(--danger); border-color: var(--danger); box-shadow: 0 1px 2px rgba(209,67,67,.25); }
    button.danger:hover { background: #B93636; border-color: #B93636; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .app {
      display: grid;
      grid-template-columns: 232px 1fr;
      min-height: calc(100vh - 63px);
    }
    nav {
      border-right: 1px solid var(--line);
      padding: 14px 12px;
      background: var(--panel);
    }
    nav button {
      width: 100%;
      margin: 0 0 4px;
      text-align: left;
      background: transparent;
      color: var(--ink);
      border-color: transparent;
      box-shadow: none;
      font-weight: 500;
      min-height: 42px;
      border-radius: 10px;
    }
    nav button:hover { background: #F1F5FA; }
    nav button.active { background: var(--accent-soft); color: var(--accent); font-weight: 700; }
    main { padding: 22px; max-width: 1260px; margin: 0 auto; }
    .menu-toggle { display: inline-flex; flex-direction: column; justify-content: center; gap: 4px; width: 42px; height: 42px; padding: 0 11px; background: #fff; border: 1px solid var(--line); border-radius: 10px; box-shadow: none; }
    .menu-toggle span { display: block; height: 2px; background: var(--ink); border-radius: 2px; transition: .2s; }
    .menu-toggle:hover { background: #F1F5FA; }
    .drawer {
      position: fixed; top: 0; left: 0; height: 100dvh; width: 286px; max-width: 84vw;
      background: var(--panel); border-right: 1px solid var(--line);
      transform: translateX(-100%); transition: transform .24s ease;
      z-index: 60; overflow-y: auto; padding: 14px 12px 20px;
      box-shadow: 0 20px 50px rgba(16,40,70,.18);
      display: flex; flex-direction: column;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-backdrop { position: fixed; inset: 0; background: rgba(16,28,45,.4); z-index: 55; }
    .drawer-brand { display: flex; align-items: center; justify-content: space-between; padding: 4px 8px 12px; border-bottom: 1px solid var(--line); margin-bottom: 8px; }
    .drawer-brand img { height: 34px; }
    .drawer-x { width: 34px; height: 34px; padding: 0; background: transparent; color: var(--muted); border: none; box-shadow: none; font-size: 20px; }
    .drawer-item { width: 100%; text-align: left; background: transparent; color: var(--ink); border: none; box-shadow: none; font-weight: 500; padding: 10px 12px; border-radius: 10px; margin-bottom: 2px; font-size: 14px; }
    .drawer-item:hover { background: #F1F5FA; }
    .drawer-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 700; }
    .drawer > .drawer-item { font-weight: 700; }
    .drawer-group { margin: 8px 0; background: #F7F9FC; border: 1px solid var(--line); border-radius: 12px; padding: 4px; }
    .drawer-group-body .drawer-item { padding-left: 18px; }
    .drawer-group-h { width: 100%; text-align: left; background: transparent; color: var(--accent); border: none; box-shadow: none; font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; padding: 9px 12px 7px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .drawer-group.collapsed .drawer-group-body { display: none; }
    .drawer-group.collapsed .drawer-group-h span { transform: rotate(-90deg); }
    .drawer-group-h span { transition: transform .2s; }
    .drawer-note { margin-top: auto; padding: 14px 12px 4px; border-top: 1px solid var(--line); color: var(--muted); font-size: 12px; }
    .drawer-note b { color: var(--accent); }
    .workspace {
      display: grid;
      grid-template-columns: minmax(320px, 1fr) minmax(360px, .95fr);
      gap: 18px;
      align-items: start;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; }
    .field { margin-bottom: 12px; }
    .combo-stack { display: grid; gap: 6px; }
    .combo-stack input, .combo-stack select { min-height: 38px; }
    label { display: block; margin-bottom: 6px; color: var(--muted); font-weight: 700; font-size: 13px; }
    .line-table { min-width: 760px; }
    .line-table input, .line-table select { min-height: 42px; font-size: 14px; padding: 9px 11px; }
    .line-table .js-mat-select, .line-table .js-vat-select { min-height: 40px; }
    .line-table th, .line-table td { padding: 9px 9px; vertical-align: middle; }
    .proposal-layout { display: grid; grid-template-columns: minmax(520px, 1.5fr) minmax(300px, .85fr); gap: 18px; align-items: start; }
    .review-pane { position: sticky; top: 90px; }
    .review-head > div { margin-bottom: 4px; }
    @media (max-width: 1100px) { .proposal-layout { grid-template-columns: 1fr; } .review-pane { position: static; } }
    .num-cell { text-align: right; font-variant-numeric: tabular-nums; font-weight: 700; white-space: nowrap; }
    .total-bar { margin: 10px 0 4px; padding: 12px 14px; background: #EAF3EC; border: 1px solid #CBE4D4; border-radius: 10px; text-align: right; font-size: 15px; color: #1E7A4C; }
    .total-bar strong { font-size: 18px; margin: 0 4px; }
    .js-price-hint { margin-top: 5px; font-size: 11.5px; }
    .js-price-hint.over { color: var(--danger); font-weight: 700; }
    .js-price-hint.over::after { content: " — cao hơn giá tốt nhất!"; }
    small { color: var(--muted); display: block; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; background: #fff; font-size: 14px; }
    th, td { border-bottom: 1px solid var(--line); padding: 10px 10px; text-align: left; vertical-align: top; }
    th { background: #F1F5FA; color: #46586B; font-weight: 700; position: sticky; top: 0; z-index: 1; border-bottom: 1px solid #DCE4EC; }
    tbody tr:hover td { background: #FAFBFD; }
    .table-wrap { overflow: auto; max-height: 520px; border: 1px solid var(--line); border-radius: 12px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .notice { padding: 11px 14px; background: #FFF7E8; border: 1px solid #F0DEB0; border-radius: 12px; color: #6B531B; margin-bottom: 14px; }
    .notice.ok { background: #ECF4FB; border-color: #CBE0F2; color: #0C4C86; }
    .notice.err { background: #FDEEEC; border-color: #F2C9C2; color: #9A3730; }
    .status { color: var(--muted); }
    .pill { display: inline-block; padding: 4px 10px; border-radius: 999px; background: #EEF1F5; font-size: 12px; font-weight: 600; color: #46586B; }
    .pill.ok { background: #E4F3EA; color: #1E7A4C; }
    .pill.warn { background: #FDF0D6; color: #7A5A11; }
    .pill.err { background: #FBE0DD; color: #9A3730; }
    .totals { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 12px; margin-bottom: 14px; align-items: stretch; }
    .metric { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px; box-shadow: var(--shadow); min-width: 0; }
    .metric strong { display: block; font-size: 20px; margin-top: 4px; color: var(--accent); }
    .totals .metric { display: flex; flex-direction: column; justify-content: flex-start; gap: 4px; padding: 12px 14px; }
    .totals .metric > span { font-size: 12.5px; color: var(--muted); line-height: 1.3; }
    .totals .metric strong { margin-top: 0; font-size: clamp(14px, 1.5vw, 18px); white-space: nowrap; }
    .totals .metric strong small { font-size: 12px; font-weight: 600; color: var(--muted); margin-left: 2px; }
    .metric.best { border-color: #B7DCC6; background: #F1FAF4; }
    .quote-layout { display: grid; grid-template-columns: minmax(360px, 1.15fr) minmax(320px, .85fr); gap: 18px; align-items: start; }
    .quote-best { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin: 12px 0; }
    .hint-list { margin: 8px 0 0; padding-left: 18px; color: var(--muted); }
    .hint-list li { margin-bottom: 5px; }
    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      min-width: 260px;
      max-width: 460px;
      padding: 13px 14px;
      border-radius: 8px;
      background: #141413;
      color: #fff;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: .18s ease;
      z-index: 30;
      font-weight: 700;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.ok { background: var(--ok); }
    .toast.err { background: var(--danger); }
    .loading-line { display: flex; gap: 8px; align-items: center; color: var(--muted); }
    .spin {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid #D8D1C4;
      border-top-color: var(--accent);
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .login {
      max-width: 400px;
      margin: 9vh auto;
      border-radius: 20px;
    }
    .login-logo { display: flex; justify-content: center; margin-bottom: 6px; }
    .login-logo img { height: 66px; }
    .hidden { display: none !important; }
    .cat-tabs { display: flex; gap: 8px; }
    .cat-tabs button { width: auto; }
    .cat-toolbar { display: flex; gap: 10px; align-items: center; }
    .cat-toolbar input { flex: 1; }
    .cat-toolbar button { width: auto; white-space: nowrap; }
    td code { background: #ECE5D8; padding: 2px 6px; border-radius: 6px; font-size: 12px; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(20,20,19,.45); display: flex; align-items: flex-start; justify-content: center; padding: 6vh 16px; z-index: 40; overflow: auto; }
    .modal-card { width: 100%; max-width: 620px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .bell-wrap { position: relative; }
    .bell-btn { position: relative; font-size: 18px; padding: 8px 12px; min-height: 40px; }
    .notif-badge { position: absolute; top: -6px; right: -6px; background: var(--danger); color: #fff; border-radius: 999px; font-size: 11px; font-weight: 700; padding: 1px 6px; min-width: 18px; text-align: center; }
    .notif-panel { position: absolute; right: 0; top: 48px; width: 360px; max-height: 460px; overflow: auto; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; box-shadow: 0 12px 34px rgba(0,0,0,.18); z-index: 35; padding: 8px; }
    .notif-item { padding: 10px; border-radius: 8px; cursor: pointer; border-bottom: 1px solid var(--line); }
    .notif-item:hover { background: #F0EEE6; }
    .notif-item.unread { background: #FFF7E7; }
    .notif-item .nt-title { font-weight: 700; font-size: 13px; }
    .notif-item .nt-body { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .notif-item .nt-time { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .notif-head { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; }
    .plan-box { border: 1px dashed var(--line); border-radius: 8px; padding: 12px; margin-bottom: 12px; background: #fff; }
    .check-line { display: flex; align-items: center; gap: 10px; font-weight: 700; color: var(--ink); margin: 0; }
    .check-line input { width: auto; min-height: auto; }
    .approve-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
    .approve-card { border: 1px solid var(--line); border-radius: 10px; padding: 14px; background: #fff; cursor: pointer; transition: .15s; }
    .approve-card:hover { border-color: var(--accent); box-shadow: 0 4px 14px rgba(0,0,0,.08); transform: translateY(-1px); }
    .ac-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .ac-obj { font-weight: 700; margin-bottom: 4px; }
    .ac-money { font-size: 18px; color: var(--accent-dark); font-weight: 800; }
    .ac-money small { color: var(--muted); font-weight: 400; font-size: 12px; }
    .ac-meta { color: var(--muted); font-size: 12px; margin: 6px 0; }
    .ac-hint { color: var(--accent); font-size: 12px; margin-top: 8px; font-weight: 700; }
    .detail-head { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px 16px; margin-bottom: 12px; }
    .detail-head label { margin: 0; font-size: 12px; }
    .line-clickable { cursor: pointer; }
    .line-clickable:hover td { background: #FBF3D2; }
    .mini-link { color: var(--accent); font-size: 11px; margin-left: 6px; }
    .compare-panel { border: 1px solid var(--accent); border-radius: 8px; padding: 12px; margin-top: 12px; background: #FFFBF4; }
    .compare-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .best-row td { background: #EEF8F1; font-weight: 700; }
    .approve-sec { border: 1px solid var(--line); border-radius: 14px; padding: 12px 14px; margin-bottom: 16px; background: #fff; }
    .approve-sec.ok { border-left: 5px solid var(--ok); }
    .approve-sec.warn { border-left: 5px solid var(--orange); background: #FFFCF7; }
    .approve-sec-h { display: flex; justify-content: space-between; align-items: center; font-weight: 800; margin-bottom: 12px; }
    .approve-sec.ok .approve-sec-h { color: var(--ok); }
    .approve-sec.warn .approve-sec-h { color: var(--orange); }
    .approve-sec-sum { font-size: 13px; font-weight: 700; color: var(--muted); }
    .approve-card.card-warn { border-color: #F3C9A8; }
    .chat-wrap { display: grid; grid-template-columns: 260px 1fr; height: 70vh; min-height: 420px; }
    .chat-side { border-right: 1px solid var(--line); overflow-y: auto; }
    .chat-side-h { padding: 12px 14px; font-weight: 800; border-bottom: 1px solid var(--line); }
    .chat-contact { padding: 10px 14px; border-bottom: 1px solid var(--line); cursor: pointer; }
    .chat-contact:hover { background: #F1F5FA; }
    .chat-contact.active { background: var(--accent-soft); }
    .chat-badge { background: var(--danger); color: #fff; border-radius: 999px; font-size: 11px; padding: 1px 7px; margin-left: 4px; }
    .chat-main { display: flex; flex-direction: column; }
    .chat-head { padding: 12px 16px; border-bottom: 1px solid var(--line); }
    .chat-thread { flex: 1; overflow-y: auto; padding: 14px; background: #F7F9FC; display: flex; flex-direction: column; gap: 8px; }
    .chat-bubble { max-width: 74%; padding: 8px 12px; border-radius: 14px; font-size: 14px; box-shadow: var(--shadow); word-break: break-word; }
    .chat-bubble.me { align-self: flex-end; background: var(--accent); color: #fff; }
    .chat-bubble.them { align-self: flex-start; background: #fff; }
    .chat-bubble.me a { color: #fff; }
    .chat-time { font-size: 10px; opacity: .7; margin-top: 3px; }
    .chat-ref-chip { font-size: 11px; font-weight: 700; opacity: .9; margin-bottom: 3px; }
    .chat-composer { border-top: 1px solid var(--line); padding: 10px 12px; }
    .chat-ref { background: var(--accent-soft); border-radius: 8px; padding: 6px 10px; margin-bottom: 8px; font-size: 13px; }
    .chat-row { display: flex; gap: 8px; align-items: center; }
    .chat-row input#chatBody { flex: 1; }
    .chat-row button { width: auto; }
    @media (max-width: 920px) {
      .chat-wrap { grid-template-columns: 1fr; height: auto; }
      .chat-side { max-height: 180px; }
      .chat-thread { height: 52vh; }
      main { padding: 14px; padding-bottom: 74px; }
      header { padding: 10px 12px; }
      .tabbar { display: flex; position: fixed; left: 0; right: 0; bottom: 0; z-index: 45; background: var(--panel); border-top: 1px solid var(--line); box-shadow: 0 -2px 10px rgba(0,0,0,.06); padding: 4px 4px calc(4px + env(safe-area-inset-bottom, 0px)); }
      .tabbar .tab { flex: 1 1 0; display: flex; flex-direction: column; align-items: center; gap: 2px; background: transparent; border: none; box-shadow: none; color: var(--muted); padding: 6px 2px; min-height: 52px; border-radius: 10px; min-width: 0; }
      .tabbar .tab .ic { font-size: 20px; line-height: 1; }
      .tabbar .tab .tl { font-size: 10.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
      .tabbar .tab.active { color: var(--accent); }
      .to-top { bottom: 80px; }
      .back-fab { bottom: 80px; }
      .brand img { height: 30px; }
      .card { padding: 16px; border-radius: 14px; }
      .workspace, .quote-layout, .proposal-layout { grid-template-columns: 1fr; }
      .grid, .quote-best { grid-template-columns: 1fr; }
      .totals { grid-template-columns: repeat(2, 1fr); }
      .notif-panel { position: fixed; left: 10px; right: 10px; top: 66px; width: auto; }
      .modal-overlay { padding: 3vh 10px; }
      .approve-grid { grid-template-columns: 1fr; }
      /* Hạn chế scroll ngang: bảng nhiều cột cho phép cuộn trong khung, còn lại co về 1 cột */
      .detail-head { grid-template-columns: 1fr; }
    }
    /* Mobile: bảng dữ liệu (chỉ đọc) xếp DỌC thành thẻ, khỏi cuộn ngang.
       Bảng nhập liệu .line-table giữ nguyên (cho phép cuộn). */
    .detail-total { text-align: right; font-size: 16px; margin-top: 8px; padding-top: 8px; border-top: 2px solid var(--line); }
    .hl-input { background: #FFF9DB !important; }
    .locked-input { background: #EEF1F5; color: #667; }
    .to-top { display: none; position: fixed; right: 14px; bottom: 18px; z-index: 40; width: 46px; height: 46px; border-radius: 50%; border: none; background: var(--accent); color: #fff; font-size: 22px; box-shadow: 0 4px 12px rgba(0,0,0,.25); cursor: pointer; }
    .to-top.show { display: block; }
    .back-fab { display: none; position: fixed; left: 12px; bottom: 18px; z-index: 40; align-items: center; gap: 6px; padding: 0 16px; height: 46px; border-radius: 24px; border: none; background: var(--ink); color: #fff; font-size: 14px; font-weight: 600; box-shadow: 0 4px 12px rgba(0,0,0,.25); cursor: pointer; }
    .back-fab.show { display: inline-flex; }
    .secnav { display: none; }
    .tabbar { display: none; }
    .mjump { display: none; }
    @media (max-width: 760px) {
      .mjump { display: flex; gap: 8px; flex-wrap: wrap; position: sticky; top: 0; z-index: 6; background: var(--bg); padding: 8px 0 10px; margin: -4px 0 8px; }
      .mjump button { flex: 1 1 auto; min-height: 42px; font-size: 14px; }
      .secnav { display: flex; gap: 8px; overflow-x: auto; position: sticky; top: 0; z-index: 6; background: var(--bg); padding: 8px 0; margin: -6px 0 10px; -webkit-overflow-scrolling: touch; }
      .secnav button { flex: 0 0 auto; min-height: 38px; padding: 6px 14px; font-size: 13px; white-space: nowrap; background: var(--panel); border: 1px solid var(--line); border-radius: 20px; color: var(--accent); font-weight: 600; box-shadow: none; }
      .secnav button:active { background: var(--accent-soft); }
      .entry-first { order: -1; }
      .table-wrap { max-height: none; overflow: visible; border: 0; }
      table:not(.line-table) { border: 0; min-width: 0; }
      table:not(.line-table) thead { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }
      table:not(.line-table), table:not(.line-table) tbody, table:not(.line-table) tr, table:not(.line-table) td { display: block; width: 100%; }
      table:not(.line-table) tr { border: 1px solid var(--line); border-radius: 12px; margin-bottom: 10px; padding: 4px 12px; background: #fff; box-shadow: var(--shadow); }
      table:not(.line-table) td { display: flex; justify-content: space-between; align-items: baseline; gap: 14px; text-align: right; padding: 8px 0; border: 0; border-bottom: 1px dashed var(--line); white-space: normal; word-break: break-word; }
      table:not(.line-table) td:last-child { border-bottom: 0; }
      table:not(.line-table) td::before { content: attr(data-label); font-weight: 600; color: var(--muted); text-align: left; flex: 0 0 42%; }
      table:not(.line-table) td:empty { display: none; }
      /* Bảng NHẬP LIỆU (dòng vật tư / dòng thanh toán): xếp dọc, ô nhập full-width, nhãn phía trên */
      .line-table { border: 0; min-width: 0; }
      .line-table thead { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }
      .line-table, .line-table tbody, .line-table tr, .line-table td { display: block; width: 100%; }
      .line-table tr { border: 1px solid var(--line); border-radius: 12px; margin-bottom: 12px; padding: 8px 12px; background: #fff; box-shadow: var(--shadow); }
      .line-table td { padding: 6px 0; border: 0; border-bottom: 1px dashed var(--line); }
      .line-table td:last-child { border-bottom: 0; text-align: right; }
      .line-table td::before { content: attr(data-label); display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
      .line-table td:last-child::before, .line-table td[data-label=""]::before { display: none; }
      .line-table td input, .line-table td select, .line-table td textarea, .line-table td .combo-stack { width: 100%; box-sizing: border-box; }
      .line-table td.num-cell { text-align: left; font-weight: 600; font-size: 16px; }
    }
  </style>
</head>
<body>
  <section id="loginView" class="login card">
    <div class="login-logo"><img src="./logo.png" onerror="this.onerror=null;this.src='./logo.svg'" alt="Thiên Nhật"></div>
    <h1 style="text-align:center">Phần mềm Mua hàng &amp; Công nợ</h1>
    <p class="status" style="text-align:center;margin-bottom:16px">Đăng nhập bằng email và mã PIN được quản trị viên cấp.</p>
    <div class="field">
      <label>Email</label>
      <input id="loginEmail" autocomplete="username" placeholder="email@congty.com">
    </div>
    <div class="field">
      <label>Mã PIN</label>
      <input id="loginPin" type="password" autocomplete="current-password" placeholder="Nhập mã PIN">
    </div>
    <button onclick="login()" style="width:100%">Đăng nhập</button>
    <p id="loginMsg" class="status" style="text-align:center"></p>
    <p class="status" style="text-align:center;font-size:12px;margin-top:14px">Yêu cầu cụ thể liên hệ tới email <b>ahuyle.work@gmail.com</b></p>
  </section>

  <section id="appView" class="hidden">
    <header>
      <div class="brand">
        <button class="menu-toggle" onclick="toggleDrawer()" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
        <img src="./logo.png" onerror="this.onerror=null;this.src='./logo.svg'" alt="Thiên Nhật">
      </div>
      <div class="header-right">
        <div class="bell-wrap">
          <button class="secondary bell-btn" onclick="toggleNotif()" title="Thông báo">🔔<span id="notifBadge" class="notif-badge hidden">0</span></button>
          <div id="notifPanel" class="notif-panel hidden"></div>
        </div>
        <button class="secondary" onclick="logout()">Đăng xuất</button>
      </div>
    </header>
    <div id="drawerBackdrop" class="drawer-backdrop hidden" onclick="closeDrawer()"></div>
    <aside id="drawer" class="drawer"></aside>
    <main id="content"></main>
  </section>

  <datalist id="doiTuongList"></datalist>
  <datalist id="vatTuList"></datalist>
  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
  <script src="./config.js"></script>
  <script>
    const APP = window.APP_CONFIG || {};
    const sb = window.supabase.createClient(APP.supabaseUrl, APP.supabaseAnonKey, {
      auth: { persistSession: true, autoRefreshToken: true }
    });

    const state = {
      session: null,
      user: null,
      doiTuong: [],
      vatTu: [],
      permissions: [],
      screen: 'quotes',
      quote: null
    };
    // Moi man hinh gan voi 1 quyen; nav chi hien man hinh ma vai tro co quyen (server VAN chot chan lai qua require_permission()).
    const allScreens = [
      ['quotes', 'Báo giá NCC', 'quote:read'],
      ['proposal', 'Đề xuất mua hàng / tạm ứng', 'proposal:create'],
      ['approve', 'Duyệt đề xuất mua hàng', 'proposal:approve'],
      ['receipt', 'Nhận hàng', 'receipt:update'],
      ['congnoconfirm', 'Duyệt chứng từ & lưu công nợ', 'congno:confirm'],
      ['payreq', 'Đề xuất thanh toán', 'payment:request'],
      ['payapprove', 'Duyệt đề xuất thanh toán', 'payment:approve'],
      ['debtpay', 'Cập nhật thanh toán', 'payment:create'],
      ['oversight', 'Theo dõi & rà soát', 'oversight:read'],
      ['dashboard', 'Theo dõi công nợ', 'dashboard:read'],
      ['settlement', 'Tất toán', 'settlement:preview'],
      ['printpp', 'In đề xuất mua hàng', 'print:purchasing'],
      ['printyctt', 'In phiếu yêu cầu TT', 'print:purchasing'],
      ['catalog', 'Danh mục', 'catalog:read'],
      ['users', 'Tài khoản', 'user:manage']
    ];
    const ROLE_LABELS = {
      NhanVienMuaHang: 'Nhân viên mua hàng',
      KeToanCongNo: 'Kế toán công nợ',
      TongGiamDoc: 'Tổng giám đốc',
      ChuTich: 'Chủ tịch',
      TruongPhong: 'Trưởng phòng',
      LanhDao: 'Lãnh đạo (cũ)',
      Admin: 'Admin'
    };
    function can(perm) {
      return state.permissions.includes('*') || state.permissions.includes(perm);
    }
    function visibleScreens() {
      return allScreens.filter(s => can(s[2]));
    }

    // Thin wrapper around supabase.rpc(...) that mirrors the old
    // google.script.run withSuccessHandler/withFailureHandler + timeout
    // pattern, so every screen below reads exactly like the GAS version.
    function call(name, params) {
      return new Promise((resolve, reject) => {
        let settled = false;
        const timer = setTimeout(() => {
          if (settled) return;
          settled = true;
          reject(new Error(`Tác vụ ${name} chạy quá lâu. Kiểm tra kết nối mạng.`));
        }, 45000);
        sb.rpc(name, params || {}).then(({ data, error }) => {
          if (settled) return;
          settled = true;
          clearTimeout(timer);
          if (error) { reject(new Error(error.message || String(error))); return; }
          if (data && data.ok === false) {
            const e = data.error || {};
            reject(new Error(e.message || data.message || `Tác vụ ${name} lỗi.`));
            return;
          }
          resolve(data);
        }).catch(err => {
          if (settled) return;
          settled = true;
          clearTimeout(timer);
          reject(err instanceof Error ? err : new Error(String(err || `Tác vụ ${name} lỗi.`)));
        });
      });
    }

    function toast(message, type='ok') {
      const el = document.getElementById('toast');
      if (!el) return;
      el.textContent = message || '';
      el.className = `toast ${type} show`;
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => el.classList.remove('show'), 3600);
    }
    async function withBusy(btn, label, fn) {
      const button = btn && btn.tagName ? btn : null;
      const oldText = button ? button.textContent : '';
      if (button) {
        button.disabled = true;
        button.textContent = label || 'Đang xử lý...';
      }
      try {
        return await fn();
      } finally {
        if (button) {
          button.disabled = false;
          button.textContent = oldText;
        }
      }
    }
    function loadingText(text='Đang tải...') {
      return `<div class="loading-line"><span class="spin"></span><span>${esc(text)}</span></div>`;
    }
    function todayStr() {
      const d = new Date();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${d.getFullYear()}-${m}-${day}`;
    }

    function fmtMoney(v) {
      const n = Number(v || 0);
      return n.toLocaleString('vi-VN', { maximumFractionDigits: 2 });
    }
    function fmtMaybeMoney(v) {
      if (v === '' || v === null || v === undefined) return '';
      const n = Number(v);
      return Number.isFinite(n) ? n.toLocaleString('vi-VN', { maximumFractionDigits: 2 }) : esc(v);
    }
    // ---- Currency inputs (VN format 1.234.567,89) --------------------------
    // Store nothing special in the DOM; format on blur, unformat on focus so
    // the caret never jumps while typing. moneyRaw() returns a clean numeric
    // string for submission (backend parse_number also understands VN format).
    function moneyRaw(elOrId) {
      const el = typeof elOrId === 'string' ? document.getElementById(elOrId) : elOrId;
      const s = String(el && el.value || '').trim();
      if (!s) return '';
      return s.replace(/\./g, '').replace(',', '.').replace(/[^\d.\-]/g, '');
    }
    function moneyNum(elOrId) {
      const r = moneyRaw(elOrId);
      const n = Number(r);
      return Number.isFinite(n) ? n : 0;
    }
    function moneyFormat(raw) {
      if (raw === '' || raw === null || raw === undefined) return '';
      const n = Number(String(raw).replace(/\./g, '').replace(',', '.'));
      return Number.isFinite(n) ? n.toLocaleString('vi-VN', { maximumFractionDigits: 2 }) : String(raw);
    }
    // Delegated: any input.js-money formats on blur, shows raw on focus.
    document.addEventListener('focusout', e => {
      if (e.target && e.target.classList && e.target.classList.contains('js-money')) {
        e.target.value = moneyFormat(moneyRaw(e.target));
      }
    });
    document.addEventListener('focusin', e => {
      if (e.target && e.target.classList && e.target.classList.contains('js-money')) {
        e.target.value = moneyRaw(e.target);
      }
    });
    function fmtPct(v) {
      if (v === '' || v === null || v === undefined) return '';
      const n = Number(v);
      return Number.isFinite(n) ? `${(n * 100).toLocaleString('vi-VN', {maximumFractionDigits: 1})}%` : '';
    }
    function esc(v) {
      return String(v ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
    }
    function val(id) { return document.getElementById(id)?.value || ''; }
    function setMsg(text) { document.querySelectorAll('.js-msg').forEach(el => el.textContent = text || ''); }

    // Login uses Supabase Auth directly: email + a PIN-derived password.
    // The "tn-pin::" prefix guarantees the real password meets Supabase's
    // minimum length even for a short numeric PIN; the PIN itself is never
    // stored anywhere except inside that password hash.
    async function login() {
      const msg = document.getElementById('loginMsg');
      msg.textContent = 'Đang đăng nhập...';
      const email = val('loginEmail').trim();
      const pin = val('loginPin').trim();
      if (!email || !pin) { msg.textContent = 'Nhập email và mã PIN.'; return; }
      try {
        const { data, error } = await sb.auth.signInWithPassword({ email, password: 'tn-pin::' + pin });
        if (error) throw error;
        state.session = data.session;
        await bootstrap();
      } catch (err) {
        msg.textContent = mapAuthError(err);
      }
    }
    function mapAuthError(err) {
      const msg = String(err && err.message || err || '');
      if (/invalid login credentials/i.test(msg)) return 'Email hoặc mã PIN không đúng.';
      if (/email not confirmed/i.test(msg)) return 'Tài khoản chưa được kích hoạt. Liên hệ quản trị viên.';
      return msg || 'Đăng nhập thất bại.';
    }

    async function logout() {
      await sb.auth.signOut();
      location.reload();
    }

    async function bootstrap() {
      try {
        const res = await call('rpc_bootstrap');
        state.user = res.user;
        state.doiTuong = res.doiTuong || [];
        state.vatTu = res.vatTu || [];
        state.vatTuInfo = res.vatTuInfo || [];
        state.permissions = res.permissions || [];
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('appView').classList.remove('hidden');
        const ub = document.getElementById('userBadge'); if (ub) ub.textContent = `${state.user.name} - ${state.user.role}`;
        renderLists();
        const allowed = visibleScreens();
        if (!allowed.some(s => s[0] === state.screen)) state.screen = allowed.length ? allowed[0][0] : 'quotes';
        renderDrawer();
        renderTabBar();
        renderScreen(state.screen);
        state.histDepth = 0;
        try { history.replaceState({ screen: state.screen }, '', '#' + state.screen); } catch (e) {}
        updateBackBtn();
        refreshNotif();
        if (!state.notifTimer) state.notifTimer = setInterval(refreshNotif, 45000);
      } catch (err) {
        document.getElementById('loginView').classList.remove('hidden');
        document.getElementById('appView').classList.add('hidden');
        document.getElementById('loginMsg').textContent = err.message || 'Không tải được dữ liệu. Liên hệ quản trị viên.';
      }
    }

    function renderLists() {
      document.getElementById('doiTuongList').innerHTML = state.doiTuong.map(d => `<option value="${esc(d.MaDoiTuong)}">${esc(d.TenDoiTuong)}</option>`).join('');
      document.getElementById('vatTuList').innerHTML = state.vatTu.map(x => `<option value="${esc(x)}"></option>`).join('');
    }

    // Menu "Tải dữ liệu" — xuất raw data phục vụ phân tích.
    const EXPORT_SCREENS = [
      ['exp_pp', 'Dữ liệu đề xuất mua hàng', 'recent:read'],
      ['exp_tt', 'Dữ liệu đề xuất thanh toán', 'recent:read'],
      ['exp_bg', 'Dữ liệu báo giá NCC', 'recent:read']
    ];
    function toggleDrawer() {
      const d = document.getElementById('drawer'); const b = document.getElementById('drawerBackdrop');
      const open = !d.classList.contains('open');
      d.classList.toggle('open', open); b.classList.toggle('hidden', !open);
      if (open) renderDrawer();
    }
    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawerBackdrop').classList.add('hidden');
    }
    function toggleGroup(el) { el.closest('.drawer-group').classList.toggle('collapsed'); }
    const TAB_ICON = { proposal:'➕', approve:'✅', payapprove:'💳', payreq:'🧾', debtpay:'💵', receipt:'📦', congnoconfirm:'📋', oversight:'🔍', dashboard:'📊', quotes:'🏷️', settlement:'✔️', catalog:'📚', users:'👥' };
    const TAB_LABEL = { proposal:'Tạo ĐX', approve:'Duyệt ĐX', payapprove:'Duyệt TT', payreq:'ĐX chi', debtpay:'Ghi TT', receipt:'Nhận hàng', congnoconfirm:'Duyệt CT', oversight:'Rà soát', dashboard:'Công nợ', quotes:'Báo giá', settlement:'Tất toán', catalog:'Danh mục', users:'Tài khoản' };
    const TAB_ORDER = ['proposal','approve','payapprove','oversight','congnoconfirm','payreq','debtpay','receipt','dashboard','quotes','settlement','catalog','users'];
    function renderTabBar() {
      let bar = document.getElementById('tabbar');
      if (!bar) { bar = document.createElement('nav'); bar.id = 'tabbar'; bar.className = 'tabbar'; document.body.appendChild(bar); }
      const allow = visibleScreens().map(s => s[0]);
      const picked = TAB_ORDER.filter(id => allow.includes(id)).slice(0, 4);
      const tab = id => `<button class="tab" data-id="${id}" onclick="navTo('${id}')"><span class="ic">${TAB_ICON[id] || '•'}</span><span class="tl">${esc(TAB_LABEL[id] || id)}</span></button>`;
      bar.innerHTML = picked.map(tab).join('') + `<button class="tab" data-id="__more" onclick="toggleDrawer()"><span class="ic">☰</span><span class="tl">Thêm</span></button>`;
      updateTabActive();
    }
    function updateTabActive() {
      const bar = document.getElementById('tabbar'); if (!bar) return;
      bar.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.id === state.screen));
    }
    function navTo(id) {
      closeDrawer();
      if (id === state.screen && !document.getElementById('catModal')) { renderScreen(id); return; }
      try { history.pushState({ screen: id }, '', '#' + id); } catch (e) {}
      state.histDepth = (state.histDepth || 0) + 1;
      renderScreen(id);
      updateBackBtn();
    }
    function updateBackBtn() {
      const b = document.getElementById('backFab');
      if (b) b.classList.toggle('show', (state.histDepth || 0) > 0);
    }
    function goBack() {
      if (document.getElementById('catModal')) { closeModal(); return; }
      history.back();
    }
    window.addEventListener('popstate', (e) => {
      if (document.getElementById('catModal')) {
        closeModal();
        try { history.pushState({ screen: state.screen }, '', '#' + state.screen); } catch (_) {}
        return;
      }
      const s = e.state && e.state.screen;
      if (s) { state.histDepth = Math.max(0, (state.histDepth || 0) - 1); renderScreen(s); updateBackBtn(); }
    });
    function renderDrawer() {
      const features = visibleScreens(); // các màn thao tác theo quyền
      const exps = EXPORT_SCREENS.filter(s => can(s[2]));
      const item = (id, label) => `<button class="drawer-item ${state.screen === id ? 'active' : ''}" onclick="navTo('${id}')">${label}</button>`;
      document.getElementById('drawer').innerHTML = `
        <div class="drawer-brand"><img src="./logo.png" onerror="this.onerror=null;this.src='./logo.svg'" alt="Thiên Nhật"><button class="drawer-x" onclick="closeDrawer()">✕</button></div>
        ${item('account', '👤 Tài khoản')}
        ${item('guide', '📘 Hướng dẫn')}
        ${item('chat', '💬 Tin nhắn')}
        <div class="drawer-group">
          <button class="drawer-group-h" onclick="toggleGroup(this)">Thao tác <span>▾</span></button>
          <div class="drawer-group-body">${features.map(([id, label]) => item(id, label)).join('')}</div>
        </div>
        ${exps.length ? `<div class="drawer-group">
          <button class="drawer-group-h" onclick="toggleGroup(this)">Tải dữ liệu <span>▾</span></button>
          <div class="drawer-group-body">${exps.map(([id, label]) => item(id, label)).join('')}</div>
        </div>` : ''}
        ${item('improve', '💡 Đề xuất cải tiến')}
        <div class="drawer-note">Yêu cầu cụ thể liên hệ tới email <b>ahuyle.work@gmail.com</b></div>`;
    }

    function renderShell(title, formHtml, recentKind) {
      document.getElementById('content').innerHTML = `
        <div class="workspace">
          <section class="card">
            <h2>${title}</h2>
            <div class="notice js-msg"></div>
            ${formHtml}
          </section>
          <aside class="card">
            <h2>Dữ liệu gần đây</h2>
            <div class="grid">
              <div class="field"><label>Số dòng</label><select id="recentLimit"><option>10</option><option selected>20</option><option>50</option><option>100</option></select></div>
              <div class="field"><label>Mã đối tượng</label><select id="recentMa">${objectOptions()}</select></div>
              <div class="field"><label>Từ ngày</label><input id="recentFrom" type="date"></div>
              <div class="field"><label>Đến ngày</label><input id="recentTo" type="date"></div>
            </div>
            <button class="secondary" onclick="loadRecent('${recentKind}', this)">Xem dữ liệu tổng hợp</button>
            <div id="recentBox" class="table-wrap" style="margin-top:12px"></div>
          </aside>
        </div>`;
    }

    function renderScreen(id) {
      state.screen = id;
      renderDrawer();
      updateTabActive();
      if (id === 'account') return renderAccount();
      if (id === 'guide') return renderGuide();
      if (id === 'chat') return renderChat();
      if (id === 'improve') return renderImprove();
      if (id === 'exp_pp') return renderExport('pp');
      if (id === 'exp_tt') return renderExport('tt');
      if (id === 'exp_bg') return renderExport('bg');
      if (id === 'quotes') return renderQuotes();
      if (id === 'proposal') return renderProposal();
      if (id === 'approve') return renderApprove();
      if (id === 'receipt') return renderReceipt();
      if (id === 'congnoconfirm') return renderCongNoConfirm();
      if (id === 'payment') return renderPayment();
      if (id === 'payreq') return renderPayReq();
      if (id === 'payapprove') return renderPayApprove();
      if (id === 'oversight') return renderOversight();
      if (id === 'debtpay') return renderDebtPay();
      if (id === 'dashboard') return renderDashboard();
      if (id === 'settlement') return renderSettlement();
      if (id === 'catalog') return renderCatalog();
      if (id === 'users') return renderUsers();
      if (id === 'printpp') return renderPrintPP();
      if (id === 'printyctt') return renderPrintYCTT();
    }

    function renderQuotes() {
      document.getElementById('content').innerHTML = `
        <div class="mjump"><button class="secondary" onclick="jumpTo('qTrack')">📊 Bảng so sánh giá NCC</button></div>
        <div class="quote-layout">
          <section class="card" id="qTrack">
            <div class="mjump"><button class="secondary" onclick="jumpTo('qEntry')">↑ Lên form nhập báo giá</button></div>
            <h2>Theo dõi báo giá nhà cung cấp</h2>
            <div class="notice ok">
              Chọn mặt hàng đã có mã. Hệ thống lấy giá mới nhất tại hoặc trước ngày so sánh, rồi xếp hạng NCC theo giá sau VAT. (Muốn thêm mã mới, dùng "Nhập báo giá mới" bên phải.)
            </div>
            <div class="grid">
              <div class="field">
                <label>Mặt hàng / vật tư</label>
                <select id="qItem" onchange="loadQuoteDashboard()">${materialOptions(state.quote?.item || '')}</select>
              </div>
              <div class="field">
                <label>Ngày so sánh</label>
                <input id="qAsOf" type="date">
                <small>Để trống sẽ dùng ngày báo giá mới nhất đã lưu.</small>
              </div>
            </div>
            <div class="actions">
              <button onclick="loadQuoteDashboard(this)">Làm mới bảng giá</button>
            </div>
            <div id="quoteBox" style="margin-top:12px">${loadingText('Đang tải bảng báo giá...')}</div>
          </section>
          <aside class="card entry-first" id="qEntry">
            <h2>Nhập báo giá mới</h2>
            <p class="status">Chọn 1 nhà cung cấp, thêm nhiều mặt hàng họ chào giá (mỗi dòng: giá · ĐVT · %VAT · có xuất VAT). Bấm Lưu để lưu cả loạt.</p>
            <div class="grid">
              <div class="field"><label>Ngày báo giá</label><input id="nqNgay" type="date" value="${todayStr()}"></div>
              <div class="field"><label>Nhà cung cấp</label><div class="combo-stack"><select id="nqNccSel">${supplierNameOptions()}</select><button type="button" class="secondary" onclick="createSupplierPopup(quotePickNewNcc)">＋ Tạo NCC mới</button></div></div>
            </div>
            <div class="actions">
              <button type="button" class="secondary" onclick="addNqLine()">＋ Thêm mặt hàng</button>
              <button type="button" class="secondary" onclick="createMaterialPopup(m=>addNqLine(m.ten, m.dvt))">＋ Tạo mặt hàng mới</button>
            </div>
            <div class="table-wrap"><table class="line-table"><thead><tr>
              <th style="min-width:150px">Mặt hàng</th><th style="width:90px">ĐVT</th><th style="width:130px">Giá (chưa VAT)</th><th style="width:90px">%VAT</th><th style="width:110px">Có xuất VAT</th><th style="min-width:120px">Ghi chú</th><th style="width:56px"></th>
            </tr></thead><tbody id="nqLines"></tbody></table></div>

            <p id="nqMsg" class="status" style="margin-top:8px"></p>
          </aside>
        </div>`;
      loadQuoteDashboard();
      addNqLine();

    async function loadQuoteDashboard(btn=null) {
      const item = comboValue('qItem', 'qItemNew');
      const payload = { p_item: item || null, p_as_of: val('qAsOf') || null, p_limit: 50 };
      const box = document.getElementById('quoteBox');
      if (box) box.innerHTML = loadingText('Đang tải bảng báo giá...');
      try {
        const res = await withBusy(btn, 'Đang tải...', () => call('rpc_get_quote_dashboard', payload));
        state.quote = res;
        if (!item && res.item) {
          const qItemNew = document.getElementById('qItemNew');
          if (qItemNew) qItemNew.value = res.item;
        }
        renderQuoteResult(res);
        toast(res.message || 'Đã cập nhật bảng báo giá.', 'ok');
      } catch (err) {
        const msg = err.message || String(err);
        if (box) box.innerHTML = `<div class="notice err">${esc(msg)}</div>`;
        toast(msg, 'err');
      }
    }

    function nqLineRow(ten, dvt) {
      return `<tr>
        <td><select class="nq-mat" onchange="nqFillDvt(this)">${materialOptions(ten || '')}</select></td>
        <td><input class="nq-dvt" value="${esc(dvt || dvtOf(ten) || '')}" placeholder="ĐVT"></td>
        <td><input class="nq-gia js-money" inputmode="decimal" placeholder="Giá chưa VAT"></td>
        <td><select class="nq-vat"><option value="0">0%</option><option value="0.08" selected>8%</option><option value="0.1">10%</option></select></td>
        <td><select class="nq-covat"><option value="true" selected>Có VAT</option><option value="false">Không VAT</option></select></td>
        <td><input class="nq-ghichu" placeholder="Ghi chú"></td>
        <td><button class="secondary" onclick="this.closest('tr').remove()">Xóa</button></td>
      </tr>`;
    }
    function addNqLine(ten, dvt) {
      const tb = document.getElementById('nqLines'); if (!tb) return;
      tb.insertAdjacentHTML('beforeend', nqLineRow(ten, dvt));
      if (ten) { const rows = tb.querySelectorAll('tr'); const last = rows[rows.length - 1]; last.querySelector('.nq-mat').value = ten; }
    }
    function nqFillDvt(sel) {
      const tr = sel.closest('tr'); const d = tr && tr.querySelector('.nq-dvt');
      if (d && !d.value) d.value = dvtOf(sel.value) || '';
    }
    async function saveQuotes(btn) {
      const msg = document.getElementById('nqMsg');
      const ncc = comboValue('nqNccSel', 'nqNccNew');
      if (!ncc) { toast('Chọn nhà cung cấp.', 'err'); return; }
      const lines = [...document.querySelectorAll('#nqLines tr')].map(tr => ({
        matHang: comboValue(tr.querySelector('.nq-mat'), null),
        dvt: tr.querySelector('.nq-dvt')?.value || '',
        gia: moneyRaw(tr.querySelector('.nq-gia')),
        vatRate: Number(tr.querySelector('.nq-vat')?.value || 0.08),
        coVat: tr.querySelector('.nq-covat')?.value !== 'false',
        ghiChu: tr.querySelector('.nq-ghichu')?.value || ''
      })).filter(l => l.matHang && Number(l.gia) > 0);
      if (!lines.length) { toast('Cần ít nhất một dòng có mặt hàng + giá.', 'err'); return; }
      msg.textContent = 'Đang lưu báo giá...';
      try {
        const r = await withBusy(btn, 'Đang lưu...', () => call('rpc_add_price_quotes_batch', { p_ncc: ncc, p_ngay: val('nqNgay') || null, p_lines: lines }));
        msg.textContent = `Đã lưu ${r.lines} dòng báo giá.`;
        toast(`Đã lưu ${r.lines} dòng báo giá cho ${ncc}.`, 'ok');
        document.getElementById('nqLines').innerHTML = ''; addNqLine();
        loadQuoteDashboard();
      } catch (err) { msg.textContent = err.message || err; toast(err.message || String(err), 'err'); }
    }

    function renderQuoteResult(res) {
      const box = document.getElementById('quoteBox');
      if (!box) return;
      const best = res.best || {};
      const rows = res.rows || [];
      const history = res.history || [];
      box.innerHTML = `
        <div class="quote-best">
          <div class="metric best">Giá tốt nhất<strong>${best.priceAfterVat ? fmtMaybeMoney(best.priceAfterVat) : '-'}</strong><small>${esc(best.unit || '')}</small></div>
          <div class="metric">NCC đề xuất<strong>${esc(best.supplier || '-')}</strong><small>${esc(best.date || res.asOf || '')}</small></div>
          <div class="metric">Số NCC có giá<strong>${fmtMoney(res.supplierCount || 0)}</strong><small>Mặt hàng: ${esc(res.item || 'Chưa chọn')}</small></div>
        </div>
        <h3>Bảng so sánh NCC</h3>
        ${quoteCandidateTable(rows)}
        <h3>Lịch sử giá gần nhất</h3>
        ${quoteHistoryTable(history)}
      `;
    }

    function quoteCandidateTable(rows) {
      if (!rows.length) return '<p class="status">Chưa có giá phù hợp cho mặt hàng/ngày đang chọn.</p>';
      return `<div class="table-wrap"><table><thead><tr>
        <th>Rank</th><th>NCC</th><th>Ngày giá</th><th>Giá sau VAT</th><th>+/- lần trước</th><th>%</th><th>Xu hướng</th><th>ĐVT</th><th>Đề xuất</th><th>Ghi chú</th>
      </tr></thead><tbody>${rows.map(r => `<tr>
        <td>${esc(r.rank)}</td>
        <td>${esc(r.supplier)}</td>
        <td>${esc(r.date)}</td>
        <td>${fmtMaybeMoney(r.priceAfterVat)}</td>
        <td>${fmtMaybeMoney(r.delta)}</td>
        <td>${fmtPct(r.pct)}</td>
        <td>${esc(r.trend)}</td>
        <td>${esc(r.unit)}</td>
        <td>${esc(r.recommended)}</td>
        <td>${esc(r.note)}</td>
      </tr>`).join('')}</tbody></table></div>`;
    }

    function quoteHistoryTable(rows) {
      if (!rows.length) return '<p class="status">Chưa có lịch sử giá cho mặt hàng này.</p>';
      return `<div class="table-wrap"><table><thead><tr>
        <th>Ngày</th><th>NCC</th><th>Giá sau VAT</th><th>+/-</th><th>%</th><th>Xu hướng</th><th>VAT</th><th>ĐVT</th><th>Ghi chú</th>
      </tr></thead><tbody>${rows.map(r => `<tr>
        <td>${esc(r.date)}</td>
        <td>${esc(r.supplier)}</td>
        <td>${fmtMaybeMoney(r.priceAfterVat)}</td>
        <td>${fmtMaybeMoney(r.delta)}</td>
        <td>${fmtPct(r.pct)}</td>
        <td>${esc(r.trend)}</td>
        <td>${esc(r.vatStatus)}</td>
        <td>${esc(r.unit)}</td>
        <td>${esc(r.note)}</td>
      </tr>`).join('')}</tbody></table></div>`;

    function objectFields(prefix='') {
      return `
        <div class="grid">
          <div class="field"><label>Nhà cung cấp</label><div class="combo-stack"><select id="${prefix}maDoiTuong" onchange="fillObjectName('${prefix}')">${objectOptions()}</select><button type="button" class="secondary" onclick="createSupplierPopup(r=>objectPickNewNcc('${prefix}', r))">＋ Tạo NCC mới</button></div><small>Chỉ hiện NCC thuộc bộ phận bạn. Chưa có thì bấm "Tạo NCC mới".</small></div>
          <div class="field"><label>Tên nhà cung cấp</label><input id="${prefix}tenDoiTuong"></div>
        </div>`;
    }
    function objectPickNewNcc(prefix, r) {
      const sel = document.getElementById(prefix + 'maDoiTuong');
      if (sel) { sel.innerHTML = objectOptions(); sel.value = r.MaDoiTuong; }
      fillObjectName(prefix);
    }
    function objectOptions() {
      return '<option value="">-- Chọn đối tượng / nhập mới --</option>' + state.doiTuong.map(d =>
        `<option value="${esc(d.MaDoiTuong)}">${esc(d.MaDoiTuong)} - ${esc(d.TenDoiTuong)}</option>`
      ).join('');
    }

    function quotePickNewMat(r) {
      const sel = document.getElementById('nqItem');
      if (sel) { sel.innerHTML = materialOptions(r.ten); sel.value = r.ten; }
      const dvt = document.getElementById('nqDvt'); if (dvt && r.dvt) dvt.value = r.dvt;
      onQuoteMatChange();
    }
    function quotePickNewNcc(r) {
      const sel = document.getElementById('nqNccSel');
      if (sel) { sel.innerHTML = supplierNameOptions(r.TenDoiTuong); sel.value = r.TenDoiTuong; }
    }
    function supplierNameOptions(selected) {
      const cur = String(selected || '').trim();
      return '<option value="">-- Chọn nhà cung cấp --</option>' + (state.doiTuong || []).map(d =>
        `<option value="${esc(d.TenDoiTuong)}" ${d.TenDoiTuong === cur ? 'selected' : ''}>${esc(d.TenDoiTuong)}</option>`
      ).join('');
    }
    function dvtOf(name) {
      const n = String(name || '').trim().toLowerCase();
      const m = (state.vatTuInfo || []).find(x => String(x.ten || '').trim().toLowerCase() === n);
      return m ? (m.dvt || '') : '';
    }
    function onQuoteMatChange() {
      const name = comboValue('nqItem', 'nqItemNew');
      const dvt = dvtOf(name);
      const el = document.getElementById('nqDvt');
      if (el && dvt) el.value = dvt;   // tự điền ĐVT theo danh mục; vẫn cho sửa tay
    }
    function materialOptions(selected) {
      const current = String(selected || '').trim();
      const items = Array.from(new Set([...(state.vatTu || []), current].filter(Boolean))).sort();
      return '<option value="">-- Chọn mặt hàng --</option>' + items.map(name =>
        `<option value="${esc(name)}" ${name === current ? 'selected' : ''}>${esc(name)}</option>`
      ).join('');
    }

    function comboValue(selectOrId, inputOrId) {
      const select = typeof selectOrId === 'string' ? document.getElementById(selectOrId) : selectOrId;
      const input = typeof inputOrId === 'string' ? document.getElementById(inputOrId) : inputOrId;
      const typed = String(input && input.value || '').trim();
      return typed || String(select && select.value || '').trim();
    }

    function fillObjectName(prefix='') {
      const ma = val(prefix + 'maDoiTuong');
      const found = state.doiTuong.find(d => d.MaDoiTuong === ma);
      if (found) {
        const custom = document.getElementById(prefix + 'maDoiTuongMoi');
        if (custom) custom.value = '';
        document.getElementById(prefix + 'tenDoiTuong').value = found.TenDoiTuong || '';
        const term = document.getElementById(prefix + 'dieuKhoanTT');
        if (term && !term.value) term.value = found.DieuKhoanTT_MacDinh || '';
      }
    }

      document.getElementById('content').innerHTML = `

        <div class="proposal-layout">

            ${ed && ed.LyDoTraLai ? `<div class="notice err">↩ <b>Đề xuất bị trả lại (rà soát):</b> ${esc(ed.LyDoTraLai)}<br><small>Vui lòng chỉnh sửa/giải trình theo yêu cầu, sau đó Lưu nháp rồi Gửi duyệt lại.</small></div>` : ''}

              </select></div>
              <div class="field"><label>Ngày đề xuất</label><input id="pNgay" type="date" value="${todayStr()}"></div>
            </div>
            <div class="grid">
              <div class="field"><label>Người đề nghị *</label><select id="pNguoi"><option value="">Đang tải...</option></select></div>
              <div class="field"><label>Bộ phận</label><select id="pBoPhan"><option value="">— Chọn bộ phận —</option></select></div>
            </div>
            ${objectFields('p')}
            <div class="grid">
              <div class="field"><label>Hạn thanh toán *</label><input id="pHan" type="date"></div>
              <div class="field"><label>Tồn kho mặt hàng hiện tại</label><input id="pTonKho" inputmode="decimal" placeholder="Không bắt buộc"></div>
            </div>
            <div class="field"><label>Điều khoản thanh toán</label><textarea id="pDieuKhoanTT"></textarea></div>
            <div class="field"><label>Báo giá đính kèm <span style="color:var(--danger)">*</span></label>
              <input id="pFiles" type="file" multiple accept=".pdf,.doc,.docx,.xls,.xlsx,image/*">
              <small>Báo giá gốc của lô (PDF/Word/ảnh) — lãnh đạo xem khi duyệt. ${ed && (ed.Attachments||[]).length ? 'Đã có ' + ed.Attachments.length + ' tệp; chọn tệp mới để thay.' : 'Bắt buộc với đề xuất Mua hàng.'}</small>
            </div>
            <div class="plan-box">
              <label class="check-line"><input type="checkbox" id="pTruongBp"> Trưởng bộ phận đã duyệt đề xuất này</label>
              <label class="check-line" style="margin-top:8px"><input type="checkbox" id="pPrepay" onchange="togglePrepay()"> Thanh toán TRƯỚC khi nhận hàng (công nợ hiện ngay khi duyệt)</label>
              <div id="pPrepayWrap" style="display:none;margin-top:6px"><div class="field"><label>% trả trước so với giá trị đơn</label><input id="pPrepayPct" class="hl-input" inputmode="decimal" placeholder="VD: 30" oninput="prepayHint()"><small id="pPrepayHint" class="status"></small></div></div>

              <div id="pJustifyWrap" class="field" style="margin-top:10px">
                <label>Giải trình lý do phát sinh ngoài kế hoạch chi tuần *</label>
                <textarea id="pGiaiTrinh" placeholder="Bắt buộc nếu khoản chi CHƯA có trong kế hoạch tuần."></textarea>

            <h3>Dòng vật tư</h3>
            <div class="table-wrap"><table id="lineTable" class="line-table"><thead><tr><th style="min-width:200px">Mặt hàng</th><th style="min-width:110px">SL đặt</th><th style="min-width:150px">Đơn giá (chưa VAT)</th><th style="min-width:130px">%VAT</th><th style="min-width:150px">Thành tiền (sau VAT)</th><th style="min-width:160px">Ghi chú</th><th style="min-width:64px"></th></tr></thead><tbody></tbody></table></div>
            <div class="total-bar">Trước VAT: <strong id="totalPre">0</strong> · Tiền VAT: <strong id="totalVat">0</strong> · Tổng sau VAT: <strong id="proposalTotal">0 đ</strong></div>
            <div class="actions">
              <button class="secondary" onclick="addLine()">+ Thêm dòng</button>
              <button class="secondary" onclick="copyLastLine()">Chép dòng cuối</button>

              ${ed ? `<button class="secondary" onclick="state.editingProposal=null; renderProposal()">Huỷ sửa</button>` : ''}
            </div>
          </section>
          <aside class="card review-pane" id="pMineBox">
            <div class="mjump"><button class="secondary" onclick="jumpTo('pFormCard')">↑ Lên form tạo phiếu</button></div>
            <h2>Đề xuất của tôi</h2>
            <p class="status">Lưu nháp, kiểm tra ở đây (bấm <b>Sửa</b> nếu cần bổ sung), rồi bấm <b>Gửi duyệt</b>.</p>
