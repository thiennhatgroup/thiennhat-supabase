<!doctype html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thiên Nhật - Mua hàng &amp; Công nợ</title>
  <style>
    :root {
      --bg: #F0EEE6;
      --panel: #FAF8F1;
      --ink: #141413;
      --muted: #6E675E;
      --line: #D8D1C4;
      --accent: #D97757;
      --accent-dark: #B85F43;
      --input: #FBF3D2;
      --ok: #2F7D57;
      --danger: #B94A48;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(250, 248, 241, .92);
      position: sticky;
      top: 0;
      z-index: 5;
    }
    h1 { margin: 0; font-size: 20px; }
    h2 { margin: 0 0 12px; font-size: 18px; }
    h3 { margin: 18px 0 8px; font-size: 14px; color: var(--muted); text-transform: uppercase; }
    button, input, select, textarea {
      font: inherit;
      border-radius: 8px;
      border: 1px solid var(--line);
      min-height: 44px;
    }
    input, select, textarea {
      width: 100%;
      background: var(--input);
      padding: 11px 13px;
      font-size: 15px;
    }
    input:focus, select:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
    textarea { min-height: 90px; resize: vertical; }
    button {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }
    button.secondary { background: transparent; color: var(--ink); border-color: var(--line); }
    button.danger { background: var(--danger); border-color: var(--danger); }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .app {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: calc(100vh - 73px);
    }
    nav {
      border-right: 1px solid var(--line);
      padding: 16px;
      background: rgba(250, 248, 241, .56);
    }
    nav button {
      width: 100%;
      margin: 0 0 8px;
      text-align: left;
      background: transparent;
      color: var(--ink);
      border-color: transparent;
    }
    nav button.active { background: #E8DED1; border-color: #D8C7B7; }
    main { padding: 18px; }
    .workspace {
      display: grid;
      grid-template-columns: minmax(320px, 1fr) minmax(360px, .95fr);
      gap: 18px;
      align-items: start;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 1px 0 rgba(0,0,0,.03);
    }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; }
    .field { margin-bottom: 12px; }
    .combo-stack { display: grid; gap: 6px; }
    .combo-stack input, .combo-stack select { min-height: 38px; }
    label { display: block; margin-bottom: 6px; color: var(--muted); font-weight: 700; font-size: 13px; }
    .line-table { min-width: 760px; }
    .line-table input, .line-table select { min-height: 42px; font-size: 14px; padding: 9px 11px; }
    .line-table .js-mat-select, .line-table .js-vat-select { min-height: 40px; }
    .line-table th, .line-table td { padding: 9px 9px; vertical-align: middle; }
    .proposal-layout { display: grid; grid-template-columns: minmax(520px, 1.5fr) minmax(300px, .85fr); gap: 18px; align-items: start; }
    .review-pane { position: sticky; top: 90px; }
    .review-head > div { margin-bottom: 4px; }
    @media (max-width: 1100px) { .proposal-layout { grid-template-columns: 1fr; } .review-pane { position: static; } }
    .num-cell { text-align: right; font-variant-numeric: tabular-nums; font-weight: 700; white-space: nowrap; }
    .total-bar { margin: 10px 0 4px; padding: 12px 14px; background: #EEF8F1; border: 1px solid #BFDCC8; border-radius: 8px; text-align: right; font-size: 15px; color: #245D42; }
    .total-bar strong { font-size: 18px; margin: 0 4px; }
    .js-price-hint { margin-top: 5px; font-size: 11.5px; }
    .js-price-hint.over { color: var(--danger); font-weight: 700; }
    .js-price-hint.over::after { content: " — cao hơn giá tốt nhất!"; }
    small { color: var(--muted); display: block; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th, td { border-bottom: 1px solid #E6DFD2; padding: 8px; text-align: left; vertical-align: top; }
    th { background: #141413; color: #fff; position: sticky; top: 0; z-index: 1; }
    .table-wrap { overflow: auto; max-height: 520px; border: 1px solid var(--line); border-radius: 8px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .notice { padding: 10px 12px; background: #FFF7E7; border: 1px solid #E8D3A6; border-radius: 8px; color: #5E4A1D; margin-bottom: 12px; }
    .notice.ok { background: #EEF8F1; border-color: #BFDCC8; color: #245D42; }
    .notice.err { background: #FFF0ED; border-color: #E6B8AC; color: #8D332D; }
    .status { color: var(--muted); }
    .pill { display: inline-block; padding: 4px 8px; border-radius: 999px; background: #ECE5D8; font-size: 12px; }
    .pill.ok { background: #E2F2E8; color: #245D42; }
    .pill.warn { background: #FFF0C9; color: #664B00; }
    .pill.err { background: #F8D7D2; color: #8D332D; }
    .totals { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 12px; }
    .metric { background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 12px; }
    .metric strong { display: block; font-size: 18px; margin-top: 4px; }
    .metric.best { border-color: #90C9A7; background: #F3FBF5; }
    .quote-layout { display: grid; grid-template-columns: minmax(360px, 1.15fr) minmax(320px, .85fr); gap: 18px; align-items: start; }
    .quote-best { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin: 12px 0; }
    .hint-list { margin: 8px 0 0; padding-left: 18px; color: var(--muted); }
    .hint-list li { margin-bottom: 5px; }
    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      min-width: 260px;
      max-width: 460px;
      padding: 13px 14px;
      border-radius: 8px;
      background: #141413;
      color: #fff;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: .18s ease;
      z-index: 30;
      font-weight: 700;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.ok { background: var(--ok); }
    .toast.err { background: var(--danger); }
    .loading-line { display: flex; gap: 8px; align-items: center; color: var(--muted); }
    .spin {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid #D8D1C4;
      border-top-color: var(--accent);
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .login {
      max-width: 420px;
      margin: 8vh auto;
    }
    .hidden { display: none !important; }
    .cat-tabs { display: flex; gap: 8px; }
    .cat-tabs button { width: auto; }
    .cat-toolbar { display: flex; gap: 10px; align-items: center; }
    .cat-toolbar input { flex: 1; }
    .cat-toolbar button { width: auto; white-space: nowrap; }
    td code { background: #ECE5D8; padding: 2px 6px; border-radius: 6px; font-size: 12px; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(20,20,19,.45); display: flex; align-items: flex-start; justify-content: center; padding: 6vh 16px; z-index: 40; overflow: auto; }
    .modal-card { width: 100%; max-width: 620px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .bell-wrap { position: relative; }
    .bell-btn { position: relative; font-size: 18px; padding: 8px 12px; min-height: 40px; }
    .notif-badge { position: absolute; top: -6px; right: -6px; background: var(--danger); color: #fff; border-radius: 999px; font-size: 11px; font-weight: 700; padding: 1px 6px; min-width: 18px; text-align: center; }
    .notif-panel { position: absolute; right: 0; top: 48px; width: 360px; max-height: 460px; overflow: auto; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; box-shadow: 0 12px 34px rgba(0,0,0,.18); z-index: 35; padding: 8px; }
    .notif-item { padding: 10px; border-radius: 8px; cursor: pointer; border-bottom: 1px solid var(--line); }
    .notif-item:hover { background: #F0EEE6; }
    .notif-item.unread { background: #FFF7E7; }
    .notif-item .nt-title { font-weight: 700; font-size: 13px; }
    .notif-item .nt-body { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .notif-item .nt-time { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .notif-head { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; }
    .plan-box { border: 1px dashed var(--line); border-radius: 8px; padding: 12px; margin-bottom: 12px; background: #fff; }
    .check-line { display: flex; align-items: center; gap: 10px; font-weight: 700; color: var(--ink); margin: 0; }
    .check-line input { width: auto; min-height: auto; }
    .approve-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
    .approve-card { border: 1px solid var(--line); border-radius: 10px; padding: 14px; background: #fff; cursor: pointer; transition: .15s; }
    .approve-card:hover { border-color: var(--accent); box-shadow: 0 4px 14px rgba(0,0,0,.08); transform: translateY(-1px); }
    .ac-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .ac-obj { font-weight: 700; margin-bottom: 4px; }
    .ac-money { font-size: 18px; color: var(--accent-dark); font-weight: 800; }
    .ac-money small { color: var(--muted); font-weight: 400; font-size: 12px; }
    .ac-meta { color: var(--muted); font-size: 12px; margin: 6px 0; }
    .ac-hint { color: var(--accent); font-size: 12px; margin-top: 8px; font-weight: 700; }
    .detail-head { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px 16px; margin-bottom: 12px; }
    .detail-head label { margin: 0; font-size: 12px; }
    .line-clickable { cursor: pointer; }
    .line-clickable:hover td { background: #FBF3D2; }
    .mini-link { color: var(--accent); font-size: 11px; margin-left: 6px; }
    .compare-panel { border: 1px solid var(--accent); border-radius: 8px; padding: 12px; margin-top: 12px; background: #FFFBF4; }
    .compare-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .best-row td { background: #EEF8F1; font-weight: 700; }
    @media (max-width: 920px) {
      .app { grid-template-columns: 1fr; }
      nav { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 6px; border-right: 0; border-bottom: 1px solid var(--line); }
      nav button { margin: 0; }
      .workspace, .quote-layout { grid-template-columns: 1fr; }
      .grid, .totals, .quote-best { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <section id="loginView" class="login card">
    <h1>Thiên Nhật - Mua hàng &amp; Công nợ</h1>
    <p class="status">Đăng nhập bằng email và mã PIN được Admin cấp (bảng <code>profiles</code> trong Supabase).</p>
    <div class="field">
      <label>Email</label>
      <input id="loginEmail" autocomplete="username">
    </div>
    <div class="field">
      <label>Mã PIN</label>
      <input id="loginPin" type="password" autocomplete="current-password">
    </div>
    <button onclick="login()">Đăng nhập</button>
    <p id="loginMsg" class="status"></p>
  </section>

  <section id="appView" class="hidden">
    <header>
      <div>
        <h1>Web App Mua hàng &amp; Công nợ</h1>
        <div id="userBadge" class="status"></div>
      </div>
      <div class="header-right">
        <div class="bell-wrap">
          <button class="secondary bell-btn" onclick="toggleNotif()" title="Thông báo">🔔<span id="notifBadge" class="notif-badge hidden">0</span></button>
          <div id="notifPanel" class="notif-panel hidden"></div>
        </div>
        <button class="secondary" onclick="logout()">Đăng xuất</button>
      </div>
    </header>
    <div class="app">
      <nav id="nav"></nav>
      <main id="content"></main>
    </div>
  </section>

  <datalist id="doiTuongList"></datalist>
  <datalist id="vatTuList"></datalist>
  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <script src="./config.js"></script>
  <script>
    const APP = window.APP_CONFIG || {};
    const sb = window.supabase.createClient(APP.supabaseUrl, APP.supabaseAnonKey, {
      auth: { persistSession: true, autoRefreshToken: true }
    });

    const state = {
      session: null,
      user: null,
      doiTuong: [],
      vatTu: [],
      permissions: [],
      screen: 'quotes',
      quote: null
    };
    // Moi man hinh gan voi 1 quyen; nav chi hien man hinh ma vai tro co quyen (server VAN chot chan lai qua require_permission()).
    const allScreens = [
      ['quotes', 'Báo giá NCC', 'quote:read'],
      ['proposal', 'Đề xuất mua hàng / tạm ứng', 'proposal:create'],
      ['approve', 'Duyệt đề xuất mua hàng', 'proposal:approve'],
      ['receipt', 'Nhận hàng', 'receipt:update'],
      ['payreq', 'Đề xuất thanh toán', 'payment:request'],
      ['payapprove', 'Duyệt đề xuất thanh toán', 'payment:approve'],
      ['dashboard', 'Dashboard công nợ', 'dashboard:read'],
      ['settlement', 'Tất toán', 'settlement:preview'],
      ['printpp', 'In đề xuất mua hàng', 'recent:read'],
      ['printyctt', 'In phiếu yêu cầu TT', 'recent:read'],
      ['catalog', 'Danh mục', 'catalog:read'],
      ['users', 'Tài khoản', 'user:manage']
    ];
    const ROLE_LABELS = {
      NhanVienMuaHang: 'Nhân viên mua hàng',
      TruongPhong: 'Trưởng phòng',
      KeToanCongNo: 'Kế toán công nợ',
      LanhDao: 'Lãnh đạo',
      Admin: 'Admin'
    };
    function can(perm) {
      return state.permissions.includes('*') || state.permissions.includes(perm);
    }
    function visibleScreens() {
      return allScreens.filter(s => can(s[2]));
    }

    // Thin wrapper around supabase.rpc(...) that mirrors the old
    // google.script.run withSuccessHandler/withFailureHandler + timeout
    // pattern, so every screen below reads exactly like the GAS version.
    function call(name, params) {
      return new Promise((resolve, reject) => {
        let settled = false;
        const timer = setTimeout(() => {
          if (settled) return;
          settled = true;
          reject(new Error(`Tác vụ ${name} chạy quá lâu. Kiểm tra kết nối Supabase.`));
        }, 45000);
        sb.rpc(name, params || {}).then(({ data, error }) => {
          if (settled) return;
          settled = true;
          clearTimeout(timer);
          if (error) { reject(new Error(error.message || String(error))); return; }
          if (data && data.ok === false) {
            const e = data.error || {};
            reject(new Error(e.message || data.message || `Tác vụ ${name} lỗi.`));
            return;
          }
          resolve(data);
        }).catch(err => {
          if (settled) return;
          settled = true;
          clearTimeout(timer);
          reject(err instanceof Error ? err : new Error(String(err || `Tác vụ ${name} lỗi.`)));
        });
      });
    }

    function toast(message, type='ok') {
      const el = document.getElementById('toast');
      if (!el) return;
      el.textContent = message || '';
      el.className = `toast ${type} show`;
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => el.classList.remove('show'), 3600);
    }
    async function withBusy(btn, label, fn) {
      const button = btn && btn.tagName ? btn : null;
      const oldText = button ? button.textContent : '';
      if (button) {
        button.disabled = true;
        button.textContent = label || 'Đang xử lý...';
      }
      try {
        return await fn();
      } finally {
        if (button) {
          button.disabled = false;
          button.textContent = oldText;
        }
      }
    }
    function loadingText(text='Đang tải...') {
      return `<div class="loading-line"><span class="spin"></span><span>${esc(text)}</span></div>`;
    }
    function todayStr() {
      const d = new Date();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${d.getFullYear()}-${m}-${day}`;
    }

    function fmtMoney(v) {
      const n = Number(v || 0);
      return n.toLocaleString('vi-VN', { maximumFractionDigits: 2 });
    }
    function fmtMaybeMoney(v) {
      if (v === '' || v === null || v === undefined) return '';
      const n = Number(v);
      return Number.isFinite(n) ? n.toLocaleString('vi-VN', { maximumFractionDigits: 2 }) : esc(v);
    }
    // ---- Currency inputs (VN format 1.234.567,89) --------------------------
    // Store nothing special in the DOM; format on blur, unformat on focus so
    // the caret never jumps while typing. moneyRaw() returns a clean numeric
    // string for submission (backend parse_number also understands VN format).
    function moneyRaw(elOrId) {
      const el = typeof elOrId === 'string' ? document.getElementById(elOrId) : elOrId;
      const s = String(el && el.value || '').trim();
      if (!s) return '';
      return s.replace(/\./g, '').replace(',', '.').replace(/[^\d.\-]/g, '');
    }
    function moneyNum(elOrId) {
      const r = moneyRaw(elOrId);
      const n = Number(r);
      return Number.isFinite(n) ? n : 0;
    }
    function moneyFormat(raw) {
      if (raw === '' || raw === null || raw === undefined) return '';
      const n = Number(String(raw).replace(/\./g, '').replace(',', '.'));
      return Number.isFinite(n) ? n.toLocaleString('vi-VN', { maximumFractionDigits: 2 }) : String(raw);
    }
    // Delegated: any input.js-money formats on blur, shows raw on focus.
    document.addEventListener('focusout', e => {
      if (e.target && e.target.classList && e.target.classList.contains('js-money')) {
        e.target.value = moneyFormat(moneyRaw(e.target));
      }
    });
    document.addEventListener('focusin', e => {
      if (e.target && e.target.classList && e.target.classList.contains('js-money')) {
        e.target.value = moneyRaw(e.target);
      }
    });
    function fmtPct(v) {
      if (v === '' || v === null || v === undefined) return '';
      const n = Number(v);
      return Number.isFinite(n) ? `${(n * 100).toLocaleString('vi-VN', {maximumFractionDigits: 1})}%` : '';
    }
    function esc(v) {
      return String(v ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
    }
    function val(id) { return document.getElementById(id)?.value || ''; }
    function setMsg(text) { document.querySelectorAll('.js-msg').forEach(el => el.textContent = text || ''); }

    // Login uses Supabase Auth directly: email + a PIN-derived password.
    // The "tn-pin::" prefix guarantees the real password meets Supabase's
    // minimum length even for a short numeric PIN; the PIN itself is never
    // stored anywhere except inside that password hash.
    async function login() {
      const msg = document.getElementById('loginMsg');
      msg.textContent = 'Đang đăng nhập...';
      const email = val('loginEmail').trim();
      const pin = val('loginPin').trim();
      if (!email || !pin) { msg.textContent = 'Nhập email và mã PIN.'; return; }
      try {
        const { data, error } = await sb.auth.signInWithPassword({ email, password: 'tn-pin::' + pin });
        if (error) throw error;
        state.session = data.session;
        await bootstrap();
      } catch (err) {
        msg.textContent = mapAuthError(err);
      }
    }
    function mapAuthError(err) {
      const msg = String(err && err.message || err || '');
      if (/invalid login credentials/i.test(msg)) return 'Email hoặc mã PIN không đúng.';
      if (/email not confirmed/i.test(msg)) return 'Tài khoản chưa xác nhận email. Hãy tắt "Confirm email" trong Supabase Auth settings hoặc xác nhận email trước.';
      return msg || 'Đăng nhập thất bại.';
    }

    async function logout() {
      await sb.auth.signOut();
      location.reload();
    }

    async function bootstrap() {
      try {
        const res = await call('rpc_bootstrap');
        state.user = res.user;
        state.doiTuong = res.doiTuong || [];
        state.vatTu = res.vatTu || [];
        state.permissions = res.permissions || [];
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('appView').classList.remove('hidden');
        document.getElementById('userBadge').textContent = `${state.user.name} - ${state.user.role}`;
        renderLists();
        const allowed = visibleScreens();
        if (!allowed.some(s => s[0] === state.screen)) state.screen = allowed.length ? allowed[0][0] : 'dashboard';
        renderNav();
        renderScreen(state.screen);
        refreshNotif();
        if (!state.notifTimer) state.notifTimer = setInterval(refreshNotif, 45000);
      } catch (err) {
        document.getElementById('loginView').classList.remove('hidden');
        document.getElementById('appView').classList.add('hidden');
        document.getElementById('loginMsg').textContent = err.message || 'Không tải được dữ liệu webapp. Hãy kiểm tra profiles/role_permissions trong Supabase.';
      }
    }

    function renderLists() {
      document.getElementById('doiTuongList').innerHTML = state.doiTuong.map(d => `<option value="${esc(d.MaDoiTuong)}">${esc(d.TenDoiTuong)}</option>`).join('');
      document.getElementById('vatTuList').innerHTML = state.vatTu.map(x => `<option value="${esc(x)}"></option>`).join('');
    }

    async function loadQuoteDashboard(btn=null) {
      const item = comboValue('qItem', 'qItemNew');
      const payload = { p_item: item || null, p_as_of: val('qAsOf') || null, p_limit: 50 };
      const box = document.getElementById('quoteBox');
      if (box) box.innerHTML = loadingText('Đang tải dashboard báo giá...');
      try {
        const res = await withBusy(btn, 'Đang tải...', () => call('rpc_get_quote_dashboard', payload));
        state.quote = res;
        if (!item && res.item) {
          const qItemNew = document.getElementById('qItemNew');
          if (qItemNew) qItemNew.value = res.item;
        }
        renderQuoteResult(res);
        toast(res.message || 'Đã cập nhật dashboard báo giá.', 'ok');
      } catch (err) {
        const msg = err.message || String(err);
        if (box) box.innerHTML = `<div class="notice err">${esc(msg)}</div>`;
        toast(msg, 'err');
      }
    }

    async function addPriceQuote(btn) {
      const msg = document.getElementById('nqMsg');
      msg.textContent = 'Đang lưu báo giá...';
      try {
        const payload = {
          p_ngay: val('nqNgay') || null,
          p_mat_hang: comboValue('nqItem', 'nqItemNew'),
          p_ncc: val('nqNcc'),
          p_gia: moneyNum('nqGia') || null,
          p_vat_status: val('nqVat'),
          p_ghi_chu: val('nqGhiChu')
        };
        await withBusy(btn, 'Đang lưu...', () => call('rpc_add_price_quote', payload));
        msg.textContent = 'Đã lưu báo giá.';
        toast('Đã lưu báo giá.', 'ok');
        loadQuoteDashboard();
      } catch (err) { msg.textContent = err.message || err; toast(err.message || String(err), 'err'); }
    }

    function renderQuoteResult(res) {
      const box = document.getElementById('quoteBox');
      if (!box) return;
      const best = res.best || {};
      const rows = res.rows || [];
      const history = res.history || [];
      box.innerHTML = `
        <div class="quote-best">
          <div class="metric best">Giá tốt nhất<strong>${best.priceAfterVat ? fmtMaybeMoney(best.priceAfterVat) : '-'}</strong><small>${esc(best.unit || '')}</small></div>
          <div class="metric">NCC đề xuất<strong>${esc(best.supplier || '-')}</strong><small>${esc(best.date || res.asOf || '')}</small></div>
          <div class="metric">Số NCC có giá<strong>${fmtMoney(res.supplierCount || 0)}</strong><small>Mặt hàng: ${esc(res.item || 'Chưa chọn')}</small></div>

        ${quoteCandidateTable(rows)}

        <th>Ngày</th><th>NCC</th><th>Giá sau VAT</th><th>+/-</th><th>%</th><th>Xu hướng</th><th>VAT</th><th>ĐVT</th><th>Ghi chú</th>
      </tr></thead><tbody>${rows.map(r => `<tr>
        <td>${esc(r.date)}</td>
        <td>${esc(r.supplier)}</td>
        <td>${fmtMaybeMoney(r.priceAfterVat)}</td>
        <td>${fmtMaybeMoney(r.delta)}</td>
        <td>${fmtPct(r.pct)}</td>
        <td>${esc(r.trend)}</td>
        <td>${esc(r.vatStatus)}</td>
        <td>${esc(r.unit)}</td>
        <td>${esc(r.note)}</td>

    function objectFields(prefix='') {
      return `
        <div class="grid">
          <div class="field"><label>Mã đối tượng</label><div class="combo-stack"><select id="${prefix}maDoiTuong" onchange="fillObjectName('${prefix}')">${objectOptions()}</select><input id="${prefix}maDoiTuongMoi" placeholder="Nhập mã mới nếu chưa có trong danh mục"></div><small>Ô nhập mới sẽ được ưu tiên nếu có nội dung.</small></div>
          <div class="field"><label>Tên đối tượng</label><input id="${prefix}tenDoiTuong"></div>
        </div>`;

    function objectOptions() {
      return '<option value="">-- Chọn đối tượng / nhập mới --</option>' + state.doiTuong.map(d =>
        `<option value="${esc(d.MaDoiTuong)}">${esc(d.MaDoiTuong)} - ${esc(d.TenDoiTuong)}</option>`
      ).join('');
    }

    function materialOptions(selected) {
      const current = String(selected || '').trim();
      const items = Array.from(new Set([...(state.vatTu || []), current].filter(Boolean))).sort();
      return '<option value="">-- Chọn mặt hàng --</option>' + items.map(name =>
        `<option value="${esc(name)}" ${name === current ? 'selected' : ''}>${esc(name)}</option>`
      ).join('');
    }

    function comboValue(selectOrId, inputOrId) {
      const select = typeof selectOrId === 'string' ? document.getElementById(selectOrId) : selectOrId;
      const input = typeof inputOrId === 'string' ? document.getElementById(inputOrId) : inputOrId;
      const typed = String(input && input.value || '').trim();
      return typed || String(select && select.value || '').trim();
    }

    function fillObjectName(prefix='') {
      const ma = val(prefix + 'maDoiTuong');
      const found = state.doiTuong.find(d => d.MaDoiTuong === ma);
      if (found) {
        const custom = document.getElementById(prefix + 'maDoiTuongMoi');
        if (custom) custom.value = '';
        document.getElementById(prefix + 'tenDoiTuong').value = found.TenDoiTuong || '';
        const term = document.getElementById(prefix + 'dieuKhoanTT');
        if (term && !term.value) term.value = found.DieuKhoanTT_MacDinh || '';
      }
    }

    function renderProposal() {
      document.getElementById('content').innerHTML = `

            <h3>Dòng vật tư</h3>
            <div class="table-wrap"><table id="lineTable" class="line-table"><thead><tr><th style="min-width:200px">Mặt hàng</th><th style="min-width:110px">SL đặt</th><th style="min-width:150px">Đơn giá</th><th style="min-width:130px">VAT</th><th style="min-width:150px">Thành tiền (sau VAT)</th><th style="min-width:160px">Ghi chú</th><th style="min-width:64px"></th></tr></thead><tbody></tbody></table></div>
            <div class="total-bar">Trước VAT: <strong id="totalPre">0</strong> · Tiền VAT: <strong id="totalVat">0</strong> · Tổng sau VAT: <strong id="proposalTotal">0 đ</strong></div>

            <h2>Xem lại &amp; gửi duyệt</h2>
            <div id="proposalReview"><p class="status">Điền phiếu bên trái rồi bấm <b>“Xem lại phiếu →”</b>. Bản tóm tắt sẽ hiện ở đây để bạn kiểm tra lần cuối trước khi gửi lãnh đạo duyệt.</p></div>
            <h3 style="margin-top:18px">Đề xuất của tôi</h3>

    async function loadMyProposals() {
      const box = document.getElementById('myProposalsBox');
      if (!box) return;
      try {
        const res = await call('rpc_get_my_proposals', { p_limit: 20 });
        const rows = res.rows || [];
        box.innerHTML = rows.length ? `<div class="table-wrap" style="max-height:340px"><table><thead><tr>
          <th>Mã</th><th>NCC</th><th>Tổng</th><th>Trạng thái</th></tr></thead><tbody>
          ${rows.map(r => `<tr><td><code>${esc(r.MaDeXuat)}</code></td><td>${esc(r.TenDoiTuong||'')}</td>
            <td class="num-cell">${fmtMoney(r.TongTien)}</td><td>${proposalStatusPill(r.TrangThai)}</td></tr>`).join('')}
          </tbody></table></div>` : '<p class="status">Bạn chưa có đề xuất nào.</p>';
      } catch (err) { box.innerHTML = `<p class="status">${esc(err.message || err)}</p>`; }
    }
    function proposalStatusPill(s) {
      if (s === 'Đã duyệt') return '<span class="pill ok">Đã duyệt</span>';
      if (s === 'Từ chối') return '<span class="pill err">Từ chối</span>';
      if (s === 'Nháp') return '<span class="pill warn">Nháp</span>';
      return '<span class="pill warn">Chờ duyệt</span>';
    }
    function togglePlanJustify() {
      const inPlan = document.getElementById('pInPlan')?.checked;
      const wrap = document.getElementById('pJustifyWrap');
      if (wrap) wrap.style.display = inPlan ? 'none' : 'block';
    }
    // "Xem lại": build the current form into a right-side summary + final submit.
    function collectProposal() {
      const inPlan = document.getElementById('pInPlan')?.checked || false;
      return {
        status: 'Chờ duyệt',
        loaiDeXuat: val('pLoai'),
        trongKeHoachTuan: inPlan,
        giaiTrinhNgoaiKeHoach: inPlan ? '' : val('pGiaiTrinh'),
        ngayDeXuat: val('pNgay'),
        nguoiDeNghi: val('pNguoi'),
        doiTuong: { ma: comboValue('pmaDoiTuong', 'pmaDoiTuongMoi'), ten: val('ptenDoiTuong'), dieuKhoanTT: val('pDieuKhoanTT') },
        noiDung: val('pNoiDung'),
        dieuKhoanTT: val('pDieuKhoanTT'),
        lines: getProposalLines().filter(l => l.matHang && l.slDat && l.donGia)
      };
    }
    function reviewProposal() {
      const p = collectProposal();
      const box = document.getElementById('proposalReview');
      if (!p.lines.length) { box.innerHTML = '<p class="status">Chưa có dòng vật tư hợp lệ (cần mặt hàng, SL, đơn giá). Bổ sung rồi bấm lại.</p>'; return; }
      if (!p.doiTuong.ten) { box.innerHTML = '<p class="status">Chưa có tên đối tượng / NCC.</p>'; return; }
      let pre = 0, after = 0;
      const rows = p.lines.map(l => {
        const sl = Number(String(l.slDat).replace(/\./g,'').replace(',','.'))||0;
        const gia = Number(String(l.donGia).replace(/\./g,'').replace(',','.'))||0;
        const rate = (() => { const n = parseFloat(String(l.vat).replace('%','').replace(',','.')); return !isFinite(n)?0:(n>=1?n/100:n); })();
        const lp = sl*gia, la = lp*(1+rate); pre += lp; after += la;
        return `<tr><td>${esc(l.matHang)}</td><td class="num-cell">${fmtMaybeMoney(l.slDat)}</td><td class="num-cell">${fmtMoney(gia)}</td><td>${esc(l.vat)}</td><td class="num-cell">${fmtMoney(la)}</td></tr>`;
      }).join('');
      const planPill = p.trongKeHoachTuan ? '<span class="pill ok">Trong kế hoạch tuần</span>' : '<span class="pill warn">Ngoài kế hoạch</span>';
      box.innerHTML = `
        <div class="review-head">
          <div>${esc(p.loaiDeXuat==='TamUng'?'Tạm ứng':'Mua hàng')} · ${esc(p.ngayDeXuat)} · ${esc(p.nguoiDeNghi||'')}</div>
          <div><b>${esc(p.doiTuong.ten)}</b></div>
          <div>${planPill}</div>
        </div>
        ${!p.trongKeHoachTuan && p.giaiTrinhNgoaiKeHoach ? `<div class="notice">Giải trình: ${esc(p.giaiTrinhNgoaiKeHoach)}</div>` : ''}
        ${!p.trongKeHoachTuan && !p.giaiTrinhNgoaiKeHoach ? `<div class="notice err">Khoản ngoài kế hoạch tuần — cần nhập giải trình trước khi gửi.</div>` : ''}
        ${p.noiDung ? `<div class="field"><label>Nội dung</label><div>${esc(p.noiDung)}</div></div>` : ''}
        <div class="table-wrap" style="max-height:none"><table><thead><tr><th>Mặt hàng</th><th>SL</th><th>Đơn giá</th><th>VAT</th><th>Thành tiền</th></tr></thead><tbody>${rows}</tbody></table></div>
        <div class="total-bar">Trước VAT: <strong>${fmtMoney(pre)}</strong> · VAT: <strong>${fmtMoney(after-pre)}</strong> · Tổng: <strong>${fmtMoney(after)} đ</strong></div>
        <div class="actions">
          <button onclick="submitReviewedProposal(this)">✔ Gửi lãnh đạo duyệt</button>
        </div>`;
    }
    async function submitReviewedProposal(btn) {
      const p = collectProposal();
      if (!p.lines.length) { toast('Chưa có dòng vật tư hợp lệ.', 'err'); return; }
      if (!p.trongKeHoachTuan && !p.giaiTrinhNgoaiKeHoach.trim()) { toast('Cần giải trình khoản ngoài kế hoạch tuần.', 'err'); return; }
      try {
        const res = await withBusy(btn, 'Đang gửi...', () => call('rpc_create_proposal', { p_payload: p }));
        toast(`Đã gửi duyệt ${res.maDeXuat}.`, 'ok');
        renderProposal();
      } catch (err) { toast(err.message || String(err), 'err'); }
    }
    function togglePlanJustify() {
      const inPlan = document.getElementById('pInPlan')?.checked;
      const wrap = document.getElementById('pJustifyWrap');
      if (wrap) wrap.style.display = inPlan ? 'none' : 'block';
    }

    function lineRow(line={}) {
      return `<tr>
        <td><div class="combo-stack"><select class="js-mat-select" onchange="onLineMaterialChange(this)">${materialOptions(line.matHang)}</select><input class="js-mat-new" placeholder="Nhập mặt hàng mới" onchange="onLineMaterialChange(this)"></div><small class="js-price-hint status"></small></td>
        <td><input class="js-sl" inputmode="decimal" value="${esc(line.slDat || '')}" oninput="recalcLine(this)"></td>
        <td><input class="js-dongia js-money" inputmode="decimal" value="${line.donGia ? esc(moneyFormat(line.donGia)) : ''}" oninput="recalcLine(this)"></td>
        <td><div class="combo-stack"><select class="js-vat-select" onchange="recalcLine(this)"><option ${String(line.vat || '8%')==='0%'?'selected':''}>0%</option><option ${String(line.vat || '8%')==='8%'?'selected':''}>8%</option><option ${String(line.vat || '8%')==='10%'?'selected':''}>10%</option></select><input class="js-vat-new" placeholder="VAT khác, ví dụ 5%" oninput="recalcLine(this)"></div></td>
        <td class="js-thanhtien num-cell">0</td>
        <td><input class="js-ghichu" value="${esc(line.ghiChu || '')}"></td>
        <td><button class="secondary" onclick="this.closest('tr').remove(); recalcProposalTotal();">Xóa</button></td>
      </tr>`;
    }
    function addLine(line) {
      document.querySelector('#lineTable tbody').insertAdjacentHTML('beforeend', lineRow(line));
      const tr = document.querySelector('#lineTable tbody tr:last-child');
      if (tr) recalcLine(tr.querySelector('.js-sl'));
    }
    function copyLastLine() {
      const rows = getProposalLines();
      addLine(rows[rows.length - 1] || {});
    }
    function vatFromCombo(tr) {
      const raw = comboValue(tr.querySelector('.js-vat-select'), tr.querySelector('.js-vat-new'));
      const n = parseFloat(String(raw).replace('%', '').replace(',', '.'));
      if (!Number.isFinite(n)) return 0;
      return n >= 1 ? n / 100 : n;
    }
    function lineTotal(tr) {
      const sl = Number(String(tr.querySelector('.js-sl')?.value || '').replace(/\./g, '').replace(',', '.')) || 0;
      const gia = moneyNum(tr.querySelector('.js-dongia'));
      return Math.round(sl * gia * (1 + vatFromCombo(tr)) * 100) / 100;
    }
    function recalcLine(el) {
      const tr = el.closest('tr');
      if (!tr) return;
      const cell = tr.querySelector('.js-thanhtien');
      if (cell) cell.textContent = fmtMoney(lineTotal(tr));
      // Warn if this line's unit price (after VAT) is above the best known quote.
      const best = Number(tr.dataset.bestAfter || '');
      const hint = tr.querySelector('.js-price-hint');
      if (hint && Number.isFinite(best) && best > 0) {
        const unitAfter = moneyNum(tr.querySelector('.js-dongia')) * (1 + vatFromCombo(tr));
        hint.classList.toggle('over', unitAfter > best * 1.001);
      }
      recalcProposalTotal();
    }
    function recalcProposalTotal() {
      const trs = [...document.querySelectorAll('#lineTable tbody tr')];
      let pre = 0, after = 0;
      trs.forEach(tr => {
        const sl = Number(String(tr.querySelector('.js-sl')?.value || '').replace(/\./g, '').replace(',', '.')) || 0;
        const gia = moneyNum(tr.querySelector('.js-dongia'));
        pre += sl * gia;
        after += lineTotal(tr);
      });
      const setT = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = fmtMoney(v); };
      setT('totalPre', pre);
      setT('totalVat', Math.round((after - pre) * 100) / 100);
      const box = document.getElementById('proposalTotal');
      if (box) box.textContent = fmtMoney(after) + ' đ';
    }
    // When a material is chosen on a proposal line, pull the best known quote
    // and auto-fill the unit price (only if empty) + show a price hint.
    async function onLineMaterialChange(el) {
      const tr = el.closest('tr');
      if (!tr) return;
      const mat = comboValue(tr.querySelector('.js-mat-select'), tr.querySelector('.js-mat-new'));
      const hint = tr.querySelector('.js-price-hint');
      tr.dataset.bestAfter = '';
      if (hint) hint.classList.remove('over');
      if (!mat) { if (hint) hint.textContent = ''; return; }
      if (hint) hint.textContent = 'Đang lấy giá tốt nhất…';
      try {
        const res = await call('rpc_get_quote_dashboard', { p_item: mat, p_limit: 5 });
        const rows = res.rows || [];
        if (!rows.length) { if (hint) hint.textContent = 'Chưa có báo giá NCC cho mặt hàng này.'; return; }
        const b = rows[0]; // rank 1 = giá tốt nhất (sau VAT)
        tr.dataset.bestAfter = b.priceAfterVat;
        const gia = tr.querySelector('.js-dongia');
        if (gia && !moneyRaw(gia) && b.priceBeforeVat != null) {
          gia.value = moneyFormat(b.priceBeforeVat);
          recalcLine(gia);
        }
        if (hint) hint.innerHTML = `Giá tốt nhất: <b>${fmtMoney(b.priceAfterVat)} đ</b> sau VAT · ${esc(b.supplier)} (${esc(b.date)})`;
      } catch (e) { if (hint) hint.textContent = ''; }
    }
    function getProposalLines() {
      return [...document.querySelectorAll('#lineTable tbody tr')].map(tr => ({
        matHang: comboValue(tr.querySelector('.js-mat-select'), tr.querySelector('.js-mat-new')),
        slDat: (tr.querySelector('.js-sl')?.value || '').trim(),
        donGia: moneyRaw(tr.querySelector('.js-dongia')),
        vat: comboValue(tr.querySelector('.js-vat-select'), tr.querySelector('.js-vat-new')),
        ghiChu: tr.querySelector('.js-ghichu')?.value || ''
      }));
    }
    async function saveProposal(status, btn) {
      setMsg('Đang lưu đề xuất...');
      try {
        const inPlan = document.getElementById('pInPlan')?.checked || false;
        const payload = {
          status,
          loaiDeXuat: val('pLoai'),
          trongKeHoachTuan: inPlan,
          giaiTrinhNgoaiKeHoach: inPlan ? '' : val('pGiaiTrinh'),
          ngayDeXuat: val('pNgay'),
          nguoiDeNghi: val('pNguoi'),
          doiTuong: { ma: comboValue('pmaDoiTuong', 'pmaDoiTuongMoi'), ten: val('ptenDoiTuong'), dieuKhoanTT: val('pDieuKhoanTT') },
          noiDung: val('pNoiDung'),
          dieuKhoanTT: val('pDieuKhoanTT'),
          lines: getProposalLines()
        };
        if (status === 'Chờ duyệt' && !inPlan && !val('pGiaiTrinh').trim()) {
          setMsg('Khoản chưa có trong kế hoạch chi tuần — cần nhập giải trình trước khi gửi duyệt.');
          toast('Cần giải trình khoản ngoài kế hoạch tuần.', 'err');
          return;
        }
        const res = await withBusy(btn, 'Đang lưu...', () => call('rpc_create_proposal', { p_payload: payload }));
        setMsg(`Đã lưu ${res.maDeXuat} ở trạng thái ${res.status}.`);
        toast(`Đã lưu ${res.maDeXuat}.`, 'ok');
        renderProposal();
      } catch (err) { setMsg(err.message || err); toast(err.message || String(err), 'err'); }
    }

    function renderApprove() {
      document.getElementById('content').innerHTML = `
        <section class="card">
          <h2>Duyệt đề xuất mua hàng / tạm ứng</h2>
          <div class="notice ok">Lãnh đạo duyệt từng khoản. Nhấp vào một phiếu để xem chi tiết, so sánh giá NCC theo từng mặt hàng, và cờ kế hoạch chi tuần trước khi quyết định.</div>
          <div class="actions"><button class="secondary" onclick="loadPending(this)">↻ Tải lại danh sách chờ duyệt</button></div>
          <div id="pendingBox" style="margin-top:14px">${loadingText('Đang tải danh sách chờ duyệt...')}</div>
        </section>
        <section class="card" style="margin-top:16px">
          <h2>Phiếu đã duyệt theo ngày</h2>
          <div class="notice ok">Chọn ngày để xem lại toàn bộ phiếu đã duyệt. Có thể <b>hủy duyệt</b> (kèm lý do) nếu chưa phát sinh thanh toán.</div>
          <div class="actions" style="align-items:flex-end">
            <div class="field" style="margin:0"><label>Ngày duyệt</label><input id="approvedDate" type="date" value="${todayStr()}"></div>
            <button class="secondary" onclick="loadApproved(this)">Xem phiếu đã duyệt</button>
          </div>
          <div id="approvedBox" style="margin-top:14px"></div>
        </section>`;
      loadPending();
      loadApproved();
    }
    async function loadApproved(btn) {
      const box = document.getElementById('approvedBox');
      if (box) box.innerHTML = loadingText('Đang tải phiếu đã duyệt...');
      try {
        const res = await withBusy(btn, 'Đang tải...', () => call('rpc_get_approved_proposals', { p_date: val('approvedDate') || null }));
        state.approved = res.rows || [];
        drawApproved();
      } catch (err) { if (box) box.innerHTML = `<p class="status">${esc(err.message || err)}</p>`; }
    }
    function drawApproved() {
      const box = document.getElementById('approvedBox');
      const rows = state.approved || [];
      if (!rows.length) { box.innerHTML = '<p class="status">Không có phiếu nào được duyệt trong ngày đã chọn.</p>'; return; }
      box.innerHTML = `<div class="approve-grid">${rows.map(cardApproved).join('')}</div>`;
    }
    function cardApproved(p) {
      const loai = p.LoaiDeXuat === 'TamUng' ? 'Tạm ứng' : 'Mua hàng';
      const canUndo = !p.DaPhatSinhTT;
      return `<div class="approve-card">
        <div class="ac-top"><strong>${esc(p.MaDeXuat)}</strong><span class="pill ok">${esc(loai)}</span></div>
        <div class="ac-obj">${esc(p.TenDoiTuong || '')}</div>
        <div class="ac-money">${fmtMoney(p.TongTien)} <small>đ</small></div>
        <div class="ac-meta">Duyệt: ${esc(p.NgayDuyet || '')} · ${esc(p.NguoiDuyet || '')}</div>
        <div class="actions" style="margin-top:10px">
          <button class="secondary" onclick="openApprovedDetail('${esc(p.MaDeXuat)}')">Xem chi tiết</button>
          ${canUndo
            ? `<button class="danger" onclick="unapproveProposal('${esc(p.MaDeXuat)}', this)">Hủy duyệt</button>`
            : `<span class="pill warn">Đã phát sinh TT — khóa</span>`}
        </div>
      </div>`;
    }
    function openApprovedDetail(ma) {
      const p = (state.approved || []).find(x => x.MaDeXuat === ma);
      if (!p) return;
      const lineRows = (p.lines || []).map(l => `<tr>
        <td>${esc(l.MatHang)}</td><td class="num-cell">${fmtMaybeMoney(l.SLDat)}</td>
        <td class="num-cell">${fmtMaybeMoney(l.DonGiaChuaVAT)}</td><td>${fmtPct(l.VATRate)}</td>
        <td class="num-cell">${fmtMoney(l.ThanhTienSauVAT)}</td></tr>`).join('');
      openModal(`Phiếu ${ma} (đã duyệt)`, `
        <div class="detail-head">
          <div><label>Đối tượng</label><div>${esc(p.TenDoiTuong||'')}</div></div>
          <div><label>Ngày duyệt</label><div>${esc(p.NgayDuyet||'')}</div></div>
          <div><label>Người duyệt</label><div>${esc(p.NguoiDuyet||'')}</div></div>
          <div><label>Tổng tiền</label><div><b>${fmtMoney(p.TongTien)} đ</b></div></div>
        </div>
        ${p.NoiDung ? `<div class="field"><label>Nội dung</label><div>${esc(p.NoiDung)}</div></div>` : ''}
        <div class="table-wrap" style="max-height:none"><table><thead><tr><th>Mặt hàng</th><th>SL</th><th>Đơn giá</th><th>VAT</th><th>Thành tiền</th></tr></thead><tbody>${lineRows}</tbody></table></div>
        ${p.DaPhatSinhTT ? '<div class="notice">Đã phát sinh thanh toán — không thể hủy duyệt.</div>' : `
        <div class="field" style="margin-top:12px"><label>Lý do hủy duyệt (gửi bộ phận mua hàng)</label><textarea id="undoNote"></textarea></div>
        <div class="actions"><button class="danger" onclick="unapproveProposal('${esc(ma)}', this)">Hủy duyệt phiếu này</button></div>`}
      `, null, null);
    }
    async function unapproveProposal(ma, btn) {
      let reason = document.getElementById('undoNote')?.value || '';
      if (!reason.trim()) reason = prompt('Lý do hủy duyệt (bắt buộc, gửi bộ phận mua hàng):', '') || '';
      if (!reason.trim()) { toast('Cần nhập lý do hủy duyệt.', 'err'); return; }
      try {
        await withBusy(btn, 'Đang hủy duyệt...', () => call('rpc_unapprove_proposal', { p_ma_de_xuat: ma, p_reason: reason }));
        toast(`Đã hủy duyệt ${ma}.`, 'ok');
        closeModal();
        loadApproved();
        loadPending();
      } catch (err) { toast(err.message || String(err), 'err'); }
    }
    async function loadPending(btn) {
      const box = document.getElementById('pendingBox');
      if (box) box.innerHTML = loadingText('Đang tải danh sách chờ duyệt...');
      try {
        const res = await withBusy(btn, 'Đang tải...', () => call('rpc_get_pending_proposals', { p_limit: 100 }));
        state.pending = res.rows || [];
        drawPending();
      } catch (err) { if (box) box.innerHTML = `<p class="status">${esc(err.message || err)}</p>`; toast(err.message || String(err), 'err'); }
    }
    function drawPending() {
      const box = document.getElementById('pendingBox');
      if (!box) return;
      const rows = state.pending || [];
      if (!rows.length) { box.innerHTML = '<p class="status">Không có đề xuất nào chờ duyệt.</p>'; return; }
      box.innerHTML = `<div class="approve-grid">${rows.map(cardPending).join('')}</div>`;
    }
    function cardPending(p) {
      const loai = p.LoaiDeXuat === 'TamUng' ? 'Tạm ứng' : 'Mua hàng';
      const planPill = p.TrongKeHoachTuan
        ? '<span class="pill ok">Trong kế hoạch tuần</span>'
        : '<span class="pill warn">Ngoài kế hoạch — có giải trình</span>';
      const nLines = (p.lines || []).length;
      return `<div class="approve-card" ondblclick="openProposalDetail('${esc(p.MaDeXuat)}')" onclick="openProposalDetail('${esc(p.MaDeXuat)}')">
        <div class="ac-top"><strong>${esc(p.MaDeXuat)}</strong><span class="pill">${esc(loai)}</span></div>
        <div class="ac-obj">${esc(p.TenDoiTuong || '')}</div>
        <div class="ac-money">${fmtMoney(p.TongTien)} <small>đ (sau VAT)</small></div>
        <div class="ac-meta">${esc(p.NgayDeXuat || '')} · ${nLines} dòng · ${esc(p.NguoiDeNghi || '')}</div>
        <div class="ac-plan">${planPill}</div>
        <div class="ac-hint">Nhấp để xem chi tiết &amp; duyệt →</div>
      </div>`;
    }

    function openProposalDetail(ma) {
      const p = (state.pending || []).find(x => x.MaDeXuat === ma);
      if (!p) return;
      const loai = p.LoaiDeXuat === 'TamUng' ? 'Tạm ứng' : 'Mua hàng';
      const planBlock = p.TrongKeHoachTuan
        ? '<div class="notice ok" style="margin:0">✔ Đã có trong kế hoạch chi tuần đã duyệt.</div>'
        : `<div class="notice">⚠ Ngoài kế hoạch chi tuần. Giải trình của bộ phận mua hàng:<br><b>${esc(p.GiaiTrinhNgoaiKeHoach || '(chưa nhập)')}</b></div>`;
      const lineRows = (p.lines || []).map((l, i) => `
        <tr class="line-clickable" onclick="showLineCompare('${esc(ma)}', ${i})" title="Xem so sánh giá NCC cho mặt hàng này">
          <td>${esc(l.MatHang)} <span class="mini-link">so sánh giá ↗</span></td>
          <td>${fmtMaybeMoney(l.SLDat)}</td>
          <td>${fmtMaybeMoney(l.DonGiaChuaVAT)}</td>
          <td>${fmtPct(l.VATRate)}</td>
          <td>${fmtMoney(l.ThanhTienSauVAT)}</td>
        </tr>`).join('');
      openModal(`Phiếu ${ma} — ${loai}`, `
        <div class="detail-head">
          <div><label>Đối tượng / NCC</label><div>${esc(p.TenDoiTuong || '')}</div></div>
          <div><label>Ngày đề xuất</label><div>${esc(p.NgayDeXuat || '')}</div></div>
          <div><label>Người đề nghị</label><div>${esc(p.NguoiDeNghi || '')}</div></div>
          <div><label>Tổng tiền (sau VAT)</label><div><b>${fmtMoney(p.TongTien)} đ</b></div></div>
          <div><label>Điều khoản TT</label><div>${esc(p.DieuKhoanTT || '')}</div></div>
        </div>
        ${p.NoiDung ? `<div class="field"><label>Nội dung</label><div>${esc(p.NoiDung)}</div></div>` : ''}
        ${planBlock}
        <h3>Dòng vật tư — nhấp để so sánh giá NCC</h3>
        <div class="table-wrap" style="max-height:none">
          <table><thead><tr><th>Mặt hàng</th><th>SL đặt</th><th>Đơn giá chưa VAT</th><th>VAT</th><th>Thành tiền sau VAT</th></tr></thead>
          <tbody>${lineRows}</tbody></table>
        </div>
        <div id="lineCompareBox"></div>
        <div class="field" style="margin-top:14px"><label>Giải trình khi duyệt / lý do từ chối</label><textarea id="approveNote" placeholder="Ghi chú kèm quyết định (bắt buộc khi từ chối)."></textarea></div>
        <div class="actions">
          <button onclick="approveProposal('${esc(ma)}', this)">✔ Duyệt khoản này</button>
          <button class="danger" onclick="rejectProposal('${esc(ma)}', this)">✘ Từ chối</button>
        </div>`, null, null);
    }

    async function showLineCompare(ma, idx) {
      const p = (state.pending || []).find(x => x.MaDeXuat === ma);
      if (!p) return;
      const line = (p.lines || [])[idx];
      const box = document.getElementById('lineCompareBox');
      if (!line || !box) return;
      box.innerHTML = `<div class="compare-panel">${loadingText('Đang lấy báo giá NCC cho "' + esc(line.MatHang) + '"...')}</div>`;
      try {
        const res = await call('rpc_get_quote_dashboard', { p_item: line.MatHang, p_limit: 15 });
        const rows = res.rows || [];
        const best = res.best;
        const cmp = rows.length ? `
          <table><thead><tr><th>#</th><th>NCC</th><th>Ngày</th><th>Giá sau VAT</th><th>Xu hướng</th></tr></thead>
          <tbody>${rows.map(r => `<tr class="${r.rank===1?'best-row':''}">
            <td>${esc(r.rank)}</td><td>${esc(r.supplier)}</td><td>${esc(r.date)}</td>
            <td>${fmtMaybeMoney(r.priceAfterVat)}</td><td>${esc(r.trend||'')}</td></tr>`).join('')}</tbody></table>`
          : '<p class="status">Chưa có báo giá NCC nào cho mặt hàng này trong dữ liệu Báo giá.</p>';
        const donGiaSauVat = Number(line.DonGiaChuaVAT) * (1 + Number(line.VATRate || 0));
        box.innerHTML = `<div class="compare-panel">
          <div class="compare-head">
            <strong>So sánh giá NCC — ${esc(line.MatHang)}</strong>
            <button class="secondary" onclick="document.getElementById('lineCompareBox').innerHTML=''">Đóng</button>
          </div>
          <div class="notice ${best && donGiaSauVat > Number(best.priceAfterVat) ? 'err' : 'ok'}">
            Đơn giá trong phiếu (sau VAT): <b>${fmtMoney(Math.round(donGiaSauVat))} đ</b>${best ? ` · Giá tốt nhất đang có: <b>${fmtMoney(best.priceAfterVat)} đ</b> (${esc(best.supplier)})` : ''}
          </div>
          <div class="table-wrap" style="max-height:280px">${cmp}</div>
        </div>`;
      } catch (err) {
        box.innerHTML = `<div class="compare-panel"><p class="status">Không lấy được báo giá: ${esc(err.message || err)}</p></div>`;
      }
    }

    async function approveProposal(ma, btn) {
      const note = document.getElementById('approveNote')?.value || '';
      if (!confirm(`Duyệt đề xuất ${ma}?`)) return;
      try {
        const res = await withBusy(btn, 'Đang duyệt...', () => call('rpc_approve_proposal', { p_ma_de_xuat: ma, p_note: note }));
        toast(`Đã duyệt ${ma}, chuyển ${res.congNoRows} dòng sang công nợ.`, 'ok');
        closeModal();
        loadPending();
      } catch (err) { toast(err.message || String(err), 'err'); }
    }
    async function rejectProposal(ma, btn) {
      const reason = (document.getElementById('approveNote')?.value || '').trim();
      if (!reason) { toast('Cần nhập lý do từ chối để bộ phận mua hàng phản hồi.', 'err'); return; }
      try {
        await withBusy(btn, 'Đang từ chối...', () => call('rpc_reject_proposal', { p_ma_de_xuat: ma, p_reason: reason }));
        toast(`Đã từ chối ${ma}.`, 'ok');
        closeModal();
        loadPending();
      } catch (err) { toast(err.message || String(err), 'err'); }
    }

    // Nghiệm thu: chọn 1 khoản đã duyệt đang chờ nhận -> điền khối lượng thực,
    // hồ sơ đã đủ chưa -> Lưu để chốt về công nợ (cơ sở NCC lập hóa đơn VAT).
    function renderReceipt() {
      document.getElementById('content').innerHTML = `
        <div class="proposal-layout">
          <section class="card">
            <h2>Nghiệm thu nhận hàng</h2>
            <div class="notice ok">Chọn khoản đã duyệt bên phải để nạp vào đây, rồi nhập khối lượng thực nhận, chứng từ và tình trạng hồ sơ. Bấm lưu để <b>chốt về công nợ</b> — đây là cơ sở để NCC lập hóa đơn VAT.</div>
            <div class="notice js-msg"></div>
            <div class="field"><label>Khoản đang nghiệm thu (Mã CN)</label><input id="rMaCN" readonly placeholder="Chọn một phiếu ở danh sách bên phải →"></div>
            <div id="rInfo" class="review-head" style="min-height:8px"></div>
            <div class="grid">
              <div class="field"><label>SL thực nhận (khối lượng nghiệm thu) *</label><input id="rSL" class="js-money" inputmode="decimal" oninput="recalcReceipt()"></div>
              <div class="field"><label>Ngày nhận thực tế</label><input id="rNgay" type="date" value="${todayStr()}"></div>
            </div>
            <div class="total-bar">Thành tiền thực nhận (sau VAT): <strong id="rThanhTien">0 đ</strong></div>
            <div class="field"><label>Phiếu cân / chứng từ giao nhận</label><input id="rChungTu"></div>
            <div class="plan-box"><label class="check-line"><input type="checkbox" id="rHoSo"> Hồ sơ / chứng từ đã đầy đủ (đủ điều kiện xuất hóa đơn VAT)</label></div>
            <div class="field"><label>Ghi chú nghiệm thu (chất lượng, sai lệch…)</label><textarea id="rGhiChu"></textarea></div>
            <button onclick="saveReceipt(this)">Lưu &amp; chốt về công nợ</button>
          </section>
          <aside class="card">
            <h2>Khoản đã duyệt chờ nghiệm thu</h2>
            <div class="actions"><button class="secondary" onclick="loadReceiptItems(this)">↻ Tải lại</button></div>
            <div id="receiptItems" style="margin-top:12px">${loadingText('Đang tải...')}</div>
          </aside>
        </div>`;
      loadReceiptItems();
    }
    async function loadReceiptItems(btn) {
      const box = document.getElementById('receiptItems');
      if (box) box.innerHTML = loadingText('Đang tải...');
      try {
        const res = await withBusy(btn, 'Đang tải...', () => call('rpc_get_open_receipt_items', { p_limit: 200 }));
        state.receiptItems = res.rows || [];
        drawReceiptItems();
      } catch (err) { if (box) box.innerHTML = `<p class="status">${esc(err.message || err)}</p>`; }
    }
    function drawReceiptItems() {
      const box = document.getElementById('receiptItems');
      const rows = state.receiptItems || [];
      if (!rows.length) { box.innerHTML = '<p class="status">Không có khoản nào chờ nghiệm thu.</p>'; return; }
      box.innerHTML = rows.map((r, i) => `<div class="approve-card" style="margin-bottom:10px" onclick="pickReceipt(${i})">
        <div class="ac-top"><strong>${esc(r.MaCN)}</strong><span class="pill">${esc(r.MaDeXuat||'')}</span></div>
        <div class="ac-obj">${esc(r.TenDoiTuong||'')}</div>
        <div class="ac-meta">${esc(r.MatHang||'')} · SL đặt ${fmtMaybeMoney(r.SLDat)} · ${fmtMoney(r.ThanhTienDat)}đ</div>
        <div class="ac-meta">Người đề nghị: ${esc(r.NguoiDeNghi||'')} · duyệt ${esc(r.NgayDuyet||'')}</div>
        <div class="ac-hint">Nạp vào form nghiệm thu →</div>
      </div>`).join('');
    }
    function pickReceipt(i) {
      const r = (state.receiptItems || [])[i];
      if (!r) return;
      state.currentReceipt = r;
      document.getElementById('rMaCN').value = r.MaCN;
      document.getElementById('rInfo').innerHTML = `<div><b>${esc(r.MatHang||'')}</b> — ${esc(r.TenDoiTuong||'')}</div><div>SL đặt: ${fmtMaybeMoney(r.SLDat)} · Đơn giá: ${fmtMoney(r.DonGia)} · VAT ${fmtPct(r.VATRate)}</div>`;
      const sl = document.getElementById('rSL');
      sl.value = moneyFormat(r.SLDat); // gợi ý = SL đặt, sửa lại theo thực nhận
      recalcReceipt();
      toast(`Đã nạp ${r.MaCN}. Sửa khối lượng thực nhận nếu khác.`, 'ok');
    }
    function recalcReceipt() {
      const r = state.currentReceipt;
      const box = document.getElementById('rThanhTien');
      if (!r || !box) { if (box) box.textContent = '0 đ'; return; }
      const sl = moneyNum('rSL');
      const tt = sl * Number(r.DonGia || 0) * (1 + Number(r.VATRate || 0));
      box.textContent = fmtMoney(Math.round(tt)) + ' đ';
    }
    async function saveReceipt(btn) {
      const maCN = val('rMaCN');
      if (!maCN) { setMsg('Chọn một khoản ở danh sách bên phải trước.'); toast('Chưa chọn khoản nghiệm thu.', 'err'); return; }
      if (!moneyRaw('rSL')) { toast('Cần nhập SL thực nhận.', 'err'); return; }
      try {
        await withBusy(btn, 'Đang lưu...', () => call('rpc_update_receipt', { p_payload: {
          maCN, slThucNhan: moneyRaw('rSL'), ngayNhan: val('rNgay'),
          chungTu: val('rChungTu'), hoSoDayDu: document.getElementById('rHoSo')?.checked || false,
          ghiChu: val('rGhiChu')
        } }));
        toast(`Đã nghiệm thu & chốt ${maCN} về công nợ.`, 'ok');
        state.currentReceipt = null;
        renderReceipt();
      } catch (err) { setMsg(err.message || err); toast(err.message || String(err), 'err'); }
    }

    function renderPayment() {
      renderShell('Cập nhật thanh toán', `
        ${objectFields('t')}
        <div class="grid">
          <div class="field"><label>Ngày thanh toán</label><input id="tNgay" type="date" value="${todayStr()}"></div>
          <div class="field"><label>Số tiền</label><input id="tSoTien" class="js-money" inputmode="decimal"></div>
        </div>
        <div class="grid">
          <div class="field"><label>Phân bổ</label><select id="tMode"><option value="FIFO">FIFO theo đối tượng</option><option value="MA_CN">Theo mã CN cụ thể</option></select></div>
          <div class="field"><label>Mã CN nếu phân bổ cụ thể</label><input id="tMaCN"></div>
        </div>
        <div class="field"><label>Chứng từ</label><input id="tChungTu"></div>
        <div class="field"><label>Ghi chú</label><textarea id="tGhiChu"></textarea></div>
        <button onclick="savePayment(this)">Lưu thanh toán</button>`, 'payment');
      loadRecent('payment');
    }
    async function savePayment(btn) {
      setMsg('Đang lưu thanh toán...');
      try {
        const payload = {
          doiTuong: { ma: comboValue('tmaDoiTuong', 'tmaDoiTuongMoi'), ten: val('ttenDoiTuong') },

          soTien: moneyRaw('tSoTien'),
          phanBoMode: val('tMode'),
          maCN: val('tMaCN'),
          chungTu: val('tChungTu'),

        };

        toast(`Đã lưu thanh toán ${res.maThanhToan}.`, 'ok');
        loadRecent('payment');
      } catch (err) { setMsg(err.message || err); toast(err.message || String(err), 'err'); }
    }

    function renderDashboard() {
      renderShell('Dashboard công nợ theo mã đối tượng', `
        <div class="grid">
          <div class="field"><label>Mã đối tượng</label><select id="dma">${objectOptions()}</select></div>
          <div class="field"><label>Trạng thái</label><select id="dstatus"><option></option><option>Còn phải trả</option><option>Tạm ứng</option><option>Chờ SL thực nhận</option></select></div>
          <div class="field"><label>Từ ngày</label><input id="dfrom" type="date"></div>
          <div class="field"><label>Đến ngày</label><input id="dto" type="date"></div>
        </div>
        <button onclick="loadDashboard(this)">Generate dashboard</button>
        <div id="dashBox" style="margin-top:12px"></div>`, 'debt');
      loadDashboard();
      loadRecent('debt');
    }
    async function loadDashboard(btn) {
      const box = document.getElementById('dashBox');
      box.innerHTML = loadingText('Đang tải dashboard công nợ...');
      try {
        const filter = { maDoiTuong: val('dma'), status: val('dstatus'), fromDate: val('dfrom') || null, toDate: val('dto') || null };
        const res = await withBusy(btn, 'Đang generate...', () => call('rpc_get_debt_dashboard', { p_filter: filter }));
        box.innerHTML = `
          <div class="totals">
            <div class="metric">AP<strong>${fmtMoney(res.totals.ap)}</strong></div>
            <div class="metric">AR/tạm ứng<strong>${fmtMoney(res.totals.ar)}</strong></div>
            <div class="metric">Net<strong>${fmtMoney(res.totals.net)}</strong></div>
            <div class="metric">Số khoản<strong>${fmtMoney(res.totals.count)}</strong></div>
          </div>
          <div class="table-wrap">${table(res.summary, ['maDoiTuong','tenDoiTuong','actual','paid','ap','ar','net','count','status'])}</div>`;
      } catch (err) { box.innerHTML = esc(err.message || err); toast(err.message || String(err), 'err'); }
    }

    function renderSettlement() {
      renderShell('Lưu &amp; clear tất toán', `
        <div class="field"><label>Mã đối tượng</label><select id="sma">${objectOptions()}</select><small>Để trống để preview toàn bộ.</small></div>
        <div class="actions">
          <button onclick="previewSettlement(this)">Preview tất toán</button>
          <button class="danger" onclick="confirmSettlement(this)">Xác nhận archive &amp; clear</button>
        </div>
        <div id="settleBox" class="table-wrap" style="margin-top:12px"></div>`, 'debt');
      loadRecent('debt');
    }
    async function previewSettlement(btn) {
      const box = document.getElementById('settleBox');
      box.innerHTML = loadingText('Đang tính preview tất toán...');
      try {
        const res = await withBusy(btn, 'Đang tính...', () => call('rpc_preview_settlement', { p_ma_doi_tuong: val('sma') || null }));
        const plan = res.plan || {};
        box.innerHTML = `<p class="status">Sẽ tất toán (archive): ${plan.archived ?? 0} dòng. Giữ lại: ${plan.kept ?? 0} dòng.</p>` + table(plan.preview, ['action','maCN','doiTuong','actual','allocated']);
      } catch (err) { box.innerHTML = esc(err.message || err); toast(err.message || String(err), 'err'); }
    }
    async function confirmSettlement(btn) {
      if (!confirm('Xác nhận archive trước rồi clear/compact công nợ?')) return;
      try {
        const res = await withBusy(btn, 'Đang clear...', () => call('rpc_confirm_settlement', { p_ma_doi_tuong: val('sma') || null }));
        document.getElementById('settleBox').innerHTML = `Đã archive ${res.archived} dòng, giữ lại ${res.kept} dòng.`;
        toast(`Đã archive ${res.archived} dòng.`, 'ok');
        loadRecent('debt');
      } catch (err) { document.getElementById('settleBox').innerHTML = esc(err.message || err); toast(err.message || String(err), 'err'); }
    }

    async function loadRecent(kind, btn) {
      const box = document.getElementById('recentBox');
      if (!box) return;
      box.innerHTML = loadingText('Đang tải dữ liệu gần đây...');
      try {
        const filter = {
          limit: Number(val('recentLimit') || 20),
          maDoiTuong: val('recentMa'),
          fromDate: val('recentFrom') || null,
          toDate: val('recentTo') || null
        };
        const res = await withBusy(btn, 'Đang tải...', () => call('rpc_get_recent', { p_kind: kind, p_filter: filter }));
        const rows = res.rows || [];
        const cols = res.columns || (rows[0] ? Object.keys(rows[0]).slice(0, 10) : []);
        box.innerHTML = (rows.length ? table(rows, cols) : '<p class="status">Chưa có dữ liệu phù hợp.</p>');
      } catch (err) { box.innerHTML = `<p class="status">Không tải được dữ liệu gần đây: ${esc(err.message || err)}</p>`; toast(err.message || String(err), 'err'); }
    }

    function table(rows, cols, actionFn) {
      rows = rows || [];
      if (!rows.length) return '<p class="status">Không có dữ liệu.</p>';
      return `<table><thead><tr>${cols.map(c => `<th>${esc(c)}</th>`).join('')}${actionFn ? '<th>Thao tác</th>' : ''}</tr></thead><tbody>` +
        rows.map(r => `<tr>${cols.map(c => `<td>${esc(formatCell(r[c]))}</td>`).join('')}${actionFn ? `<td>${actionFn(r)}</td>` : ''}</tr>`).join('') +
        '</tbody></table>';
    }
    function formatCell(v) {
      if (typeof v === 'number') return fmtMoney(v);
      return v ?? '';
    }

    // ---- Danh mục (master data) -------------------------------------------
    // In-app management of materials (mã hoá vật tư + nhóm hàng) and suppliers.
    // Reads via rpc_list_catalog; writes via rpc_upsert_material /
    // rpc_upsert_doi_tuong. Add/edit buttons only show for catalog:manage.
    function renderCatalog() {
      document.getElementById('content').innerHTML = `
        <section class="card">
          <h2>Danh mục — Mã hoá vật tư &amp; nhà cung cấp</h2>
          <div class="notice ok">Mã cố định giúp thống kê chính xác kể cả khi tên gõ khác nhau. Mỗi mặt hàng nên có 1 nhóm hàng để dashboard lãnh đạo gom đúng.</div>
          <div class="cat-tabs">
            <button id="catTabMat" class="active" onclick="switchCatTab('mat')">Mặt hàng (NVL)</button>
            <button id="catTabNcc" class="secondary" onclick="switchCatTab('ncc')">Nhà cung cấp</button>
          </div>
          <div id="catBody" style="margin-top:14px">${loadingText('Đang tải danh mục...')}</div>
        </section>`;
      state.catTab = state.catTab || 'mat';
      loadCatalog();
    }

    async function loadCatalog() {
      try {
        const res = await call('rpc_list_catalog');
        state.catalog = { materials: res.materials || [], suppliers: res.suppliers || [], groups: res.groups || [] };
        drawCatalog();
      } catch (err) {
        document.getElementById('catBody').innerHTML = `<p class="status">Không tải được danh mục: ${esc(err.message || err)}</p>`;
        toast(err.message || String(err), 'err');
      }
    }
    function switchCatTab(tab) {
      state.catTab = tab;
      document.getElementById('catTabMat').className = tab === 'mat' ? 'active' : 'secondary';
      document.getElementById('catTabNcc').className = tab === 'ncc' ? 'active' : 'secondary';
      drawCatalog();
    }
    function statusPill(s) {
      return s === 'Ngừng' ? '<span class="pill err">Ngừng</span>' : '<span class="pill ok">Hoạt động</span>';
    }
    function drawCatalog() {
      const box = document.getElementById('catBody');
      if (!box) return;
      const manage = can('catalog:manage');
      if (state.catTab === 'mat') {
        const rows = state.catalog.materials;
        const addBtn = manage ? `<button class="secondary" onclick="openGroupManager()">Nhóm hàng</button><button onclick="openMaterialForm()">＋ Thêm mặt hàng</button>` : '';
        box.innerHTML = `
          <div class="cat-toolbar">
            <input id="catMatSearch" placeholder="Tìm theo mã / tên / nhóm..." oninput="drawCatalog._filter()">
            ${addBtn}
          </div>
          <div class="table-wrap" style="margin-top:12px">
            <table><thead><tr>
              <th>Mã VT</th><th>Tên mặt hàng</th><th>Nhóm hàng</th><th>ĐVT</th><th>Trạng thái</th>${manage ? '<th>Thao tác</th>' : ''}
            </tr></thead><tbody id="catMatRows">
              ${rows.map(m => matRow(m, manage)).join('')}
            </tbody></table>
          </div>
          <small>${rows.length} mặt hàng.</small>`;
      } else {
        const rows = state.catalog.suppliers;
        const addBtn = manage ? `<button onclick="openSupplierForm()">＋ Thêm nhà cung cấp</button>` : '';
        box.innerHTML = `
          <div class="cat-toolbar">
            <input id="catNccSearch" placeholder="Tìm theo mã / tên / MST..." oninput="drawCatalog._filter()">
            ${addBtn}
          </div>
          <div class="table-wrap" style="margin-top:12px">
            <table><thead><tr>
              <th>Mã ĐT</th><th>Tên đối tượng</th><th>Loại</th><th>Liên hệ</th><th>Điều khoản TT</th><th>Trạng thái</th>${manage ? '<th>Thao tác</th>' : ''}
            </tr></thead><tbody id="catNccRows">
              ${rows.map(s => nccRow(s, manage)).join('')}
            </tbody></table>
          </div>
          <small>${rows.length} đối tượng.</small>`;
      }
    }
    function matRow(m, manage) {
      return `<tr>
        <td><code>${esc(m.ma || '')}</code></td>
        <td>${esc(m.ten || '')}</td>
        <td>${m.nhom ? esc(m.nhom) : '<span class="pill warn">Chưa gán</span>'}</td>
        <td>${esc(m.dvt || '')}</td>
        <td>${statusPill(m.trangThai)}</td>
        ${manage ? `<td><button class="secondary" onclick="openMaterialForm('${m.id}')">Sửa</button></td>` : ''}
      </tr>`;
    }
    function nccRow(s, manage) {
      return `<tr>
        <td><code>${esc(s.ma || '')}</code></td>
        <td>${esc(s.ten || '')}</td>
        <td>${esc(s.loai || '')}</td>
        <td>${esc(s.contact || s.sdt || '')}</td>
        <td>${esc(s.dieuKhoan || '')}</td>
        <td>${statusPill(s.trangThai)}</td>
        ${manage ? `<td><button class="secondary" onclick="openSupplierForm('${s.id}')">Sửa</button></td>` : ''}
      </tr>`;
    }
    drawCatalog._filter = function () {
      if (state.catTab === 'mat') {
        const q = normLower(val('catMatSearch'));
        const body = document.getElementById('catMatRows');
        body.innerHTML = state.catalog.materials
          .filter(m => !q || normLower(`${m.ma} ${m.ten} ${m.nhom} ${m.dvt}`).includes(q))
          .map(m => matRow(m, can('catalog:manage'))).join('');
      } else {
        const q = normLower(val('catNccSearch'));
        const body = document.getElementById('catNccRows');
        body.innerHTML = state.catalog.suppliers
          .filter(s => !q || normLower(`${s.ma} ${s.ten} ${s.mst} ${s.contact}`).includes(q))
          .map(s => nccRow(s, can('catalog:manage'))).join('');
      }
    };
    function normLower(s) { return String(s ?? '').toLowerCase(); }

    // ---- modal + forms -----------------------------------------------------
    function openModal(title, bodyHtml, onSave, saveLabel) {
      closeModal();
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.id = 'catModal';
      const footer = onSave ? `
          <div class="actions">
            <button id="catSaveBtn">${esc(saveLabel || 'Lưu')}</button>
            <button class="secondary" onclick="closeModal()">Huỷ</button>
          </div>` : `
          <div class="actions"><button class="secondary" onclick="closeModal()">Đóng</button></div>`;
      overlay.innerHTML = `
        <div class="modal-card card">
          <h2>${esc(title)}</h2>
          <div class="notice err js-modal-msg hidden"></div>
          ${bodyHtml}
          ${footer}
        </div>`;
      document.body.appendChild(overlay);
      overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
      if (onSave) document.getElementById('catSaveBtn').onclick = function () { onSave(this); };
    }
    function closeModal() { const m = document.getElementById('catModal'); if (m) m.remove(); }
    function modalErr(text) {
      const el = document.querySelector('#catModal .js-modal-msg');
      if (el) { el.textContent = text || ''; el.classList.toggle('hidden', !text); }
    }
    function groupOptions(selected) {
      return ['<option value="">— Chưa gán —</option>']
        .concat((state.catalog.groups || []).map(g => `<option value="${esc(g)}" ${g === selected ? 'selected' : ''}>${esc(g)}</option>`))
        .join('');
    }

    function openMaterialForm(id) {
      const m = id ? state.catalog.materials.find(x => x.id === id) : null;
      openModal(m ? 'Sửa mặt hàng' : 'Thêm mặt hàng', `
        <input type="hidden" id="mfId" value="${m ? esc(m.id) : ''}">
        <div class="grid">
          <div class="field"><label>Mã vật tư</label><input id="mfMa" value="${m ? esc(m.ma) : ''}" placeholder="Để trống = tự sinh VT-000x"></div>
          <div class="field"><label>ĐVT</label><input id="mfDvt" value="${m ? esc(m.dvt || '') : ''}" placeholder="vnđ/kg, vnđ/lít..."></div>
        </div>
        <div class="field"><label>Tên mặt hàng *</label><input id="mfTen" value="${m ? esc(m.ten) : ''}"></div>
        <div class="grid">
          <div class="field"><label>Nhóm hàng</label>
            <div style="display:flex;gap:8px"><select id="mfNhom" style="flex:1">${groupOptions(m ? m.nhom : '')}</select>
            <button type="button" class="secondary" style="width:auto;white-space:nowrap" onclick="addGroupPrompt('mfNhom')">＋ Nhóm</button></div>
          </div>
          <div class="field"><label>Trạng thái</label><select id="mfStatus">
            <option ${m && m.trangThai === 'Ngừng' ? '' : 'selected'}>Hoạt động</option>
            <option ${m && m.trangThai === 'Ngừng' ? 'selected' : ''}>Ngừng</option>
          </select></div>
        </div>`, saveMaterial, m ? 'Lưu thay đổi' : 'Thêm mặt hàng');
    }
    async function addGroupPrompt(selectId) {
      const name = (prompt('Tên nhóm hàng mới:', '') || '').trim();
      if (!name) return;
      try {
        const res = await call('rpc_add_material_group', { p_ten: name });
        state.catalog.groups = res.groups || state.catalog.groups;
        const sel = document.getElementById(selectId);
        if (sel) sel.innerHTML = groupOptions(name);
        toast('Đã thêm nhóm hàng.', 'ok');
      } catch (err) { toast(err.message || String(err), 'err'); }
    }
    function openGroupManager() {
      const groups = state.catalog.groups || [];
      openModal('Quản lý nhóm hàng', `
        <p class="status">Đổi tên sẽ cập nhật cho tất cả mặt hàng đang thuộc nhóm đó.</p>
        <div id="groupMgrList">
          ${groups.map(g => `<div class="grid" style="margin-bottom:8px">
            <input class="gm-old" type="hidden" value="${esc(g)}">
            <input class="gm-new" value="${esc(g)}">
            <button type="button" class="secondary" style="width:auto" onclick="renameGroup(this)">Lưu tên</button>
          </div>`).join('')}
        </div>
        <div class="field" style="margin-top:12px"><label>Thêm nhóm mới</label>
          <div style="display:flex;gap:8px"><input id="gmAddNew" style="flex:1" placeholder="Tên nhóm mới">
          <button type="button" style="width:auto" onclick="addGroupFromMgr(this)">Thêm</button></div>
        </div>`, null, null);
    }
    async function renameGroup(btn) {
      const row = btn.closest('.grid');
      const oldName = row.querySelector('.gm-old').value;
      const newName = row.querySelector('.gm-new').value.trim();
      if (!newName || newName === oldName) return;
      try {
        const res = await call('rpc_rename_material_group', { p_old: oldName, p_new: newName });
        state.catalog.groups = res.groups || state.catalog.groups;
        toast('Đã đổi tên nhóm.', 'ok');
        closeModal(); await loadCatalog();
      } catch (err) { toast(err.message || String(err), 'err'); }
    }
    async function addGroupFromMgr(btn) {
      const name = (document.getElementById('gmAddNew')?.value || '').trim();
      if (!name) return;
      try {
        const res = await call('rpc_add_material_group', { p_ten: name });
        state.catalog.groups = res.groups || state.catalog.groups;
        toast('Đã thêm nhóm.', 'ok');
        openGroupManager();
      } catch (err) { toast(err.message || String(err), 'err'); }
    }
    async function saveMaterial(btn) {
      const payload = {
        id: val('mfId') || null,
        maVatTu: val('mfMa'),
        ten: val('mfTen'),
        dvt: val('mfDvt'),
        nhom: val('mfNhom'),
        trangThai: val('mfStatus')
      };
      if (!payload.ten.trim()) { modalErr('Cần nhập tên mặt hàng.'); return; }
      try {
        await withBusy(btn, 'Đang lưu...', () => call('rpc_upsert_material', { p_payload: payload }));
        closeModal();
        toast('Đã lưu mặt hàng.', 'ok');
        await loadCatalog();
      } catch (err) { modalErr(err.message || String(err)); }
    }

    function openSupplierForm(id) {
      const s = id ? state.catalog.suppliers.find(x => x.id === id) : null;
      openModal(s ? 'Sửa nhà cung cấp' : 'Thêm nhà cung cấp', `
        <input type="hidden" id="sfId" value="${s ? esc(s.id) : ''}">
        <div class="grid">

    async function savePayReq(status, btn) {
      const lines = getPayLines().filter(l => moneyNum({value:l.soTien}) > 0 || Number(l.soTien) > 0);

      const bad = lines.find(l => !l.debtId && !l.giaiTrinh.trim());
      if (status === 'Chờ duyệt' && bad) { toast(`Dòng "${bad.ncc||'?'}" ngoài công nợ — cần giải trình.`, 'err'); return; }
      try {
        const res = await withBusy(btn, 'Đang lưu...', () => call('rpc_create_payment_request', { p_payload: { status, ngay: val('prNgay'), ghiChu: val('prGhiChu'), lines } }));

      return '<span class="pill warn">Chờ duyệt</span>';

      if (!confirm(`Xác nhận đã đi tiền theo đề xuất ${ma}? Thao tác này ghi nhận thanh toán vào công nợ.`)) return;
      try {
        const res = await withBusy(btn, 'Đang ghi nhận...', () => call('rpc_execute_payment_request', { p_ma: ma }));
        toast(`Đã ghi nhận ${res.payments} khoản chi cho ${ma}.`, 'ok');
        loadMyPayReq();
      } catch (err) { toast(err.message || String(err), 'err'); }

          <button onclick="approvePayReq('${esc(ma)}', this)">✔ Duyệt</button>

    async function approvePayReq(ma, btn) {
      const note = document.getElementById('payApproveNote')?.value || '';
      if (!confirm(`Duyệt đề xuất thanh toán ${ma}?`)) return;
      try { await withBusy(btn, 'Đang duyệt...', () => call('rpc_approve_payment_request', { p_ma: ma, p_note: note })); toast(`Đã duyệt ${ma}.`, 'ok'); closeModal(); loadPendingPayReq(); }
      catch (err) { toast(err.message || String(err), 'err'); }
    }
    async function rejectPayReq(ma, btn) {
      const reason = (document.getElementById('payApproveNote')?.value || '').trim();
      if (!reason) { toast('Cần nhập lý do từ chối.', 'err'); return; }
      try { await withBusy(btn, 'Đang từ chối...', () => call('rpc_reject_payment_request', { p_ma: ma, p_reason: reason })); toast(`Đã từ chối ${ma}.`, 'ok'); closeModal(); loadPendingPayReq(); }
      catch (err) { toast(err.message || String(err), 'err'); }
    }
