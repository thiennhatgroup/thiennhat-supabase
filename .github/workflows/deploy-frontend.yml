name: Deploy frontend to GitHub Pages

# Xuất bản thư mục public/ lên nhánh gh-pages (phương án "Deploy from a branch").
# Cách này ổn định, KHÔNG dính lỗi "in progress deployment" / "multiple artifacts"
# của cơ chế Pages-Actions environment.
#
# One-time setup: Settings -> Pages -> Source = "Deploy from a branch"
#   -> Branch: gh-pages / (root) -> Save.

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pages-branch
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish public/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          cname: muahang.thiennhatgroup.com
