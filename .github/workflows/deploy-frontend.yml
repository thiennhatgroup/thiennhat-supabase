name: Deploy frontend to GitHub Pages

# Publishes the public/ folder to GitHub Pages every time main changes.
# One-time setup: repo Settings -> Pages -> Source = "GitHub Actions".
# After that, every push to main updates your live site automatically.

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'
      - id: deployment
        uses: actions/deploy-pages@v4
